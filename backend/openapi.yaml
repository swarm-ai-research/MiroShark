openapi: 3.1.0
info:
  title: MiroShark HTTP API
  version: "1.0.0"
  summary: Universal Swarm Intelligence Engine — REST surface for simulations, graphs, reports, sharing, and observability.
  description: |
    The MiroShark backend is a Flask service that orchestrates large agent
    populations through Wonderwall, builds bi-temporal knowledge graphs in
    Neo4j, and generates reports, share cards, and embeds for every run.

    This document is the canonical reference for the **HTTP** surface. The
    bundled MCP server (`backend/mcp_server.py`) exposes a parallel set of
    tools over stdio for Claude Desktop, Cursor, Windsurf and Continue —
    see `GET /api/mcp/status` and `docs/MCP.md` for that path.

    All responses are JSON unless explicitly marked otherwise (PNG share
    cards, file downloads, SSE streams). Successful responses follow the
    `{"success": true, "data": ...}` envelope used throughout the codebase;
    errors return `{"success": false, "error": "..."}` with an appropriate
    HTTP status.

    Endpoints are public on a default install — there is no auth layer in
    the bundled distribution. Operators are expected to bind the backend
    to a private interface or front it with a reverse proxy when deploying
    to production.

    **Mutation endpoints** that write to a simulation's on-disk state
    (`POST /publish`, `POST /resolve`, `POST /outcome`) are gated on a
    shared operator secret supplied via `Authorization: Bearer
    $MIROSHARK_ADMIN_TOKEN`. The token is read from the process
    environment at request time. If `MIROSHARK_ADMIN_TOKEN` is unset or
    empty the endpoints **fail closed** with `503 — admin auth not
    configured` rather than silently allowing the mutation. See
    `AdminToken` under `components.securitySchemes`.

    Discovery endpoints with light cost protection (suggest-scenarios,
    trending, ask) enforce sliding-window rate limits on the calling IP.

  contact:
    name: MiroShark on GitHub
    url: https://github.com/aaronjmars/MiroShark
  license:
    name: AGPL-3.0
    url: https://github.com/aaronjmars/MiroShark/blob/main/LICENSE

servers:
  - url: http://localhost:5001
    description: Local dev — `./miroshark` launcher default
  - url: "{scheme}://{host}"
    description: Custom deployment
    variables:
      scheme:
        default: https
        enum: [http, https]
      host:
        default: miroshark.example.com

tags:
  - name: Setup & Discovery
    description: Pre-simulation onboarding — scenario suggestions, trending feeds, "Just Ask" briefings, preset templates.
  - name: Graph Build
    description: Step 1 of a run — ontology extraction and Neo4j graph construction from a seed document.
  - name: Simulation Lifecycle
    description: Create, prepare, start, stop, fork, branch and director-mode injection.
  - name: Live State
    description: Real-time polling endpoints used by the simulation view (rounds, actions, posts, profiles).
  - name: Analytics
    description: Belief drift, counterfactuals, influence, interaction networks, demographics, quality.
  - name: Interaction
    description: One-on-one or batched chat with simulated agents, including full reasoning traces.
  - name: Publish & Embed
    description: Toggle public visibility, embed payload, share card PNG, public landing page, gallery.
  - name: Export
    description: JSON/CSV download of an entire simulation.
  - name: Report Agent
    description: ReACT-style report generation with chat, console log, and PDF download.
  - name: Observability
    description: Event stream, paginated event log, LLM call history, aggregate stats.
  - name: Settings & Push
    description: Runtime LLM/Neo4j configuration plus Web Push subscription.
  - name: Integrations
    description: MCP server status surface for AI IDE clients.
  - name: Documentation
    description: This OpenAPI spec and Swagger UI.
  - name: Discovery
    description: Search-engine sitemap and robots.txt — auto-generated discovery surfaces over the public-simulation gallery.
  - name: Platform
    description: Platform-level aggregate stats (total sims, consensus distribution, surface views) — the first endpoints that describe MiroShark itself, not a single simulation.

paths:

  # ────────────────────────────────────────────────────────────────────
  # Setup & Discovery
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/suggest-scenarios:
    post:
      tags: [Setup & Discovery]
      summary: Generate Bull/Bear/Neutral scenarios from a document preview.
      description: |
        Takes the first ~2000 chars of a document and returns up to three
        prediction-market-style simulation scenarios so users don't face
        a blank-page setup. Results are SHA-256 keyed and LRU-cached.
        On LLM failure returns `200` with `suggestions: []` and a `reason`
        code so the panel hides silently.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text_preview:
                  type: string
                  description: Document text preview — first ~2000 characters is enough.
                simulation_prompt:
                  type: string
                  description: Optional user-provided framing/prompt — biases the suggestions.
                no_cache:
                  type: boolean
                  default: false
                  description: Bypass the in-memory LRU cache and force a fresh LLM call.
              required: [text_preview]
            example:
              text_preview: "The European Central Bank meets next month to consider a 25bp rate cut..."
              simulation_prompt: "What will happen to EUR/USD?"
      responses:
        "200":
          description: Suggestion list (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Rate limited — try again shortly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsEnvelope"

  /api/simulation/trending:
    get:
      tags: [Setup & Discovery]
      summary: Recent items from configured RSS/Atom feeds.
      description: |
        Stdlib RSS/Atom parser running over up to 12 feeds in parallel.
        Defaults to `Reuters tech / The Verge / Hacker News / CoinDesk`;
        override with the `TRENDING_FEEDS` environment variable or the
        `feeds` query param. Never 5xx's — empty `items` plus a `reason`
        string surfaces failures non-fatally.
      parameters:
        - in: query
          name: feeds
          schema: { type: string }
          description: Comma-separated URL list overriding `TRENDING_FEEDS`.
        - in: query
          name: refresh
          schema: { type: string, enum: ["1", "true", "yes"] }
          description: Bypass the in-memory cache.
      responses:
        "200":
          description: Trending items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingEnvelope"
        "429":
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingEnvelope"

  /api/simulation/ask:
    post:
      tags: [Setup & Discovery]
      summary: Just-Ask — synthesize a seed briefing from a question.
      description: Type a question with no document and the LLM researches/writes the seed briefing for the simulation engine.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
      responses:
        "200":
          description: Briefing payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/graph/fetch-url:
    post:
      tags: [Setup & Discovery]
      summary: Fetch and extract readable text from a URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        "200":
          description: Extracted text.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/templates/list:
    get:
      tags: [Setup & Discovery]
      summary: List preset simulation templates.
      responses:
        "200":
          description: Available templates.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/templates/capabilities:
    get:
      tags: [Setup & Discovery]
      summary: Backend feature flags governing template behaviour.
      description: |
        Lets the frontend gray out toggles like "Live oracle data" or
        "Per-agent MCP tools" when the corresponding server-side env
        flag is off — cleaner than surprising the user with a silent
        no-op on a feature they enabled in the UI.
      responses:
        "200":
          description: Capability flags.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          oracle_seed_enabled: { type: boolean }
                          mcp_agent_tools_enabled: { type: boolean }

  /api/templates/{template_id}:
    get:
      tags: [Setup & Discovery]
      summary: Single template optionally enriched with live FeedOracle context.
      parameters:
        - in: path
          name: template_id
          required: true
          schema: { type: string }
        - in: query
          name: enrich
          schema: { type: boolean }
          description: When true, attach live FeedOracle MCP enrichment.
      responses:
        "200":
          description: Template document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────────────────────────────────────────────
  # Graph Build
  # ────────────────────────────────────────────────────────────────────

  /api/graph/ontology/generate:
    post:
      tags: [Graph Build]
      summary: NER + ontology extraction from raw text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                project_id: { type: string }
      responses:
        "200":
          description: Async task accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }

  /api/graph/build:
    post:
      tags: [Graph Build]
      summary: Build a Neo4j graph from a generated ontology.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ontology, project_id]
              properties:
                ontology: { type: object }
                project_id: { type: string }
      responses:
        "200":
          description: Async task accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }

  /api/graph/task/{task_id}:
    get:
      tags: [Graph Build]
      summary: Poll an async graph-build task.
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/graph/data/{graph_id}:
    get:
      tags: [Graph Build]
      summary: Paginated graph nodes + edges for visualization.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Page of graph data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/entities/{graph_id}:
    get:
      tags: [Graph Build]
      summary: Browse entities discovered in a graph.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Entity list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/entities/{graph_id}/{entity_uuid}:
    get:
      tags: [Graph Build]
      summary: Single entity plus its 1-hop neighborhood.
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: path
          name: entity_uuid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Entity detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/entities/{graph_id}/by-type/{entity_type}:
    get:
      tags: [Graph Build]
      summary: Filter graph entities by type (Person, Organization, Concept …).
      parameters:
        - in: path
          name: graph_id
          required: true
          schema: { type: string }
        - in: path
          name: entity_type
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Entities of the requested type.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/graph/project/{project_id}:
    get:
      tags: [Graph Build]
      summary: Look up a project by id (graph + simulation linkage).
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ────────────────────────────────────────────────────────────────────
  # Simulation Lifecycle
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/create:
    post:
      tags: [Simulation Lifecycle]
      summary: Create a simulation from a seed graph + scenario prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, simulation_requirement]
              properties:
                project_id: { type: string }
                simulation_requirement:
                  type: string
                  description: The scenario question — Bull/Bear/Neutral framing recommended.
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/prepare:
    post:
      tags: [Simulation Lifecycle]
      summary: Kick off profile generation (Step 2).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Preparation started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/prepare/status:
    post:
      tags: [Simulation Lifecycle]
      summary: Poll the profile-generation step.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Current preparation status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/start:
    post:
      tags: [Simulation Lifecycle]
      summary: Launch the Wonderwall simulation subprocess (Step 3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/SimulationIdBody"
                - type: object
                  properties:
                    platform:
                      type: string
                      enum: [twitter, reddit, parallel]
                      default: parallel
                    max_rounds:
                      type: integer
                      description: Optional cap to truncate overly long simulations.
                    enable_graph_memory_update:
                      type: boolean
                      default: false
                    force:
                      type: boolean
                      default: false
                      description: Stop a running run and clean logs before relaunching.
                    resume:
                      type: boolean
                      default: false
                      description: Resume from the last completed round if a run_state exists.
      responses:
        "200":
          description: Subprocess started.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          simulation_id: { type: string }
                          runner_status: { type: string, enum: [idle, preparing, running, paused, completed, failed] }
                          process_pid: { type: integer }
                          twitter_running: { type: boolean }
                          reddit_running: { type: boolean }
                          started_at: { type: string, format: date-time }
                          graph_memory_update_enabled: { type: boolean }
                          force_restarted: { type: boolean }

  /api/simulation/stop:
    post:
      tags: [Simulation Lifecycle]
      summary: Terminate a running simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Stopped (or already idle).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/branch-counterfactual:
    post:
      tags: [Simulation Lifecycle]
      summary: Fork a simulation with a counterfactual director-event injection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, branch_round, event]
              properties:
                simulation_id: { type: string }
                branch_round: { type: integer, minimum: 0 }
                event:
                  type: object
                  description: Director event payload — see /director/inject.
      responses:
        "200":
          description: New branched simulation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/fork:
    post:
      tags: [Simulation Lifecycle]
      summary: Duplicate an existing simulation's config so a new run can be launched.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: New simulation row.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }

  /api/simulation/{simulation_id}/director/inject:
    post:
      tags: [Simulation Lifecycle]
      summary: Director Mode — inject a breaking-news event into the live timeline.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DirectorEvent" }
      responses:
        "200":
          description: Event accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/director/events:
    get:
      tags: [Simulation Lifecycle]
      summary: List director events injected into a simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Event list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Live State
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}:
    get:
      tags: [Live State]
      summary: Static simulation record (config, status, profile count).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Simulation record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/list:
    get:
      tags: [Live State]
      summary: List every simulation on this instance.
      responses:
        "200":
          description: Simulation list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/history:
    get:
      tags: [Live State]
      summary: Per-simulation history with diff between rounds.
      parameters:
        - in: query
          name: simulation_id
          schema: { type: string }
      responses:
        "200":
          description: History records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/run-status:
    get:
      tags: [Live State]
      summary: Current round, totals, runner status.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Run status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RunStatus" }

  /api/simulation/{simulation_id}/run-status/detail:
    get:
      tags: [Live State]
      summary: Run status with the full per-platform action log.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: platform
          schema: { type: string, enum: [twitter, reddit] }
      responses:
        "200":
          description: Detailed run status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/frame/{round_num}:
    get:
      tags: [Live State]
      summary: Compact per-round snapshot for replay scrubbing.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: round_num
          required: true
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Frame.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/timeline:
    get:
      tags: [Live State]
      summary: Round-by-round summary across the whole run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Timeline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/actions:
    get:
      tags: [Live State]
      summary: Raw agent action log.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Action records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/posts:
    get:
      tags: [Live State]
      summary: Paginated posts (Twitter + Reddit) generated during the run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: platform
          schema: { type: string, enum: [twitter, reddit] }
      responses:
        "200":
          description: Posts page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/profiles:
    get:
      tags: [Live State]
      summary: Generated agent personas.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Profiles.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/profiles/realtime:
    get:
      tags: [Live State]
      summary: Live agent belief snapshots, updated each round.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Realtime profiles.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/polymarket/markets:
    get:
      tags: [Live State]
      summary: Polymarket-style markets and current prices for this simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Markets.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/polymarket/market/{market_id}/prices:
    get:
      tags: [Live State]
      summary: Price history for a single market within this simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: market_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Price history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Analytics
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}/belief-drift:
    get:
      tags: [Analytics]
      summary: Per-round belief distribution + first consensus round.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Belief drift series.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/BeliefDrift" }

  /api/simulation/{simulation_id}/counterfactual:
    get:
      tags: [Analytics]
      summary: Recompute belief drift with selected agents removed (no re-sim).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: exclude_agents
          schema: { type: string }
          description: Comma-separated list of agent IDs to remove.
      responses:
        "200":
          description: Counterfactual drift.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/agent-stats:
    get:
      tags: [Analytics]
      summary: Per-agent engagement and posting counts.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Agent stats.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/influence:
    get:
      tags: [Analytics]
      summary: Top-20 influence leaderboard.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Leaderboard.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/interaction-network:
    get:
      tags: [Analytics]
      summary: Force-directed agent-to-agent interaction graph + echo-chamber metrics.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Network graph.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/demographics:
    get:
      tags: [Analytics]
      summary: Archetype clustering — analyst / influencer / retail / observer …
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Demographics breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/quality:
    get:
      tags: [Analytics]
      summary: Run health score — engagement, coherence, diversity, variance.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Quality diagnostics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/lineage:
    get:
      tags: [Analytics]
      summary: Parent + public children of a published simulation (fork / counterfactual graph).
      description: |
        Returns the lineage graph slice rooted at the requested
        simulation: the parent it was forked / branched from (if any)
        and every **public** simulation whose `parent_simulation_id`
        points back at it.

        Closes the navigation gap that PR #75's reproducibility config
        export uncovered. PR #75 persists `parent_simulation_id` plus
        a counterfactual trigger marker into every simulation's
        directory — the data is on disk, but the lineage is
        one-directional (a child knows its parent, the parent has no
        visibility into its children). A researcher who runs a base
        scenario then triggers three counterfactual branches has no
        way to navigate from the parent to the branches without
        remembering each child sim id. This endpoint surfaces the
        reverse pointer.

        Children are public-only. Operators who fork privately for
        in-progress work are not surprised to see those branches leak
        into a tweeted parent's lineage view. The total count caps at
        50 entries; sims with more children than that are an extreme
        outlier and the cap is defense-in-depth, not a normal
        truncation case.

        Same publish gate as the share card / transcript / trajectory
        / thread / reproduce.json endpoints. Cached for 5 minutes —
        the graph slice is stable once the parent and its branches
        reach terminal states.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Lineage graph slice — parent + public children.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    $ref: "#/components/schemas/SimulationLineage"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/compare:
    get:
      tags: [Analytics]
      summary: Side-by-side belief comparison across simulations.
      parameters:
        - in: query
          name: simulation_ids
          required: true
          schema: { type: string }
          description: Comma-separated simulation IDs.
      responses:
        "200":
          description: Comparison payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Interaction
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/interview:
    post:
      tags: [Interaction]
      summary: Chat with a single agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, agent_name, prompt]
              properties:
                simulation_id: { type: string }
                agent_name: { type: string }
                prompt: { type: string }
      responses:
        "200":
          description: Agent reply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/interview/batch:
    post:
      tags: [Interaction]
      summary: Ask a group of agents the same question in parallel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id, agent_names, prompt]
              properties:
                simulation_id: { type: string }
                agent_names:
                  type: array
                  items: { type: string }
                prompt: { type: string }
      responses:
        "200":
          description: Per-agent replies.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/interview/history:
    post:
      tags: [Interaction]
      summary: Read prior interview transcripts for a simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [simulation_id]
              properties:
                simulation_id: { type: string }
                platform: { type: string, enum: [twitter, reddit] }
                agent_id:
                  type: integer
                  description: Restrict to a single agent.
                limit: { type: integer, default: 100 }
      responses:
        "200":
          description: History records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/agents/{agent_name}/trace-interview:
    post:
      tags: [Interaction]
      summary: Chat with full reasoning trace surfaced.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: agent_name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
      responses:
        "200":
          description: Reply + trace.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/interviews/{agent_name}:
    get:
      tags: [Interaction]
      summary: Past interview transcripts with one agent.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: agent_name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Transcripts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Publish & Embed
  # ────────────────────────────────────────────────────────────────────

  /api/simulation/{simulation_id}/publish:
    post:
      tags: [Publish & Embed]
      summary: Toggle a simulation's `is_public` flag.
      description: |
        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                public:
                  type: boolean
                  default: true
      responses:
        "200":
          description: New public state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/share-link:
    post:
      tags: [Publish & Embed]
      summary: Mint a private share-link token for one simulation.
      description: |
        Mints a 32-character URL-safe token whose `/preview/<token>` URL
        bypasses the `is_public` gate **for the preview page only**. The
        token does not publish the sim, surface it on `/explore`, or
        unlock per-sim REST surfaces. The resolved page emits
        `noindex,nofollow` + no Open Graph / oEmbed tags so the link
        doesn't auto-unfurl on Discord / Slack / Twitter.

        Admin-gated. Default expiry: 30 days; clamped to `[1, 365]`.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                  default: 30
      responses:
        "201":
          description: New token envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ShareLinkRecord"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/share-links:
    get:
      tags: [Publish & Embed]
      summary: List active share-link tokens for one simulation.
      description: |
        Active = non-revoked, non-expired. Sorted newest-first by
        `created_at_epoch`. Returns an empty array for a sim with no
        tokens issued yet. Admin-gated.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Active tokens.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [simulation_id, tokens, count]
                        properties:
                          simulation_id:
                            type: string
                          tokens:
                            type: array
                            items:
                              $ref: "#/components/schemas/ShareLinkRecord"
                          count:
                            type: integer
                            minimum: 0
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/share-link/{token}:
    delete:
      tags: [Publish & Embed]
      summary: Revoke a single share-link token.
      description: |
        Idempotent — returns `204` whether the token existed or had
        already been revoked. The associated `/preview/<token>` URL
        stops resolving immediately (the preview page is served with
        `Cache-Control: no-store` so revocation is not cacheable).
        Admin-gated.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: path
          name: token
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9_-]+$"
      responses:
        "204":
          description: Token revoked (or already revoked).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /preview/{token}:
    get:
      tags: [Publish & Embed]
      summary: Private-preview landing page resolved from a share-link token.
      description: |
        Resolves the token to a sim ID and renders the same SPA redirect
        as `/share/<id>` — but with `<meta name="robots"
        content="noindex,nofollow">`, `X-Robots-Tag: noindex,nofollow`,
        `Referrer-Policy: no-referrer`, and **no** Open Graph / Twitter
        / Farcaster Frame / oEmbed tags. Unknown / revoked / expired
        tokens all return the same `404` body so a probe can't tell
        the cases apart. `Cache-Control: no-store`.
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9_-]+$"
      responses:
        "200":
          description: HTML landing page with SPA redirect.
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Token unknown, revoked, or expired.
          content:
            text/plain:
              schema:
                type: string

  /api/simulation/{simulation_id}/embed-summary:
    get:
      tags: [Publish & Embed]
      summary: Compact summary for the embed widget — public sims only.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Summary payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/EmbedSummary" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/share-card.png:
    get:
      tags: [Publish & Embed]
      summary: 1200×630 social share card (Open Graph image).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "PNG image with `Cache-Control: public, max-age=3600`."
          content:
            image/png:
              schema:
                type: string
                format: binary
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/replay.gif:
    get:
      tags: [Publish & Embed]
      summary: Animated belief-replay GIF (one frame per round).
      description: |
        1200×630 animated GIF showing per-round belief drift — bullish
        / neutral / bearish bars sliding to each round's distribution
        with a round counter and progress bar. Same publish gate as the
        share card. Discord and Slack auto-play GIFs from a direct file
        URL, so dropping this link in a channel renders the animation
        inline.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "GIF image with `Cache-Control: public, max-age=3600`."
          content:
            image/gif:
              schema:
                type: string
                format: binary
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/transcript.md:
    get:
      tags: [Publish & Embed]
      summary: Citable Markdown transcript of the simulation.
      description: |
        Per-round agent posts + stance labels + final consensus rendered
        as Markdown with a YAML front-matter block (`sim_id`, `scenario`,
        `agent_count`, `total_rounds`, `consensus_label`, …). Notion,
        Obsidian, Bear, and Substack import the front matter as page
        metadata.

        Pairs with `share-card.png` (preview) and `replay.gif` (motion)
        as the third quote-friendly share format. Same publish gate as
        the share card — requires `is_public=true` on the simulation
        state.

        Trajectories longer than ~80 rounds get the middle rounds
        elided in the rendered Markdown body (the JSON form preserves
        every round) so the document stays readable.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Markdown document with `Cache-Control: public, max-age=60`."
          content:
            text/markdown:
              schema:
                type: string
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/transcript.json:
    get:
      tags: [Publish & Embed]
      summary: Structured JSON transcript of the simulation.
      description: |
        Same payload the Markdown transcript renders from, but as JSON
        so SDK consumers and downstream pipelines (LLM-as-judge evals,
        Python client SDK, …) can consume the per-round agent posts +
        stance labels without parsing Markdown.

        Same publish gate as the Markdown transcript. Pretty-printed
        (`indent=2`) so a `curl` to a file is immediately readable.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "JSON transcript with `Cache-Control: public, max-age=60`."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SimulationTranscript" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/trajectory.csv:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as RFC 4180 CSV.
      description: |
        One row per recorded round with the bullish / neutral / bearish
        split (using the same ±0.2 stance threshold as the gallery,
        share card, replay GIF, transcript, webhook, and feed surfaces),
        participating agents, post + engagement counts, and the overall
        quality health. Intended for `pandas.read_csv()` / Excel /
        Tableau / R / Observable — the analyst's default toolkit.

        Pairs with `share-card.png` (preview), `replay.gif` (motion),
        and `transcript.{md,json}` (prose) as the **fifth** export
        surface — the previous four cover the qualitative read of a
        simulation; this one covers the quantitative one.

        Same publish gate as the transcript. The CSV header row is
        emitted even when the trajectory is empty so downstream
        consumers don't have to special-case zero-row files.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "CSV with `Content-Type: text/csv; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            text/csv:
              schema:
                type: string
                description: |
                  RFC 4180 CSV. Column order is locked to:
                  `round,round_timestamp,bullish_pct,neutral_pct,bearish_pct,participating_agents,total_posts,total_engagements,quality_health,participation_rate`.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/trajectory.jsonl:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as newline-delimited JSON.
      description: |
        Same row shape as `trajectory.csv` but as JSON Lines — one
        object per line. The format `pandas.read_json(lines=True)`,
        DuckDB `read_json_auto`, and most stream-processing pipelines
        consume natively without a separate CSV-to-DataFrame
        conversion.

        Same publish gate as the CSV form. Empty trajectories yield
        zero bytes (no rows, no header — JSONL has no header concept)
        so a curl into a file produces an empty but well-formed JSONL
        document.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "JSONL with `Content-Type: application/jsonl; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            application/jsonl:
              schema:
                type: string
                description: |
                  One `SimulationTrajectoryRow` JSON object per line.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/chart.svg:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as a stdlib-rendered SVG.
      description: |
        Scalable-vector companion to the share card (PNG verdict),
        replay GIF (motion), and Jupyter notebook (matplotlib). Three
        polylines — bullish (`#22c55e`), neutral (`#6b7280`), bearish
        (`#ef4444`) — plotted against round number with grid lines,
        legend, axis labels, and the scenario title. Same ±0.2 stance
        threshold as every other surface so the curves match the share
        card's final-state bars.

        Embeddable as `<img src="…/chart.svg">` in Notion, Substack,
        Ghost, GitHub READMEs, and LaTeX `\includesvg{}` — vector
        means no resolution choice, and `<img>` means no JavaScript at
        the embed site. Pure stdlib `xml.etree.ElementTree`; zero new
        deps.

        Same publish gate as the trajectory CSV. Returns `404` when no
        trajectory rows are on disk yet (the sim is mid-startup) so an
        embedding site can render a placeholder rather than a blank
        SVG that looks like a styling bug. `viewBox` is `0 0 800 400`;
        consumers can size the embed with the `<img>` width/height
        attributes without losing fidelity.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "SVG with `Content-Type: image/svg+xml; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            image/svg+xml:
              schema:
                type: string
                description: |
                  Complete SVG 1.1 document with `viewBox="0 0 800 400"`.
                  Three `<polyline>` elements (one per stance) on a
                  white background with a 5-line y-axis grid and
                  round-number x-axis labels.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/frame-metadata:
    get:
      tags: [Publish & Embed]
      summary: Farcaster Frame v2 metadata for a published simulation.
      description: |
        Closes the Base-chain audience gap that none of the other share
        surfaces address. $MIROSHARK lives on Base, and the Base-native
        social network is Farcaster / Warpcast. A `/share/<id>` URL
        pasted into a Farcaster cast today shows a blank link card;
        with the `fc:frame:*` meta tags the share blueprint emits
        alongside the existing Open Graph block, every cast containing
        a MiroShark share URL becomes an interactive Frame card —
        chart-SVG image as the Frame preview, a "View Simulation →"
        link button, no JavaScript, no new deps.

        The endpoint exists so the frontend EmbedDialog can build the
        Warpcast compose link dynamically without hardcoding the base
        URL, and so future Frame-action buttons (post actions, mint
        flows) can be added via backend config rather than HTML
        redeployment. The Frame spec itself reads the meta tags from
        the share-page HTML head — see `backend/app/api/share.py` for
        the server-side tag injection.

        Same publish gate as the chart SVG: `403` on unpublished sims
        so private scenario titles never leak through the Frame
        metadata. Sims with no trajectory data yet still return `200` —
        the image URL falls back to `share-card.png` so a fresh sim
        still gets a Farcaster-ready unfurl while the trajectory
        accumulates. The `has_trajectory` flag in the response signals
        whether the chart SVG is the backing image (`true`) or the
        share-card PNG (`false`).

        Honours `X-Forwarded-Proto` / `X-Forwarded-Host` for
        deployments behind a TLS-terminating reverse proxy so the
        Frame image / share / button-target URLs resolve to the public
        origin, not the WSGI `SERVER_NAME`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Frame metadata JSON with `Cache-Control: public, max-age=300`."
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/FrameMetadata"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/archive.zip:
    get:
      tags: [Publish & Embed]
      summary: Bundle every published share surface into a single ZIP download.
      description: |
        The take-offline composite. Until now a researcher finishing a
        simulation had to chain up to nine separate routes to take the
        artifact set offline (`share-card.png`, `chart.svg`,
        `trajectory.csv` / `.jsonl`, `transcript.md`, `thread.txt`,
        `reproduce.json`, `notebook.ipynb`, `signal.json`). This endpoint
        collapses every successfully-rendered surface into one
        timestamped ZIP plus a `manifest.json` that pairs each contained
        file with its SHA-256, byte size, MIME type, and canonical
        source URL.

        Compositional, not duplicative — every bundled file is
        byte-for-byte identical to what the standalone surface route
        serves, so citation hashes line up across both distribution
        paths.

        Best-effort assembly. Missing or corrupt artifacts (a sim
        without a trajectory yet, a renderer that needs Pillow on a
        stripped install) are simply omitted from the archive rather
        than failing the request. The `file_count` and `files` array
        in the manifest enumerate exactly what landed inside the ZIP.

        Deterministic per-file timestamps. Every `ZipInfo` entry uses a
        fixed `date_time` (`1980-01-01T00:00:00`) so the contained file
        bytes are reproducible across builds — only `archive_generated_at`
        in the manifest drifts. Consumers needing bit-stable archives
        can hash each contained file individually (each is bytewise
        deterministic) and ignore the manifest timestamp.

        Same publish gate as every other share surface (`is_public=true`).
        Returns `404` when no exportable surfaces are available yet (a
        freshly published sim that hasn't recorded any rounds — even
        `signal.json` and `reproduce.json` need a final belief block).
        Cached for 5 minutes — matches the notebook + reproduce.json
        cadence.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            ZIP archive with `Content-Type: application/zip` and
            `Content-Disposition: attachment; filename="miroshark-<sim_id_prefix>-<date>.zip"`.
            The `X-MiroShark-Archive-Files` response header reports the
            number of bundled files so a HEAD request can render a
            preview without downloading the body. Cached
            `public, max-age=300`.
          content:
            application/zip:
              schema:
                type: string
                format: binary
                description: |
                  ZIP archive containing zero or more share-surface
                  files plus a `manifest.json` (`ArchiveManifest`
                  schema). The manifest enumerates every contained
                  file with its SHA-256, byte size, MIME type, and
                  canonical source URL.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/badge.svg:
    get:
      tags: [Publish & Embed]
      summary: Flat Shields.io-compatible consensus status badge SVG.
      description: |
        Renders a 20-pixel-tall flat status badge as an SVG document.
        Left half: `MiroShark` on the standard Shields.io grey
        (`#555555`). Right half: `{direction} {confidence_pct}%` on
        the stance colour — `#22c55e` (Bullish), `#6b7280` (Neutral),
        `#ef4444` (Bearish). Pill ends via a rounded `clipPath` with
        `rx="3"` so the badge renders consistently across every
        `<img>` consumer.

        Direction + confidence derive from the same `compute_signal`
        pipeline `signal.json` uses, so the badge payload matches the
        signal payload, the gallery card, and the share card
        byte-for-byte. Pure stdlib renderer
        (`xml.etree.ElementTree`); zero new dependencies.

        Embed in any GitHub README, Notion page, Substack post, or
        personal site:

        ```markdown
        ![MiroShark](https://your-host/api/simulation/<id>/badge.svg)
        ```

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when no rounds have been
        recorded yet (no `belief.final` block on the embed summary)
        so an embedded `<img>` renders a broken-image placeholder
        rather than a misleading `Unknown 0%` badge.

        Cached for **60 seconds** — short enough that a live sim's
        stance flip propagates through to embedded badges within a
        polling cycle (matches the watch-page poll cadence), long
        enough that a popular README doesn't hammer the
        embed-summary build with one fetch per page view.

        The rendered SVG is bytewise-deterministic across calls with
        the same inputs — a future ETag layer can hash the response
        bytes directly.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Flat 20-pixel status badge with `Content-Type: image/svg+xml; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            image/svg+xml:
              schema:
                type: string
                description: |
                  Complete SVG 1.1 document — XML declaration,
                  namespace, `viewBox`, accessibility `role="img"` +
                  `aria-label`, and a rounded `clipPath` so the pill
                  ends render across every `<img>`-tag consumer.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/signal.json:
    get:
      tags: [Publish & Embed]
      summary: Machine-readable trading signal derived from a published sim.
      description: |
        Collapses the final-round belief split + quality health into a
        single action primitive a quant tool, Zapier workflow, or alert
        pipeline can consume directly: `direction` (Bullish / Neutral /
        Bearish) + `confidence_pct` (0 = pure three-way split, 100 =
        unanimous leading stance) + `risk_tier` (low / medium / high,
        mapped from quality health) + the three component percentages.

        Pure derivation — the underlying numbers are the same ones the
        embed-summary endpoint already builds, the gallery card already
        displays, and the share card PNG already renders. A
        "Bullish 62%" signal here matches what every other surface
        reports for the same simulation, byte-for-byte; the only new
        information is the *shape*, not the data.

        Tie-break order on the plurality is documented and stable:
        `bullish > bearish > neutral` so a consumer can predict the
        output even on rare even-split rounds.

        Quality-to-risk mapping: `excellent` → `low-risk`, `good` →
        `medium-risk`, anything else (`fair` / `poor` / missing /
        `"N/A"`) → `high-risk`. The default-to-high posture is
        deliberate — a quant tool that gets a signal with unknown
        quality should treat it cautiously, not optimistically.

        Same publish gate as every other share surface (`is_public=true`).
        Returns `404` when the simulation hasn't recorded any rounds
        yet (no `belief.final` block) so an embedding tool can render
        a "not ready" placeholder rather than a half-baked signal an
        alert pipeline might act on. Cached for 5 minutes — a live
        sim's final stance can flip round-to-round, so a short cache
        lets alert pipelines see fresh signals while crawlers don't
        hammer the embed-summary build.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Trading signal payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSignal"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/peak-round:
    get:
      tags: [Publish & Embed]
      summary: Peak-round belief analytics for a published sim.
      description: |
        The analytical counterpart to `trajectory.csv` (raw per-round
        data) and `chart.svg` (the visual). Collapses the whole belief
        trajectory into a single O(n) summary of inflection points:
        the round each stance reached its maximum (`bullish` /
        `neutral` / `bearish` → `{round, pct}`), the
        `most_volatile_round` (round with the largest summed
        round-over-round swing), the `max_swing_pct` value itself, and
        `total_rounds`.

        Pure derivation — the per-round percentages come from the same
        `compute_stance_split` (±0.2 threshold) that `trajectory.csv`
        uses, so "bullish peaked at 71% on round 4" here matches row 4
        of the CSV. The only new information is the *shape*: a
        machine-readable inflection summary a quant tool or research
        script can read without parsing every trajectory row.

        Peak ties resolve to the *earliest* round (strict `>`
        comparison), so the output is deterministic on a flat-topped
        trajectory. `most_volatile_round` is likewise the earliest
        round carrying the maximum swing; a single-round or fully flat
        trajectory reports the first round with a `0.0` swing.

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when the simulation has no
        trajectory data yet so a consumer can tell a "not ready" sim
        (404) apart from a "private" sim (403). Cached for 5 minutes —
        matches the `chart.svg` / `trajectory` / `signal.json` cadence.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Peak-round analytics payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeakRoundResponse"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/volatility:
    get:
      tags: [Publish & Embed]
      summary: Belief volatility analytics for a published sim.
      description: |
        The turbulence counterpart to `peak-round` and `signal.json`.
        `signal.json` answers *where the swarm landed* (direction +
        confidence); `peak-round` picks the single most-volatile round.
        This surface describes the *distribution* of round-over-round
        swings so a quant tool can tell a high-volatility Bullish
        result (agents swung repeatedly before aligning) from a
        low-volatility one (consensus formed early and held) — the
        same final direction can mean different things to a
        position-sizing model.

        Pure derivation. Each round-over-round delta is the same
        summed absolute swing `|Δbullish| + |Δneutral| + |Δbearish|`
        `peak-round` already uses to pick its single max, so
        `max_delta_round` here equals `most_volatile_round` there on
        identical input by construction. The new information is the
        *distribution* (`mean_delta_pct`, `std_dev_delta_pct`,
        `volatility_index`, `trend`) rather than just the maximum.

        `volatility_index = min(std_dev_delta_pct * 5, 100)` — a std
        dev of 20 pp maps to 100, a fully flat trajectory lands at 0.
        `trend` is `"stable"` when `std_dev_delta_pct < 3`,
        `"converging"` when the second half's delta std dev is
        strictly lower than the first half's, and `"contested"`
        otherwise. Trajectories with fewer than four deltas fall back
        to the std-dev-only buckets.

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when the simulation has
        fewer than two rounds (no deltas) so a consumer can tell a
        "not ready" sim (404) apart from a "private" sim (403).
        Cached for 5 minutes — matches the `chart.svg` /
        `peak-round` / `signal.json` cadence.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Belief volatility analytics payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolatilityResponse"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/clone.json:
    get:
      tags: [Publish & Embed]
      summary: Clone payload — the *inputs* this sim was built with.
      description: |
        Every other share surface returns outputs (`signal.json`,
        `chart.svg`, `peak-round`, `volatility`, `polymarket.json`,
        `badge.svg`, the share card, the transcript, the trajectory).
        None return inputs — the exact configuration that produced
        those outputs. Without an inputs surface, forking a published
        sim requires either re-entering its parameters by hand or
        scraping `state.json` out-of-band.

        This endpoint closes that gap. The returned `clone_payload`
        block is wire-compatible with `POST /api/simulation/create` —
        a caller with the same `project_id` re-runs the sim with a
        single curl. The `simulation_requirement` field is echoed
        alongside for context (it lives at the project level rather
        than the create body), so a fork that needs a different
        scenario updates the project first.

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when no `state.json` exists
        on disk (mid-prepare or pruned), so a consumer can tell a
        "not ready" sim (404) apart from a "private" sim (403).
        Cached for 1 hour — the clone payload is structural; unlike
        the analytical surfaces (peak-round / volatility / signal),
        these inputs don't shift round-to-round.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Clone payload envelope (wire-compatible with `POST /api/simulation/create`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneResponse"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/agents.json:
    get:
      tags: [Publish & Embed]
      summary: Agent roster export — the *participants* surface.
      description: |
        Every prior share endpoint describes what the swarm concluded
        (`signal.json`, `polymarket.json`, `volatility`) or how belief
        evolved (`chart.svg`, `peak-round`, `agents/sparklines`,
        `trajectory.csv`); none describe *who was in the debate* in
        machine-readable form. Agent identities have been locked in
        `transcript.md` Markdown headings — a researcher comparing pool
        composition across runs had to regex through it.

        This endpoint exposes the same identities as a JSON array. Each
        agent's `name`, `username`, `bio`, `persona_preview`,
        demographics (`age` / `gender` / `mbti` / `country` /
        `profession` / `interested_topics`), `karma`, plus
        `final_stance` / `final_position` / `rounds_participated`
        derived from the same `trajectory.json` the per-agent
        sparklines surface reads. The ±0.2 stance threshold is shared,
        so an agent tagged `bullish` here is `bullish` in the
        transcript and sparkline.

        Persona prose is previewed to 280 chars to keep multi-agent
        payloads tractable for research scripts (full text remains in
        `transcript.md`). Agents are ordered most-bullish-first by
        `final_position`; ties break on `agent_id` ascending; profile-
        only agents (no belief data) sort to the bottom with
        `final_stance="neutral"`, `final_position=null`,
        `rounds_participated=0` — the participant surface answers *who
        was here*, not *did they say anything*.

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when no profile file exists
        on disk yet, so a consumer can tell a "not ready" sim (404)
        apart from a "private" one (403). Cached for 1 hour — the
        roster is structural (it doesn't shift round-to-round),
        matching the `clone.json` cadence rather than the 5-minute
        analytical surfaces.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Agent roster envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsExportResponse"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/agents/sparklines:
    get:
      tags: [Publish & Embed]
      summary: Per-agent belief sparklines for a published sim.
      description: |
        The agent-level companion to `chart.svg` / the embed-summary
        (which draw the *aggregate* swarm belief curve) and `peak-round`
        (which collapses that curve into inflection points). This surface
        exposes the layer underneath — *each individual agent's* belief
        path as a scalar position per round, the series a 40×15px SVG
        sparkline draws. Answers the swarm-convergence question a
        researcher asks first ("which agent anchored the consensus? did
        one cohort align before another?") without parsing the
        transcript.

        Pure derivation — each per-agent scalar is the same
        `_avg_position` mean of per-topic `belief_positions` every other
        surface averages, and the final stance uses the same `±0.2`
        threshold, so an agent tagged "bullish" here is "bullish" in the
        transcript. Agent names come from `reddit_profiles.json`; an id
        with no profile row falls back to `"Agent <id>"`.

        Agents are ordered most-bullish-first by final position (ties
        broken by `agent_id`). `round_count` is the number of distinct
        rounds carrying per-agent data; `has_per_agent_data` is `true`
        only when at least one agent has a 2-point trajectory (enough to
        draw a line) — a single-round sim returns the agents as single
        dots with the flag `false`.

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when no agent holds a usable
        belief position yet, so a consumer can tell a "not ready" sim
        (404) apart from a "private" sim (403). Cached for 5 minutes —
        matches the `chart.svg` / `trajectory` / `peak-round` cadence.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Per-agent sparklines payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSparklinesResponse"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/polymarket.json:
    get:
      tags: [Publish & Embed]
      summary: Polymarket-shaped binary-market prediction for a completed sim.
      description: |
        Adapts the generic `signal.json` action primitive into the
        binary YES / NO probability envelope a Polymarket trading bot
        expects between *"simulation result"* and *"actionable market
        signal"*. The first share surface shaped for a specific
        external integrator.

        Direction-aware `yes_probability`: a Bullish swarm emits
        `bullish_pct / 100` (high YES); a Bearish swarm emits
        `1 - bearish_pct / 100` (low YES — the residual probability);
        a Neutral swarm lands exactly at `0.5` (coin-flip prior).
        `yes_probability + no_probability == 1.0` within float
        tolerance — the invariant a Polymarket order-book consumer
        expects.

        `confidence_tier` is a four-bucket discrete scale on top of
        `signal.json`'s continuous `confidence_pct`:
        `<25 → speculative`, `25-50 → moderate`,
        `50-75 → confident`, `≥75 → high-conviction`. Upper bounds
        are exclusive. Bots typically gate position size on this
        tier rather than the raw continuous value.

        Stricter publish gate than `signal.json`: this surface only
        returns a payload for sims with `status == "completed"` (a
        Polymarket bot acting on a mid-run signal would chase
        numbers that can still flip). Mid-run sims and freshly-
        published sims that haven't recorded any rounds yet both
        return `404`. Same `is_public=true` requirement as every
        other share surface. Cached for 5 minutes — matches the
        `signal.json` cadence so a bot polling both surfaces sees
        consistent values.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Polymarket prediction payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolymarketPrediction"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/thread.txt:
    get:
      tags: [Publish & Embed]
      summary: Twitter / X tweet thread for a published simulation.
      description: |
        Auto-formatted tweet thread that copy-pastes 1:1 into X — one
        intro tweet (scenario + scale + consensus label), one tweet per
        belief inflection point (rounds where the dominant stance
        crossed the ±0.2 threshold in either direction), and one
        closing tweet (final verdict + quality + watch + share URLs).
        Each tweet ≤280 characters; tweets are separated by `---`
        on their own line so an operator can scan visually and copy
        individual tweets.

        Pairs with `share-card.png` (preview), `replay.gif` (motion),
        `transcript.md` / `transcript.json` (prose), and
        `trajectory.csv` / `trajectory.jsonl` (data) as the **sixth**
        share format. The previous five surfaces target visual / motion
        / prose / data; this one is the short-form text channel that
        X/Twitter speaks natively.

        Inflection-point detection uses the same ±0.2 stance threshold
        every other surface uses, with a small hysteresis (the dominant
        stance must lead the runner-up by ≥0.2pp) so a near-tie round
        doesn't generate a "stance shifted to neutral" tweet for every
        round of a balanced run. Threads longer than `MAX_THREAD_TWEETS`
        (15) are truncated to the first 3 + last 3 inflections with a
        single bridge line — the `truncated` flag in the JSON form
        signals this happened.

        Same publish gate as the share card and transcript. Honors
        `X-Forwarded-Proto` / `X-Forwarded-Host` for the watch + share
        URLs in the close tweet.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Plain-text thread with `Content-Type: text/plain; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Tweets separated by a `---` line. Each tweet ≤280
                  characters. Trailing newline included.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/thread.json:
    get:
      tags: [Publish & Embed]
      summary: Same tweet thread as `thread.txt` but as structured JSON.
      description: |
        Returns the structured thread payload — `tweets`, `total`,
        `inflections_recorded`, `truncated` — so a programmatic consumer
        (Twitter scheduling tool, Notion dashboard, downstream LLM
        pipeline) can iterate the tweets without splitting the plain
        form on the `---` separator.

        Same publish gate, same threshold, and same truncation rules
        as `thread.txt`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Pretty-printed JSON with `Content-Type: application/json; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationThread"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/surface-stats:
    get:
      tags: [Publish & Embed]
      summary: Per-share-surface request counters for a published simulation.
      description: |
        Returns the number of times each share surface has served a
        successful response for this simulation — share card PNG,
        replay GIF, transcript (Markdown + JSON), trajectory
        (CSV + JSONL), tweet thread (TXT + JSON), live watch page,
        Atom / RSS feeds, reproducibility config (`reproduce.json`),
        and the lineage graph slice (`/lineage`) — plus a synthetic
        `total` summing all counters.

        The **inbound** observability surface — pairs with the
        outbound webhook delivery log so an operator running MiroShark
        for a DeFi fund or research group can see which surfaces their
        audience actually uses. Closes the inbound side of the
        distribution loop opened by the webhook delivery log on the
        outbound side.

        Counter file lives at `<sim_dir>/surface-stats.json`. Bounded
        in size (one small JSON object) and atomically updated via
        tempfile + `os.replace`, so concurrent requests can never
        corrupt the file. A corrupt file is silently reset to zeros
        rather than 500ing the read.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Per-surface counters + total.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationSurfaceStats"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/reproduce.json:
    get:
      tags: [Publish & Embed]
      summary: Machine-readable reproducibility config blob for a published simulation.
      description: |
        Returns a complete JSON document carrying every parameter
        another operator would need to re-run the same simulation —
        scenario text, agent count, total rounds, platform toggles
        (twitter / reddit / polymarket + market count), the four
        cadence knobs from `time_config` (minutes per round, total
        hours, peak / off-peak windows), any operator-injected director
        events, and a `lineage` block describing whether this
        simulation is original, a plain fork of another sim, or a
        counterfactual branch (with the parent simulation id and
        injection metadata travelling along).

        This is the **citation primitive** behind the existing share
        surfaces. Six of the ten share surfaces (transcript, trajectory,
        thread, watch, GIF, share card) make a finished simulation
        citable — but until this endpoint shipped, none of them carried
        the parameters needed to reproduce the run. PR #71's shareable
        scenario URLs carry the scenario text and template slug; this
        blob carries everything else, in a single pretty-printed file
        suitable for a paper appendix or a thread screenshot.

        Identical exports of the same finished simulation produce
        bytewise-identical JSON (sorted keys + stable indent) — useful
        for citation hashes. Cached for 5 minutes; the blob does not
        change once the sim has reached a terminal state.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Reproducibility config blob.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReproductionConfig"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/cite.bib:
    get:
      tags: [Publish & Embed]
      summary: BibTeX academic citation entry for a published simulation.
      description: |
        Returns a single `@misc{…}` BibTeX entry for the simulation —
        the academic-citation layer closing the citation arc that
        starts with `reproduce.json` (parameters), continues with
        `notebook.ipynb` (analysis), and anchors on the OriginTrail
        DKG citation (provenance).

        The entry drops straight into a LaTeX paper source via
        `\bibliography{}` and imports cleanly into Zotero / Mendeley
        via their "Import from URL" flow (both readers consume
        `text/plain` BibTeX at an HTTP URL directly). The endpoint
        URL doubles as the import URL — no manual download step.

        Field map:

        * `title` — Scenario text (BibTeX-special-escaped), capped at
          200 chars with ellipsis. Falls back to "Untitled MiroShark
          simulation" when the scenario is empty.
        * `author` — `{MiroShark}` (brace-wrapped so BibTeX treats it
          as a corporate author).
        * `year` + `month` — Derived from `SimulationState.created_at`.
          Unparseable timestamps fall back to the current UTC year +
          month so the entry is always well-formed.
        * `url` — Canonical share URL (`<base>/share/<id>`).
        * `howpublished` — Wrapped in `\url{…}`, points at the
          `reproduce.json` endpoint so a reviewer who pastes the
          citation knows where the parameters live.
        * `note` — `Reproducibility SHA-256: <64-hex>`. Sourced from
          the persisted DKG citation when present (on-chain anchor is
          the source of truth), else freshly computed from the
          canonical `reproduce.json` bytes. Omitted when neither
          source is available.
        * `annote` — `OriginTrail DKG UAL: <ual>`. Present only when
          the sim has been anchored on the DKG via
          `POST /api/simulation/{id}/publish-dkg`.

        Citation key shape: `miroshark-<sim_id[:16]>` with
        non-`[A-Za-z0-9_-]` characters stripped (the BibTeX grammar
        allows only those in a citation key). Stable across re-renders
        of the entry, so an author who pinned the key once never sees
        their `\cite{}` references silently rewire on a re-export.

        Same publish gate as every other share surface
        (`is_public=true`). Cached for 5 minutes — the entry
        stabilises once the sim reaches a terminal state.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            BibTeX entry as `text/plain; charset=utf-8` with
            `Content-Disposition: inline; filename="miroshark-<id12>.bib"`
            so `curl -OJ` saves a ready-to-include `.bib` file.
            Cache-Control: `public, max-age=300`.
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Single BibTeX `@misc{…}` entry ending with a
                  trailing newline so concatenation with another
                  entry produces a well-formed `.bib` library.
              example: |
                @misc{miroshark-sim_abc123def4,
                  title        = {What if Aave's reserve factor doubled overnight?},
                  author       = {MiroShark},
                  year         = {2026},
                  month        = may,
                  url          = {https://miroshark.example.com/share/sim_abc123def456},
                  howpublished = {\url{https://miroshark.example.com/api/simulation/sim_abc123def456/reproduce.json}},
                  note         = {Reproducibility SHA-256: 5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8},
                  annote       = {OriginTrail DKG UAL: did:dkg:base:8453/0xabc/12345},
                }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/notebook.ipynb:
    get:
      tags: [Publish & Embed]
      summary: Pre-populated Jupyter notebook for a published simulation.
      description: |
        Returns a ready-to-run `.ipynb` document for the simulation —
        nbformat 4 JSON with the trajectory CSV embedded directly + a
        scaffolded sequence of code cells: imports, CSV load via
        `pd.read_csv(io.StringIO(...))`, belief-evolution line chart
        (bullish / neutral / bearish % over rounds, ±0.2 stance
        threshold consistent with every other surface), final-round
        consensus bar chart, and a quality + participation summary
        DataFrame.

        Pairs with `trajectory.csv` as the **second** institution-
        targeted export. The CSV told analysts *"here is the data"*;
        the notebook tells them *"here is the analysis, ready to run."*
        Institutional observers download this, open it in JupyterLab /
        VS Code / Colab, and have a working analysis without writing the
        usual `pd.read_csv()` + `matplotlib` boilerplate.

        **Standalone-runnable.** The trajectory data lives inside the
        notebook as a Python multi-line string — anyone with the
        `.ipynb` file can hit Run All in an air-gapped kernel; no
        network call back to the MiroShark host is needed. This matters
        for paper-appendix attachments and academic archive
        environments where reviewer kernels are sandboxed.

        Identical exports of the same finished simulation produce
        bytewise-identical notebooks (sort_keys + indent=2 + trailing
        newline). The file hash is therefore a stable citation key,
        same property the `reproduce.json` blob has. Cached for 5
        minutes; the notebook is stable once the sim reaches a terminal
        state.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            `application/x-ipynb+json` notebook. Treat as opaque JSON
            shaped by the [Jupyter nbformat 4 spec](https://nbformat.readthedocs.io/).
            `Content-Disposition: attachment; filename="miroshark-<id12>-notebook.ipynb"`.
          content:
            application/x-ipynb+json:
              schema:
                type: object
                description: |
                  nbformat 4 notebook document — see the [nbformat spec](https://nbformat.readthedocs.io/).
                  Top-level keys: `nbformat`, `nbformat_minor`,
                  `metadata` (kernelspec + language_info + a
                  `miroshark` block with `schema_version`,
                  `simulation_id`, `trajectory_sha256`), and `cells`
                  (markdown + code, see endpoint description for order).
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /share/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Public landing page with Open Graph + Twitter card meta tags.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays clean.
        Returns a tiny HTML page that bots scrape for OG tags and that
        browsers immediately bounce off via `<meta refresh>` + JS to the
        SPA. Honors `X-Forwarded-Proto` / `X-Forwarded-Host`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /oembed:
    get:
      tags: [Publish & Embed]
      summary: oEmbed 1.0 provider — auto-unfurl for MiroShark share URLs.
      description: |
        Mounted at the **root** (no `/api` prefix). Implements the
        discovery half of the [oEmbed 1.0 spec](https://oembed.com) so a
        paste of a `/share/<id>` link auto-unfurls into a rich sim card on
        the *writing* platforms — Notion, Ghost, Substack, WordPress — that
        read an `<link rel="alternate" type="application/json+oembed">`
        discovery tag rather than Open Graph meta. The share landing page
        emits that discovery tag for published sims; a consumer follows it
        here with the share `url` and renders the returned embed inline.

        Returns a `type: "rich"` payload: the `/api/simulation/<id>/share-card.png`
        thumbnail (1200×630) and an 800×500 iframe over the `/embed/<id>`
        SPA route. oEmbed adds a discovery *protocol* over surfaces that
        already ship — it renders nothing new itself.

        `format` selects the JSON (default) or XML representation. A
        foreign-host `url`, a URL with no recognisable sim path, an
        unpublished sim, and a missing sim all return `404` — the endpoint
        only describes published sims hosted on this deployment and never
        confirms a private sim exists. Honors `X-Forwarded-Proto` /
        `X-Forwarded-Host`.
      parameters:
        - name: url
          in: query
          required: true
          description: |
            The canonical MiroShark share URL the consumer scraped the
            discovery tag from (e.g. `https://your-host/share/<id>`). Must
            resolve to a sim hosted on this deployment.
          schema: { type: string, format: uri }
        - name: format
          in: query
          required: false
          description: Response representation. `json` (default) or `xml`.
          schema: { type: string, enum: [json, xml], default: json }
      responses:
        "200":
          description: oEmbed `rich` payload (JSON or XML per `format`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OEmbedResponse" }
            text/xml:
              schema: { type: string }
        "400":
          description: Missing required `url` query parameter.
          content:
            text/plain:
              schema: { type: string }
        "404":
          description: |
            No published sim found for that URL — foreign domain,
            unrecognised path, unpublished sim, or missing sim.
          content:
            text/plain:
              schema: { type: string }
        "501":
          description: Requested `format` is not supported (use json or xml).
          content:
            text/plain:
              schema: { type: string }

  /watch/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Live spectator-watch page — minimal full-viewport broadcast view.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays a
        clean "watch live →" link. The body carries Open Graph +
        Twitter card meta tags so the URL unfurls as a 1200×630 image
        when pasted into Twitter/X, Discord, Slack, LinkedIn, iMessage,
        etc. — same auto-unfurl behaviour as `/share/{simulation_id}`,
        but the surface is purpose-built for *in-progress* simulations
        rather than finished ones.

        The page is fully self-contained server-side HTML — no SPA
        build dependency. A vanilla-JS poller updates the belief bar,
        round counter, and progress bar every 15 s by hitting the
        existing `/api/simulation/{simulation_id}/embed-summary` and
        `/api/simulation/{simulation_id}/run-status` REST endpoints.
        Once the runner reaches a terminal state (`completed` /
        `failed` / `stopped`) polling stops and the "View full
        simulation →" + "Fork this scenario →" CTAs are revealed.

        No auth — but the underlying live endpoints honour
        `is_public`, so a private simulation only renders the bare
        broadcast frame (no scenario, no live numbers). Honors
        `X-Forwarded-Proto` / `X-Forwarded-Host`.

        Seventh thin renderer over the same on-disk `sim_dir/` folder
        alongside the share card (PNG), replay GIF, transcript
        (Markdown + JSON), public-gallery feeds (Atom + RSS), and
        trajectory export (CSV + JSONL).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/simulation/public:
    get:
      tags: [Publish & Embed]
      summary: Filterable, paginated gallery feed of public simulations.
      description: |
        Discovery layer for the `/explore` and `/verified` views. Returns
        the same gallery card payload that the share card, replay GIF,
        transcript, RSS feed, and trajectory exports all share — same
        ±0.2 stance threshold, same on-disk `sim_dir/` substrate.

        Optional filters compose with logical AND:

        * `q` — case-insensitive substring match against the scenario.
        * `consensus` — `bullish` / `neutral` / `bearish`. Filters by the
          dominant final-round stance using the same ±0.2 threshold the
          share card / replay GIF / transcript / webhook / feed all use.
        * `quality` — `excellent` / `good` / `fair` / `poor`. Compared
          against the first word of the simulation's `quality_health`.
        * `outcome` — `correct` / `incorrect` / `partial`. Implies
          `verified=1`.

        `total` reflects the filtered count (not the full corpus), so the
        client can render an accurate "X remaining" hint and `has_more`
        flag for the active filter set.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: page
          description: |
            1-based page number — alternative to `offset`. Wins over
            `offset` when both are supplied. `page=1` is offset 0.
          schema: { type: integer, minimum: 1 }
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the listing to
            simulations with a recorded outcome annotation — i.e. the
            "Verified Prediction" hall.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring match against the scenario text.
            Trimmed and capped at 200 characters.
          schema: { type: string, maxLength: 200 }
        - in: query
          name: consensus
          description: |
            Filter to cards whose dominant final consensus matches the
            chosen stance (using the same ±0.2 threshold as every other
            surface).
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: |
            Filter to cards whose `quality_health` first word matches the
            requested tier (case-insensitive).
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: |
            Filter to verified simulations whose recorded outcome label
            matches. Implies `verified=1`.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: |
            `date` (default — newest first), `rounds` (highest
            `current_round` first), `agents` (largest population
            first), or `trending` (highest cumulative share-surface
            serve count first — sums every counter the
            `surface-stats` endpoint exposes; ties break on date so
            the most-served-and-most-recent floats above the
            most-served-and-stale).
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
      responses:
        "200":
          description: Gallery cards.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/GalleryCard" }
                      count: { type: integer }
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
                      page: { type: integer }
                      has_more: { type: boolean }
                      verified_only: { type: boolean }
                      q: { type: string }
                      consensus:
                        type: string
                        nullable: true
                        enum: [bullish, neutral, bearish, null]
                      quality:
                        type: string
                        nullable: true
                        enum: [excellent, good, fair, poor, null]
                      outcome:
                        type: string
                        nullable: true
                        enum: [correct, incorrect, partial, null]
                      sort:
                        type: string
                        enum: [date, rounds, agents, trending]

  # ────────────────────────────────────────────────────────────────────
  # Export
  # ────────────────────────────────────────────────────────────────────

  /api/feed.atom:
    get:
      tags: [Publish & Embed]
      summary: Atom 1.0 syndication feed of the public simulation gallery.
      description: |
        Public MiroShark simulations rendered as an Atom 1.0 XML feed so
        researchers and tooling operators can subscribe via Feedly,
        Readwise, Inoreader, Obsidian RSS, NetNewsWire — every newly
        published simulation lands in their reader the same way an AI
        newsletter does.

        Mirrors `GET /api/simulation/public` selection (publish-gated,
        sorted by `created_at` desc, default cap 20 entries) so a
        subscription stays in lockstep with what shows up on `/explore`.
        Pure stdlib XML — zero new dependencies.

        Each entry carries: scenario as title, consensus split + quality
        + outcome label as summary, share-card PNG as `<media:thumbnail>`
        + `<media:content>`, replay GIF as `<media:content>` so River-
        view aggregators surface motion previews automatically.

        Browsers auto-discover this feed via the `<link rel="alternate"
        type="application/atom+xml">` tag in `index.html`.

        **Filtered feeds.** The same filter knobs the gallery API
        exposes are honoured here — `?consensus=bullish&quality=excellent`
        turns the feed into a "bullish + excellent" signal source for
        n8n, Zapier, Make, or any RSS reader. Filters combine with
        logical AND, unknown values fall back to "no filter" for that
        knob, and active filters are echoed in the feed channel title
        + subtitle so subscribers can tell which slice they're on.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation — the same
            curated set the `/verified` page surfaces.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring search over each simulation's
            scenario text. Matches the gallery API's `?q=` knob.
          schema: { type: string }
        - in: query
          name: consensus
          description: |
            Filter to simulations whose dominant belief stance matches
            the value. Uses the same ±0.2 stance threshold the gallery,
            share card, replay GIF, and webhook all share — a
            33.4 / 33.3 / 33.3 split falls out of every bucket.
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: |
            Filter to simulations whose `quality_health` tier matches
            the value. Compared case-insensitively against the
            lowercased first word, so `Good with caveats` slots into
            `quality=good`.
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: |
            Filter to simulations whose operator-marked outcome label
            matches the value. Subset of `verified=1` that further
            narrows on the resolution direction.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: |
            Sort key. `date` is newest-first (default). `trending` ranks
            cards by their cumulative share-surface serves
            (`surface-stats.json` total) so a viral run floats above a
            forgotten one. `rounds` / `agents` mirror the gallery sort
            keys.
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
        - in: query
          name: limit
          description: |
            Maximum entries to include. Clamped to the feed-specific cap
            (50) — smaller than the gallery API's 100 because
            aggressive aggregators re-fetch the feed every few minutes
            and a 100-entry XML doc costs them too much per poll.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: |
            Atom 1.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/atom+xml:
              schema: { type: string }

  /api/feed.rss:
    get:
      tags: [Publish & Embed]
      summary: RSS 2.0 syndication feed of the public simulation gallery.
      description: |
        Same content + selection + filter knobs as `/api/feed.atom`
        rendered as RSS 2.0 for older readers and self-hosted
        aggregators that haven't moved off the legacy format. Published
        runs include their share-card PNG as an `<enclosure>` so
        podcast-style readers handle it natively. Filtered streams
        (`?consensus=` / `?quality=` / `?sort=trending` / `?q=` /
        `?outcome=` / `?verified=` / `?limit=`) are supported so the
        discovery channel doesn't fragment on format.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring search over each simulation's
            scenario text.
          schema: { type: string }
        - in: query
          name: consensus
          description: Dominant-stance filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: Quality-tier filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: Outcome-label filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: Sort key, same options as `/api/feed.atom`.
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
        - in: query
          name: limit
          description: Maximum entries to include, capped at 50.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: |
            RSS 2.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/rss+xml:
              schema: { type: string }

  /sitemap.xml:
    get:
      tags: [Discovery]
      summary: Auto-generated public-simulation sitemap (sitemaps.org 0.9).
      description: |
        Walks the public-simulation corpus (`is_public=true` only) and
        emits one `<url>` block per `/share/<id>` plus one per
        `/watch/<id>`. `<lastmod>` is W3C `YYYY-MM-DD` form derived
        from the simulation's `updated_at` / `created_at` /
        `state.json` mtime fallback chain. `<changefreq>` is `always`
        for in-progress sims (the belief bars genuinely change every
        round) and `weekly` for completed share entries / `daily` for
        completed watch entries.

        Mounted at the root (no `/api` prefix) so crawlers find it
        where the protocol convention places it. `Cache-Control:
        public, max-age=3600` — hourly is fast enough for a freshly
        published sim to appear at the next refresh, slow enough to
        absorb noisy crawler polling. Sims are sorted by
        `simulation_id` ascending so two consecutive renders against
        the same corpus produce byte-identical XML.

        Capped at 50,000 `<url>` entries per the sitemap spec
        ceiling. MiroShark's public corpus is currently three-figure
        small; the cap is defense-in-depth against pathological
        bulk-fork patterns.

        Returns `404` when `ENABLE_SITEMAP=false` so private
        deployments don't even hint that the sitemap surface exists.
        `robots.txt` advertises this URL via the standard `Sitemap:`
        directive — submit once to Google Search Console (or any
        compliant crawler) and every newly published sim becomes
        searchable on the next crawl.
      responses:
        "200":
          description: |
            Sitemap XML document. `Content-Type: application/xml`.
          content:
            application/xml:
              schema: { type: string }
        "404":
          description: |
            `ENABLE_SITEMAP=false` on this deployment.
          content:
            text/plain:
              schema: { type: string }

  /robots.txt:
    get:
      tags: [Discovery]
      summary: Crawler directives for the deployment.
      description: |
        Always served (whether `ENABLE_SITEMAP=true` or not) so
        well-behaved crawlers see the `Disallow: /api/` directive
        that keeps the JSON namespace out of the search index. Carries
        `Allow:` lines for the public-discovery surfaces (`/share/`,
        `/watch/`, `/explore`, `/verified`, `/embed/`).

        When the sitemap is enabled, a trailing
        `Sitemap: <PUBLIC_BASE_URL>/sitemap.xml` line points crawlers
        at it for automatic discovery. When disabled, the line is
        omitted so the URL doesn't leak through robots.txt either.
        `Cache-Control: public, max-age=3600` mirrors the sitemap
        cadence so a single CDN purge refreshes both surfaces.
      responses:
        "200":
          description: |
            Plain-text robots directives.
          content:
            text/plain:
              schema: { type: string }

  /api/config/notifications:
    get:
      tags: [Settings & Push]
      summary: Public notification-channel config probe for the SPA.
      description: |
        Exposes which notification channels are wired up on this
        deployment without revealing the underlying URLs (the
        webhooks usually carry an opaque secret in the path). Three
        independent booleans, one per channel:

          * `webhook_configured`  — generic `WEBHOOK_URL` is set.
          * `discord_configured`  — `DISCORD_WEBHOOK_URL` is set.
          * `slack_configured`    — `SLACK_WEBHOOK_URL` is set.
          * `email_configured`    — `SMTP_HOST` and `SMTP_TO` are
            both set (a host without recipients has nowhere to send,
            so both are required).
          * `dkg_configured`      — all three of `DKG_API_URL`,
            `DKG_AUTH_TOKEN`, `DKG_CONTEXT_GRAPH_ID` are set.
          * `dkg_network`         — `"testnet"` / `"mainnet"` /
            `null` (suppressed when the integration isn't usable).

        Mirrors the existing `GET /api/config/sitemap` posture — a
        small public envelope the `EmbedDialog` consumes on mount to
        render the right status chips beside the share-and-embed
        surfaces. `Cache-Control: no-store` so a Settings-modal save
        is reflected on the next dialog open.
      responses:
        "200":
          description: Notification-channel config envelope.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [webhook_configured, discord_configured, slack_configured, email_configured]
                    properties:
                      webhook_configured:
                        type: boolean
                        description: |
                          `WEBHOOK_URL` is set and non-empty. The generic
                          JSON-blob webhook covers Zapier / Make / n8n /
                          IFTTT / any custom listener.
                      discord_configured:
                        type: boolean
                        description: |
                          `DISCORD_WEBHOOK_URL` is set. When `true`,
                          MiroShark POSTs a Discord-native rich embed
                          (consensus-coloured border, scenario title,
                          belief percentage fields, share-card thumbnail,
                          link) on every terminal-state transition.
                      slack_configured:
                        type: boolean
                        description: |
                          `SLACK_WEBHOOK_URL` is set. When `true`,
                          MiroShark POSTs a Slack Block Kit message
                          (header + context + section fields + actions
                          button) on every terminal-state transition.
                      email_configured:
                        type: boolean
                        description: |
                          Both `SMTP_HOST` and `SMTP_TO` are set
                          (recipients are required — a host with no
                          recipients has nowhere to send, so the
                          channel reads as unconfigured). When `true`,
                          MiroShark sends a `multipart/alternative`
                          email (plain-text + HTML) on every
                          terminal-state transition via the configured
                          relay. `SMTP_USER` / `SMTP_PASSWORD` are
                          optional — unauthenticated relays (e.g.
                          `localhost:25`) are supported. Recipient
                          addresses themselves are never returned.
                      dkg_configured:
                        type: boolean
                        description: |
                          All three of `DKG_API_URL`, `DKG_AUTH_TOKEN`,
                          and `DKG_CONTEXT_GRAPH_ID` are set. When
                          `true`, the EmbedDialog renders the
                          OriginTrail DKG citation card with a publish
                          CTA (or the citation primitives if already
                          anchored). Auth token never leaves the
                          backend.
                      dkg_network:
                        type: [string, "null"]
                        enum: [testnet, mainnet, null]
                        description: |
                          Pure metadata — labels the chain the
                          operator's daemon was configured against so
                          the SPA renders the right network chip and
                          explorer link. `null` when the integration
                          isn't fully configured.

  /api/config/sitemap:
    get:
      tags: [Discovery]
      summary: Public sitemap-config flag for the SPA.
      description: |
        Exposes whether `/sitemap.xml` is enabled on this deployment
        so the EmbedDialog renders the right hint without leaking
        any secret config. Returns `{enabled, sitemap_url}` where
        `sitemap_url` is the absolute public URL when enabled and
        `null` otherwise. Public — the flag is not sensitive and the
        URL is the same one any crawler would discover via
        robots.txt.
      responses:
        "200":
          description: Sitemap config envelope.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [enabled, sitemap_url]
                    properties:
                      enabled:
                        type: boolean
                        description: Whether `/sitemap.xml` serves content on this deployment.
                      sitemap_url:
                        type: string
                        nullable: true
                        description: |
                          Absolute URL of `/sitemap.xml` when enabled
                          and a base URL is resolvable; `null`
                          otherwise.

  /api/stats:
    get:
      tags: [Platform]
      summary: Platform-level aggregate stats across every public, completed simulation.
      description: |
        Collapses every simulation on disk that satisfies
        `is_public == true` AND `status == "completed"` into a single
        envelope: a total count, a consensus distribution
        (bullish / neutral / bearish + their percentages), an average
        `confidence_pct` across all sims, a sum of every recognised
        `surface-stats.json` counter, the count of unique
        `project_id`s the corpus spans, and the newest-sim
        identifier + created-at timestamp.

        First endpoint that describes the platform itself rather than
        one simulation. Press kits, external dashboards, LLM-agent
        health checks (*"is this MiroShark instance active?"*), and
        the platform Shields.io badge (`/api/stats/badge.svg`) all
        consume the same payload.

        **Stance derivation matches the per-sim signal.json
        byte-for-byte.** The same plurality + tie-break rules
        (`bullish > bearish > neutral`) that turn a sim's final
        belief split into a `direction` on the per-sim surface
        produce the platform-level counts here. A simulation labelled
        Bullish on its signal.json is counted in the `bullish` bucket
        on this aggregate.

        **`unique_projects`, not `unique_operators`.**
        `SimulationState` carries no operator / created-by field —
        `project_id` is the closest stable identifier. Each project
        is conventionally a single research / operator workspace, so
        the project count is a reasonable proxy for the operator
        count, but the field name doesn't promise data the model
        can't back. A future model migration can add a dedicated
        `operator` field and a sibling `unique_operators` aggregate
        without breaking this surface.

        **Cached for 60 seconds.** A module-level scan cache absorbs
        bursty press unfurls. The response carries
        `Cache-Control: public, max-age=60` and a short `ETag`
        derived from `total_sims` + `newest_sim_id`; a conditional
        `If-None-Match` GET short-circuits to `304 Not Modified`
        without re-serialising the body, so a README badge polling
        every minute pays roughly the cost of one HEAD request per
        window.

        Empty deployment returns a fully-zeroed envelope rather than
        a 404 — the same way a 1000-sim deployment renders its real
        number. A consumer rendering *"N simulations run"* doesn't
        need to special-case a fresh install.
      responses:
        "200":
          description: Platform stats envelope.
          headers:
            ETag:
              schema: { type: string }
              description: |
                Short cache tag derived from `total_sims` +
                `newest_sim_id`. Stable across the 60-second cache
                window; bumps when a new sim is published.
            Cache-Control:
              schema: { type: string }
              description: "`public, max-age=60`."
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    $ref: "#/components/schemas/PlatformStats"
        "304":
          description: |
            `If-None-Match` matched the current `ETag`; body omitted.
            The `ETag` and `Cache-Control` headers are still returned
            so the consumer can refresh its cache TTL.

  /api/stats/badge.svg:
    get:
      tags: [Platform]
      summary: Flat platform-stats Shields.io badge SVG.
      description: |
        Renders the platform-level sibling of
        `/api/simulation/<id>/badge.svg`: a flat 20-pixel
        Shields.io-compatible pill `MiroShark | N simulations` where
        `N` is the `total_sims` count from `/api/stats`. Left half
        carries the standard Shields.io grey (`#555555`); right half
        uses platform-blue (`#0ea5e9`) — visually distinct from the
        three per-sim stance colours so a reader never mistakes the
        platform badge for a per-sim consensus badge.

        One line of Markdown turns any GitHub README, Substack post,
        Notion page, or personal site into a live platform-activity
        indicator:

        ```markdown
        ![MiroShark](https://your-host/api/stats/badge.svg)
        ```

        **Always returns `200`.** A zero-sim deployment renders a
        valid `MiroShark | 0 simulations` pill rather than a 404, so
        an embedded `<img>` on a freshly-installed instance never
        broken-image-glyphs. Same publish gate semantics as the per-
        sim badge (only public + completed sims contribute to the
        count), inherited from `/api/stats`.

        **Cached for 60 seconds.** Matches the per-sim badge cache
        cadence so a reader polling both badges on the same README
        sees consistent freshness. The rendered SVG is bytewise-
        deterministic across calls with the same input count — a
        future ETag layer can hash the response bytes directly.
      responses:
        "200":
          description: "Flat 20-pixel platform badge with `Content-Type: image/svg+xml` + `Cache-Control: public, max-age=60`."
          content:
            image/svg+xml:
              schema:
                type: string
                description: |
                  Complete SVG 1.1 document — XML declaration,
                  namespace, `viewBox`, accessibility `role="img"` +
                  `aria-label`, and a rounded `clipPath` so the pill
                  ends render across every `<img>`-tag consumer.

  /api/surfaces.json:
    get:
      tags: [Platform]
      summary: Machine-readable catalog of every share / platform surface this deployment exposes.
      description: |
        Sibling of `/api/stats` — both endpoints describe the platform
        itself rather than one simulation. `/api/stats` aggregates
        runtime metrics over the corpus; this endpoint describes the
        capability surface area an integrator can call into.

        Every entry in `surfaces` carries the surface `key`, the
        `endpoint` path (with `<simulation_id>` placeholder for per-sim
        surfaces), the HTTP `method`, a `type` category (one of
        `analytics`, `visualization`, `export`, `embed`, `integration`,
        `platform`, `discovery`), a one-line `description` (≤120 chars),
        the originating PR (`added_in_pr`, nullable for surfaces that
        predate per-PR instrumentation), and a copy-pasteable
        `example_curl` invocation. Each `example_curl` references its
        entry's `endpoint` verbatim — a consumer pasting the example
        always hits the same path the catalog claims.

        **Static / hardcoded.** The catalog is a literal list at module
        scope in `services/surfaces_catalog.py`; it is NOT auto-derived
        from `SURFACE_KEYS` (which only tracks the publish-gated per-sim
        surfaces with serve counters) and NOT scanned off the Flask URL
        map (which would include private mutation routes the catalog
        must not expose). The per-sim subset of the catalog is cross-
        checked against `SURFACE_KEYS` by a drift guard test, so a new
        per-sim surface can't ship without an entry here.

        **Schema versioned.** The response envelope carries
        `schema_version`. v1 is the only published version; future
        breaking changes bump the literal and a consumer can gate on
        it.

        **`ETag` derives from the catalog length** (`surfaces-v1-<N>`).
        Bumps when a new surface is appended. A conditional
        `If-None-Match` GET short-circuits to `304` so a polling
        consumer doesn't pay the JSON body cost on every request.

        **`Cache-Control: public, max-age=3600`** — the catalog only
        changes when a new PR ships a new surface; one hour is a tight
        bound on the lag between a ship and the catalog reflecting it.

        Always returns `200` (or `304`) — there is no input the caller
        can supply that would produce a `404`. The catalog is
        intentionally static so two consecutive calls return
        bytewise-identical JSON.
      responses:
        "200":
          description: Surface catalog envelope.
          headers:
            ETag:
              schema: { type: string }
              description: |
                `surfaces-v<schema>-<count>`. Bumps when a new surface
                is added; stable across consecutive deployments of the
                same code revision.
            Cache-Control:
              schema: { type: string }
              description: "`public, max-age=3600`."
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    $ref: "#/components/schemas/SurfaceCatalog"
        "304":
          description: |
            `If-None-Match` matched the current `ETag`; body omitted.
            `ETag` and `Cache-Control` are still returned so the
            consumer can refresh its cache TTL.

  /api/simulation/{simulation_id}/export:
    get:
      tags: [Export]
      summary: Download a full simulation as JSON or CSV.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: include
          schema: { type: string, default: "actions,posts,timeline,agent_stats,metadata" }
          description: Comma-separated section list.
      responses:
        "200":
          description: File download.
          content:
            application/json:
              schema: { type: object }
            text/csv:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/article:
    post:
      tags: [Publish & Embed]
      summary: Generate a Substack-style write-up for a finished run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Article markdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/resolve:
    post:
      tags: [Publish & Embed]
      summary: Mark a simulation as resolved against an actual outcome.
      description: |
        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual_outcome]
              properties:
                actual_outcome:
                  type: string
                  enum: [YES, NO, PARTIAL, INDETERMINATE]
      responses:
        "200":
          description: Resolution recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/outcome:
    get:
      tags: [Publish & Embed]
      summary: Read the verified-prediction annotation for a simulation.
      description: |
        Returns the saved outcome (or `data: null` when the simulation has
        none). Distinct from `/resolve`, which is binary (YES/NO) and tied
        to Polymarket consensus. This annotation is open-ended, gallery-
        facing, and the source for the `?verified=1` filter on
        `/api/simulation/public`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Outcome (may be null when none has been submitted).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/SimulationOutcome"
                          - type: "null"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Publish & Embed]
      summary: Record a verified-prediction annotation for a public simulation.
      description: |
        Requires `is_public=true` on the simulation (POST `/publish` to
        enable). Submitting again overwrites the previous annotation —
        operators can correct a wrong call without leaving stale records.

        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
        `GET /outcome` (above) is **not** gated — the gallery and embed
        widgets read this without a token.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  enum: [correct, incorrect, partial]
                  description: How the agent consensus held up against reality.
                outcome_url:
                  type: string
                  format: uri
                  maxLength: 500
                  description: Optional pointer to the article/tweet/dashboard that confirmed the outcome.
                outcome_summary:
                  type: string
                  maxLength: 280
                  description: Tweet-sized human description of what really happened.
            example:
              label: correct
              outcome_url: https://example.com/aave-incident
              outcome_summary: "Aave's GHO peg broke under the simulated stress scenario on 2026-04-25, matching the agent consensus."
      responses:
        "200":
          description: Outcome saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SimulationOutcome" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not public.
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/webhook-log:
    get:
      tags: [Publish & Embed]
      summary: Recent webhook delivery attempts for a simulation.
      description: |
        Returns the last 10 entries from `<sim_dir>/webhook-log.jsonl`
        newest-first plus the all-time `total_attempts` counter.

        Each line is one attempt by the outbound completion webhook
        (PR #46) — auto-fired at simulation end, or manually replayed
        via `POST /webhook-retry`. Operators use this surface to
        verify the webhook fired, see HTTP status / latency, and decide
        whether to retry. The dispatcher truncates the on-disk log to
        the last 50 attempts; `total_attempts` keeps climbing past
        that bound.

        URLs are masked (`scheme://host/***`) before persisting so the
        Slack / Discord secret in the path never round-trips through
        the read endpoint.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Delivery log slice.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WebhookDeliveryLog" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/webhook-retry:
    post:
      tags: [Publish & Embed]
      summary: Re-fire the completion webhook for a finished simulation.
      description: |
        Manually replays the outbound completion webhook for a sim
        already in a terminal state. Useful when the original delivery
        hit a transient 5xx, the URL was misconfigured at the time, or
        the consuming integration was down.

        The retry payload carries an extra top-level `retry: true` so
        downstream consumers can dedupe / handle replays differently.
        The replay appends a new entry to `webhook-log.jsonl` with
        `trigger: "retry"` so a subsequent log read can tell automatic
        and operator-fired deliveries apart.

        Bypasses the per-process `(sim_id, status)` dedup gate the
        auto-fire path uses — that gate exists only to prevent the
        runner's two terminal code paths from double-firing
        automatically; an explicit retry should always go through.

        Returns 400 when no webhook URL is configured (set
        `WEBHOOK_URL` in Settings or as an env var first), 409 when
        the simulation has not reached a terminal state.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [completed, failed]
                  description: |
                    Optional. Defaults to the simulation's current
                    runner status when omitted; pass explicitly to
                    replay either side of a recent state transition.
            example:
              status: completed
      responses:
        "200":
          description: Retry queued — the delivery happens in a daemon thread.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [queued, sim_id, status]
                        properties:
                          queued: { type: boolean, enum: [true] }
                          attempt_will_be:
                            type: integer
                            description: Optimistic next attempt number — the actual log entry is written after the POST returns.
                          sim_id: { type: string }
                          status: { type: string, enum: [completed, failed] }
                          url_masked: { type: string }
        "400":
          description: No webhook URL configured (or unsupported status passed).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Simulation has not reached a terminal state yet.
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/dkg-citation:
    get:
      tags: [Publish & Embed]
      summary: Read the persisted OriginTrail DKG citation for a published sim.
      description: |
        Returns the on-chain citation primitives anchored when an
        operator clicked "Publish to DKG" in the share dialog. Pure
        read of `<sim_dir>/dkg-citation.json` — no daemon call. The
        citation file is the source of truth once a Knowledge Asset
        has been anchored.

        Same publish gate as the `reproduce.json` / thread / lineage
        surfaces: a private sim returns 403 even if a citation file
        happens to be on disk.

        Returns 404 (not 500) when the sim has never been anchored —
        the EmbedDialog uses that as the "render the publish CTA"
        signal.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Citation primitives for the on-chain Knowledge Asset.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [ual, network, context_graph_id, assertion_name, published_at]
                        properties:
                          ual:
                            type: string
                            description: Universal Asset Locator (`urn:dkg:context-graph:…`).
                          merkle_root:
                            type: string
                            description: Hex Merkle root committed on-chain.
                          transaction_hash:
                            type: string
                            description: Hex transaction hash on the anchoring chain.
                          block_number:
                            type: [integer, "null"]
                          finalized: { type: boolean }
                          network:
                            type: string
                            enum: [testnet, mainnet]
                          context_graph_id: { type: string }
                          assertion_name: { type: string }
                          reproduce_config_sha256:
                            type: string
                            description: |
                              `sha256:<hex>` of the canonical
                              `reproduce.json` bytes — the citation
                              key a verifier re-hashes locally.
                          explorer_url:
                            type: string
                            format: uri
                            description: OriginTrail DKG explorer link for the UAL.
                          published_at:
                            type: string
                            format: date-time
                          schema_version: { type: string, enum: ["1"] }
        "403":
          description: Simulation is not published.
        "404":
          description: No DKG citation yet for this simulation.

  /api/simulation/{simulation_id}/publish-dkg:
    post:
      tags: [Publish & Embed]
      summary: Anchor a finished simulation on the OriginTrail DKG.
      description: |
        Walks the OriginTrail DKG v9/v10 WM → SWM → VM publish pipeline
        on the operator's local daemon and returns the resulting UAL
        + Merkle root + transaction hash + block number.

        Idempotent: a successful publish persists
        `<sim_dir>/dkg-citation.json` and subsequent calls return the
        cached citation directly — no double-spend of TRAC or gas. The
        on-disk file is the source of truth.

        Steps the route walks server-side:

          1. `POST /api/assertion/create`          (Working Memory)
          2. `POST /api/assertion/{name}/write`    (append Turtle RDF)
          3. `POST /api/assertion/{name}/promote`  (WM → SWM)
          4. `POST /api/shared-memory/publish`     (SWM → Verified Memory)

        Returns 503 when `DKG_*` env vars are unset, 502 on a daemon
        error (chain failure, insufficient TRAC, name collision), 504
        on connection refused / publish timeout, and 422 when the
        simulation hasn't reached the prepared state. The publish
        action requires the admin token because on-chain anchoring
        costs TRAC + gas.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: |
                    Re-anchor even when a `dkg-citation.json` already
                    exists. The v1 UI does not expose this; it is an
                    escape hatch for operators who explicitly want to
                    burn TRAC + gas on a fresh anchor after correcting
                    upstream data.
            example:
              force: false
      responses:
        "200":
          description: |
            Publish succeeded (or a cached citation was returned for
            an already-anchored sim).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      cached:
                        type: boolean
                        description: |
                          `true` when the citation came from
                          `dkg-citation.json` without contacting the
                          daemon; `false` when freshly anchored.
                      data:
                        $ref: "#/components/schemas/DkgCitation"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not published.
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Simulation has not reached the prepared state — nothing to anchor yet.
        "502":
          description: |
            DKG daemon returned an error (chain failure, validation
            error, insufficient TRAC, name collision, etc.).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage:
                    type: string
                    enum: [create, write, promote, publish, unknown]
                  daemon_status_code:
                    type: integer
                    description: The HTTP status the daemon returned.
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }
        "504":
          description: DKG daemon unreachable or publish timed out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage:
                    type: string
                    enum: [create, write, promote, publish]

  /api/simulation/{simulation_id}/waybackclaw-record:
    get:
      tags: [Publish & Embed]
      summary: Read the persisted WaybackClaw archive record for a published sim.
      description: |
        Returns the WaybackClaw AI Agent Archive record persisted when
        an operator clicked "Submit to WaybackClaw" in the share
        dialog. Pure read of `<sim_dir>/waybackclaw-record.json` — no
        API call. The record file is the source of truth once a
        snapshot has been submitted.

        Same publish gate as the `reproduce.json` / `dkg-citation`
        surfaces: a private sim returns 403 even if a record file
        happens to be on disk.

        Returns 404 (not 500) when the sim has never been submitted —
        the EmbedDialog uses that as the "render the Submit CTA"
        signal.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: WaybackClaw snapshot record for the archived simulation.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WaybackClawRecord"
        "403":
          description: Simulation is not published.
        "404":
          description: No WaybackClaw record yet for this simulation.

  /api/simulation/{simulation_id}/publish-waybackclaw:
    post:
      tags: [Publish & Embed]
      summary: Submit a finished simulation snapshot to the WaybackClaw archive.
      description: |
        Builds the same `reproduce.json` bytes the public
        `/reproduce.json` endpoint serves, hashes them (citation key),
        wraps the bytes in a WaybackClaw snapshot body alongside the
        consensus / quality / scenario summary, and POSTs to
        `/api/archive/submit` on `api.waybackclaw.space`. Returns the
        snapshot id + IPFS CID + Nostr event id so the SPA can render
        an archive citation card with a Pinata gateway link and a
        Nostr event reference.

        Sibling of `POST /api/simulation/{id}/publish-dkg`: the DKG
        anchor provides on-chain provenance, WaybackClaw provides
        content-addressed IPFS storage + Nostr broadcast, and
        `reproduce.json` is the bytes both layers commit to.

        Idempotent: a successful submission persists
        `<sim_dir>/waybackclaw-record.json` and subsequent calls
        return the cached record directly without re-hitting the API.
        The on-disk file is the source of truth.

        The publish action requires the admin token to gate "who can
        speak on behalf of this MiroShark deployment in the public
        archive" — the WaybackClaw submit endpoint itself is free
        with agent auth.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: |
                    Re-submit even when a `waybackclaw-record.json`
                    already exists. Escape hatch for operators who
                    explicitly want a fresh snapshot after correcting
                    upstream data.
            example:
              force: false
      responses:
        "200":
          description: |
            Submit succeeded (or a cached record was returned for an
            already-archived sim).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      cached:
                        type: boolean
                        description: |
                          `true` when the record came from
                          `waybackclaw-record.json` without contacting
                          the API; `false` when freshly submitted.
                      data:
                        $ref: "#/components/schemas/WaybackClawRecord"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not published.
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Simulation has not reached the prepared state — nothing to archive yet.
        "429":
          description: WaybackClaw API rate limit exceeded — back off and retry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage: { type: string, enum: [submit] }
                  api_status_code: { type: integer, enum: [429] }
        "502":
          description: WaybackClaw API returned an error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage: { type: string, enum: [submit, unknown] }
                  api_status_code:
                    type: integer
                    description: The HTTP status the WaybackClaw API returned.
        "503":
          description: |
            `WAYBACKCLAW_AGENT_TOKEN` not configured on this
            deployment, or the admin token is not configured.
        "504":
          description: WaybackClaw API unreachable or submit timed out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage: { type: string, enum: [submit] }

  # ────────────────────────────────────────────────────────────────────
  # Report Agent
  # ────────────────────────────────────────────────────────────────────

  /api/report/generate:
    post:
      tags: [Report Agent]
      summary: Launch the ReACT report agent for a simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
