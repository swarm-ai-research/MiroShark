          application/json:
            schema:
              type: object
              required: [report_id]
              properties:
                report_id: { type: string }
      responses:
        "200":
          description: Status payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}:
    get:
      tags: [Report Agent]
      summary: Full report by id.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/by-simulation/{simulation_id}:
    get:
      tags: [Report Agent]
      summary: Latest report for a given simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/download:
    get:
      tags: [Report Agent]
      summary: Download report as PDF.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF binary.
          content:
            application/pdf:
              schema:
                type: string
