# AI Economist scenario with Phase 2 preferences and the Saez planner.
#
# Builds on the coherent ledger (ai_economist_coherent.yaml) and adds:
#   - rational workers: labor-responsive under isoelastic (CRRA)
#     preferences — higher marginal rates and higher wealth both reduce
#     labor supply, so taxation has a real distortion margin
#   - planner_type: saez — top-rate inverse-elasticity rule with the
#     taxable-income elasticity estimated online from observed responses
#   - objective: eq_times_prod on the wealth Gini (AI Economist welfare)
#
# Run:  python -m worlds.gather_trade_build.sweep \
#           worlds/gather_trade_build/scenarios/ai_economist_saez.yaml --seeds 30

scenario_id: ai_economist_saez
description: >
  GTB economy with isoelastic labor-responsive workers, a Saez top-rate
  planner, coherent coin ledger, and lump-sum redistribution.
motif: ai_economist

domain:
  type: gather_trade_build
  ledger_mode: coin

  map:
    height: 15
    width: 15
    wood_density: 0.20
    stone_density: 0.15
    resource_regen_rate: 0.1
    resource_max_amount: 5.0

  market:
    enabled: true
    transaction_fee_rate: 0.02
    price_floor: 0.1
    price_ceiling: 100.0

  build:
    wood_cost: 3.0
    stone_cost: 3.0
    income_per_house_per_step: 1.0
    max_houses_per_agent: 10
    house_income_mode: mint

  energy_per_step: 10.0
  energy_cost_move: 1.0
  energy_cost_gather: 1.0
  energy_cost_trade: 0.5
  energy_cost_build: 2.0

  utility:
    eta: 0.35
    labor_coeff: 0.15
    house_weight: 5.0

  taxation:
    schedule_family: piecewise
    brackets:
      - threshold: 0.0
        rate: 0.10
      - threshold: 10.0
        rate: 0.20
      - threshold: 25.0
        rate: 0.35
      - threshold: 50.0
        rate: 0.45
    smoothing: 0.0
    damping: 0.3
    update_interval_epochs: 1
    allow_non_monotone: false
    redistribution: lump_sum
    debt_enabled: true

  planner:
    planner_type: saez
    objective: eq_times_prod
    inequality_measure: wealth
    update_interval_epochs: 1
    saez_elasticity_init: 0.5
    saez_elasticity_lr: 0.3
    saez_rate_change_cap: 0.05

  gaming:
    income_shifting_enabled: true
    max_shift_fraction_per_epoch: 0.3
    gaming_cost_fraction: 0.05
    bunching_detection_enabled: true
    bunching_bin_width: 1.0

  misreporting:
    enabled: true
    max_underreport_fraction: 0.5
    audit_probability: 0.2
    risk_based_audit_multiplier: 1.5
    fine_multiplier: 2.0
    reputation_penalty_per_catch: 0.1
    freeze_on_repeat: true
    freeze_after_n_catches: 3
    freeze_duration_epochs: 2

  collusion:
    enabled: true
    max_coalition_size: 4
    min_coalition_size: 2
    detection_window_steps: 20
    similarity_threshold: 0.7
    suspicion_score_threshold: 0.6
    response_audit_multiplier: 2.0
    response_stake_increase: 1.5
    response_trade_restriction_epochs: 1

agents:
  # Labor-responsive majority, heterogeneous in skill and preferences
  - policy: rational
    count: 5
    skill_gather: 1.0
  - policy: rational
    count: 2
    skill_gather: 1.5
    skill_build: 1.2
    eta: 0.5
  - policy: gaming
    count: 2
    shift_fraction: 0.25
  - policy: evasive
    count: 2
    underreport_fraction: 0.3
  - policy: collusive
    count: 3
    coalition_id: cartel_alpha

simulation:
  n_epochs: 20
  steps_per_epoch: 15
  seed: 42
