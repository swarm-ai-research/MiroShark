  /api/simulation/{simulation_id}/trajectory.csv:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as RFC 4180 CSV.
      description: |
        One row per recorded round with the bullish / neutral / bearish
        split (using the same ±0.2 stance threshold as the gallery,
        share card, replay GIF, transcript, webhook, and feed surfaces),
        participating agents, post + engagement counts, and the overall
        quality health. Intended for `pandas.read_csv()` / Excel /
        Tableau / R / Observable — the analyst's default toolkit.

        Pairs with `share-card.png` (preview), `replay.gif` (motion),
        and `transcript.{md,json}` (prose) as the **fifth** export
        surface — the previous four cover the qualitative read of a
        simulation; this one covers the quantitative one.

        Same publish gate as the transcript. The CSV header row is
        emitted even when the trajectory is empty so downstream
        consumers don't have to special-case zero-row files.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "CSV with `Content-Type: text/csv; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            text/csv:
              schema:
                type: string
                description: |
                  RFC 4180 CSV. Column order is locked to:
                  `round,round_timestamp,bullish_pct,neutral_pct,bearish_pct,participating_agents,total_posts,total_engagements,quality_health,participation_rate`.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/trajectory.jsonl:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as newline-delimited JSON.
      description: |
        Same row shape as `trajectory.csv` but as JSON Lines — one
        object per line. The format `pandas.read_json(lines=True)`,
        DuckDB `read_json_auto`, and most stream-processing pipelines
        consume natively without a separate CSV-to-DataFrame
        conversion.

        Same publish gate as the CSV form. Empty trajectories yield
        zero bytes (no rows, no header — JSONL has no header concept)
        so a curl into a file produces an empty but well-formed JSONL
        document.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "JSONL with `Content-Type: application/jsonl; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            application/jsonl:
              schema:
                type: string
                description: |
                  One `SimulationTrajectoryRow` JSON object per line.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/chart.svg:
    get:
      tags: [Publish & Embed]
      summary: Per-round belief trajectory as a stdlib-rendered SVG.
      description: |
        Scalable-vector companion to the share card (PNG verdict),
        replay GIF (motion), and Jupyter notebook (matplotlib). Three
        polylines — bullish (`#22c55e`), neutral (`#6b7280`), bearish
        (`#ef4444`) — plotted against round number with grid lines,
        legend, axis labels, and the scenario title. Same ±0.2 stance
        threshold as every other surface so the curves match the share
        card's final-state bars.

        Embeddable as `<img src="…/chart.svg">` in Notion, Substack,
        Ghost, GitHub READMEs, and LaTeX `\includesvg{}` — vector
        means no resolution choice, and `<img>` means no JavaScript at
        the embed site. Pure stdlib `xml.etree.ElementTree`; zero new
        deps.

        Same publish gate as the trajectory CSV. Returns `404` when no
        trajectory rows are on disk yet (the sim is mid-startup) so an
        embedding site can render a placeholder rather than a blank
        SVG that looks like a styling bug. `viewBox` is `0 0 800 400`;
        consumers can size the embed with the `<img>` width/height
        attributes without losing fidelity.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "SVG with `Content-Type: image/svg+xml; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            image/svg+xml:
              schema:
                type: string
                description: |
                  Complete SVG 1.1 document with `viewBox="0 0 800 400"`.
                  Three `<polyline>` elements (one per stance) on a
                  white background with a 5-line y-axis grid and
                  round-number x-axis labels.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/frame-metadata:
    get:
      tags: [Publish & Embed]
      summary: Farcaster Frame v2 metadata for a published simulation.
      description: |
        Closes the Base-chain audience gap that none of the other share
        surfaces address. $MIROSHARK lives on Base, and the Base-native
        social network is Farcaster / Warpcast. A `/share/<id>` URL
        pasted into a Farcaster cast today shows a blank link card;
        with the `fc:frame:*` meta tags the share blueprint emits
        alongside the existing Open Graph block, every cast containing
        a MiroShark share URL becomes an interactive Frame card —
        chart-SVG image as the Frame preview, a "View Simulation →"
        link button, no JavaScript, no new deps.

        The endpoint exists so the frontend EmbedDialog can build the
        Warpcast compose link dynamically without hardcoding the base
        URL, and so future Frame-action buttons (post actions, mint
        flows) can be added via backend config rather than HTML
        redeployment. The Frame spec itself reads the meta tags from
        the share-page HTML head — see `backend/app/api/share.py` for
        the server-side tag injection.

        Same publish gate as the chart SVG: `403` on unpublished sims
        so private scenario titles never leak through the Frame
        metadata. Sims with no trajectory data yet still return `200` —
        the image URL falls back to `share-card.png` so a fresh sim
        still gets a Farcaster-ready unfurl while the trajectory
        accumulates. The `has_trajectory` flag in the response signals
        whether the chart SVG is the backing image (`true`) or the
        share-card PNG (`false`).

        Honours `X-Forwarded-Proto` / `X-Forwarded-Host` for
        deployments behind a TLS-terminating reverse proxy so the
        Frame image / share / button-target URLs resolve to the public
        origin, not the WSGI `SERVER_NAME`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Frame metadata JSON with `Cache-Control: public, max-age=300`."
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/FrameMetadata"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/archive.zip:
    get:
      tags: [Publish & Embed]
      summary: Bundle every published share surface into a single ZIP download.
      description: |
        The take-offline composite. Until now a researcher finishing a
        simulation had to chain up to nine separate routes to take the
        artifact set offline (`share-card.png`, `chart.svg`,
        `trajectory.csv` / `.jsonl`, `transcript.md`, `thread.txt`,
        `reproduce.json`, `notebook.ipynb`, `signal.json`). This endpoint
        collapses every successfully-rendered surface into one
        timestamped ZIP plus a `manifest.json` that pairs each contained
        file with its SHA-256, byte size, MIME type, and canonical
        source URL.

        Compositional, not duplicative — every bundled file is
        byte-for-byte identical to what the standalone surface route
        serves, so citation hashes line up across both distribution
        paths.

        Best-effort assembly. Missing or corrupt artifacts (a sim
        without a trajectory yet, a renderer that needs Pillow on a
        stripped install) are simply omitted from the archive rather
        than failing the request. The `file_count` and `files` array
        in the manifest enumerate exactly what landed inside the ZIP.

        Deterministic per-file timestamps. Every `ZipInfo` entry uses a
        fixed `date_time` (`1980-01-01T00:00:00`) so the contained file
        bytes are reproducible across builds — only `archive_generated_at`
        in the manifest drifts. Consumers needing bit-stable archives
        can hash each contained file individually (each is bytewise
        deterministic) and ignore the manifest timestamp.

        Same publish gate as every other share surface (`is_public=true`).
        Returns `404` when no exportable surfaces are available yet (a
        freshly published sim that hasn't recorded any rounds — even
        `signal.json` and `reproduce.json` need a final belief block).
        Cached for 5 minutes — matches the notebook + reproduce.json
        cadence.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            ZIP archive with `Content-Type: application/zip` and
            `Content-Disposition: attachment; filename="miroshark-<sim_id_prefix>-<date>.zip"`.
            The `X-MiroShark-Archive-Files` response header reports the
            number of bundled files so a HEAD request can render a
            preview without downloading the body. Cached
            `public, max-age=300`.
          content:
            application/zip:
              schema:
                type: string
                format: binary
                description: |
                  ZIP archive containing zero or more share-surface
                  files plus a `manifest.json` (`ArchiveManifest`
                  schema). The manifest enumerates every contained
                  file with its SHA-256, byte size, MIME type, and
                  canonical source URL.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/badge.svg:
    get:
      tags: [Publish & Embed]
      summary: Flat Shields.io-compatible consensus status badge SVG.
      description: |
        Renders a 20-pixel-tall flat status badge as an SVG document.
        Left half: `MiroShark` on the standard Shields.io grey
        (`#555555`). Right half: `{direction} {confidence_pct}%` on
        the stance colour — `#22c55e` (Bullish), `#6b7280` (Neutral),
        `#ef4444` (Bearish). Pill ends via a rounded `clipPath` with
        `rx="3"` so the badge renders consistently across every
        `<img>` consumer.

        Direction + confidence derive from the same `compute_signal`
        pipeline `signal.json` uses, so the badge payload matches the
        signal payload, the gallery card, and the share card
        byte-for-byte. Pure stdlib renderer
        (`xml.etree.ElementTree`); zero new dependencies.

        Embed in any GitHub README, Notion page, Substack post, or
        personal site:

        ```markdown
        ![MiroShark](https://your-host/api/simulation/<id>/badge.svg)
        ```

        Same publish gate as every other share surface
        (`is_public=true`). Returns `404` when no rounds have been
        recorded yet (no `belief.final` block on the embed summary)
        so an embedded `<img>` renders a broken-image placeholder
        rather than a misleading `Unknown 0%` badge.

        Cached for **60 seconds** — short enough that a live sim's
        stance flip propagates through to embedded badges within a
        polling cycle (matches the watch-page poll cadence), long
        enough that a popular README doesn't hammer the
        embed-summary build with one fetch per page view.

        The rendered SVG is bytewise-deterministic across calls with
        the same inputs — a future ETag layer can hash the response
        bytes directly.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Flat 20-pixel status badge with `Content-Type: image/svg+xml; charset=utf-8` + `Cache-Control: public, max-age=60`."
          content:
            image/svg+xml:
              schema:
                type: string
                description: |
                  Complete SVG 1.1 document — XML declaration,
                  namespace, `viewBox`, accessibility `role="img"` +
                  `aria-label`, and a rounded `clipPath` so the pill
                  ends render across every `<img>`-tag consumer.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/signal.json:
    get:
      tags: [Publish & Embed]
      summary: Machine-readable trading signal derived from a published sim.
      description: |
        Collapses the final-round belief split + quality health into a
        single action primitive a quant tool, Zapier workflow, or alert
        pipeline can consume directly: `direction` (Bullish / Neutral /
        Bearish) + `confidence_pct` (0 = pure three-way split, 100 =
        unanimous leading stance) + `risk_tier` (low / medium / high,
        mapped from quality health) + the three component percentages.

        Pure derivation — the underlying numbers are the same ones the
        embed-summary endpoint already builds, the gallery card already
        displays, and the share card PNG already renders. A
        "Bullish 62%" signal here matches what every other surface
        reports for the same simulation, byte-for-byte; the only new
        information is the *shape*, not the data.

        Tie-break order on the plurality is documented and stable:
        `bullish > bearish > neutral` so a consumer can predict the
        output even on rare even-split rounds.

        Quality-to-risk mapping: `excellent` → `low-risk`, `good` →
        `medium-risk`, anything else (`fair` / `poor` / missing /
        `"N/A"`) → `high-risk`. The default-to-high posture is
        deliberate — a quant tool that gets a signal with unknown
        quality should treat it cautiously, not optimistically.

        Same publish gate as every other share surface (`is_public=true`).
        Returns `404` when the simulation hasn't recorded any rounds
        yet (no `belief.final` block) so an embedding tool can render
        a "not ready" placeholder rather than a half-baked signal an
        alert pipeline might act on. Cached for 5 minutes — a live
        sim's final stance can flip round-to-round, so a short cache
        lets alert pipelines see fresh signals while crawlers don't
        hammer the embed-summary build.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Trading signal payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSignal"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/polymarket.json:
    get:
      tags: [Publish & Embed]
      summary: Polymarket-shaped binary-market prediction for a completed sim.
      description: |
        Adapts the generic `signal.json` action primitive into the
        binary YES / NO probability envelope a Polymarket trading bot
        expects between *"simulation result"* and *"actionable market
        signal"*. The first share surface shaped for a specific
        external integrator.

        Direction-aware `yes_probability`: a Bullish swarm emits
        `bullish_pct / 100` (high YES); a Bearish swarm emits
        `1 - bearish_pct / 100` (low YES — the residual probability);
        a Neutral swarm lands exactly at `0.5` (coin-flip prior).
        `yes_probability + no_probability == 1.0` within float
        tolerance — the invariant a Polymarket order-book consumer
        expects.

        `confidence_tier` is a four-bucket discrete scale on top of
        `signal.json`'s continuous `confidence_pct`:
        `<25 → speculative`, `25-50 → moderate`,
        `50-75 → confident`, `≥75 → high-conviction`. Upper bounds
        are exclusive. Bots typically gate position size on this
        tier rather than the raw continuous value.

        Stricter publish gate than `signal.json`: this surface only
        returns a payload for sims with `status == "completed"` (a
        Polymarket bot acting on a mid-run signal would chase
        numbers that can still flip). Mid-run sims and freshly-
        published sims that haven't recorded any rounds yet both
        return `404`. Same `is_public=true` requirement as every
        other share surface. Cached for 5 minutes — matches the
        `signal.json` cadence so a bot polling both surfaces sees
        consistent values.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Polymarket prediction payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolymarketPrediction"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/thread.txt:
    get:
      tags: [Publish & Embed]
      summary: Twitter / X tweet thread for a published simulation.
      description: |
        Auto-formatted tweet thread that copy-pastes 1:1 into X — one
        intro tweet (scenario + scale + consensus label), one tweet per
        belief inflection point (rounds where the dominant stance
        crossed the ±0.2 threshold in either direction), and one
        closing tweet (final verdict + quality + watch + share URLs).
        Each tweet ≤280 characters; tweets are separated by `---`
        on their own line so an operator can scan visually and copy
        individual tweets.

        Pairs with `share-card.png` (preview), `replay.gif` (motion),
        `transcript.md` / `transcript.json` (prose), and
        `trajectory.csv` / `trajectory.jsonl` (data) as the **sixth**
        share format. The previous five surfaces target visual / motion
        / prose / data; this one is the short-form text channel that
        X/Twitter speaks natively.

        Inflection-point detection uses the same ±0.2 stance threshold
        every other surface uses, with a small hysteresis (the dominant
        stance must lead the runner-up by ≥0.2pp) so a near-tie round
        doesn't generate a "stance shifted to neutral" tweet for every
        round of a balanced run. Threads longer than `MAX_THREAD_TWEETS`
        (15) are truncated to the first 3 + last 3 inflections with a
        single bridge line — the `truncated` flag in the JSON form
        signals this happened.

        Same publish gate as the share card and transcript. Honors
        `X-Forwarded-Proto` / `X-Forwarded-Host` for the watch + share
        URLs in the close tweet.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Plain-text thread with `Content-Type: text/plain; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Tweets separated by a `---` line. Each tweet ≤280
                  characters. Trailing newline included.
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/thread.json:
    get:
      tags: [Publish & Embed]
      summary: Same tweet thread as `thread.txt` but as structured JSON.
      description: |
        Returns the structured thread payload — `tweets`, `total`,
        `inflections_recorded`, `truncated` — so a programmatic consumer
        (Twitter scheduling tool, Notion dashboard, downstream LLM
        pipeline) can iterate the tweets without splitting the plain
        form on the `---` separator.

        Same publish gate, same threshold, and same truncation rules
        as `thread.txt`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: "Pretty-printed JSON with `Content-Type: application/json; charset=utf-8` + `Cache-Control: public, max-age=300`."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationThread"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/surface-stats:
    get:
      tags: [Publish & Embed]
      summary: Per-share-surface request counters for a published simulation.
      description: |
        Returns the number of times each share surface has served a
        successful response for this simulation — share card PNG,
        replay GIF, transcript (Markdown + JSON), trajectory
        (CSV + JSONL), tweet thread (TXT + JSON), live watch page,
        Atom / RSS feeds, reproducibility config (`reproduce.json`),
        and the lineage graph slice (`/lineage`) — plus a synthetic
        `total` summing all counters.

        The **inbound** observability surface — pairs with the
        outbound webhook delivery log so an operator running MiroShark
        for a DeFi fund or research group can see which surfaces their
        audience actually uses. Closes the inbound side of the
        distribution loop opened by the webhook delivery log on the
        outbound side.

        Counter file lives at `<sim_dir>/surface-stats.json`. Bounded
        in size (one small JSON object) and atomically updated via
        tempfile + `os.replace`, so concurrent requests can never
        corrupt the file. A corrupt file is silently reset to zeros
        rather than 500ing the read.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Per-surface counters + total.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationSurfaceStats"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/reproduce.json:
    get:
      tags: [Publish & Embed]
      summary: Machine-readable reproducibility config blob for a published simulation.
      description: |
        Returns a complete JSON document carrying every parameter
        another operator would need to re-run the same simulation —
        scenario text, agent count, total rounds, platform toggles
        (twitter / reddit / polymarket + market count), the four
        cadence knobs from `time_config` (minutes per round, total
        hours, peak / off-peak windows), any operator-injected director
        events, and a `lineage` block describing whether this
        simulation is original, a plain fork of another sim, or a
        counterfactual branch (with the parent simulation id and
        injection metadata travelling along).

        This is the **citation primitive** behind the existing share
        surfaces. Six of the ten share surfaces (transcript, trajectory,
        thread, watch, GIF, share card) make a finished simulation
        citable — but until this endpoint shipped, none of them carried
        the parameters needed to reproduce the run. PR #71's shareable
        scenario URLs carry the scenario text and template slug; this
        blob carries everything else, in a single pretty-printed file
        suitable for a paper appendix or a thread screenshot.

        Identical exports of the same finished simulation produce
        bytewise-identical JSON (sorted keys + stable indent) — useful
        for citation hashes. Cached for 5 minutes; the blob does not
        change once the sim has reached a terminal state.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Reproducibility config blob.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReproductionConfig"
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/cite.bib:
    get:
      tags: [Publish & Embed]
      summary: BibTeX academic citation entry for a published simulation.
      description: |
        Returns a single `@misc{…}` BibTeX entry for the simulation —
        the academic-citation layer closing the citation arc that
        starts with `reproduce.json` (parameters), continues with
        `notebook.ipynb` (analysis), and anchors on the OriginTrail
        DKG citation (provenance).

        The entry drops straight into a LaTeX paper source via
        `\bibliography{}` and imports cleanly into Zotero / Mendeley
        via their "Import from URL" flow (both readers consume
        `text/plain` BibTeX at an HTTP URL directly). The endpoint
        URL doubles as the import URL — no manual download step.

        Field map:

        * `title` — Scenario text (BibTeX-special-escaped), capped at
          200 chars with ellipsis. Falls back to "Untitled MiroShark
          simulation" when the scenario is empty.
        * `author` — `{MiroShark}` (brace-wrapped so BibTeX treats it
          as a corporate author).
        * `year` + `month` — Derived from `SimulationState.created_at`.
          Unparseable timestamps fall back to the current UTC year +
          month so the entry is always well-formed.
        * `url` — Canonical share URL (`<base>/share/<id>`).
        * `howpublished` — Wrapped in `\url{…}`, points at the
          `reproduce.json` endpoint so a reviewer who pastes the
          citation knows where the parameters live.
        * `note` — `Reproducibility SHA-256: <64-hex>`. Sourced from
          the persisted DKG citation when present (on-chain anchor is
          the source of truth), else freshly computed from the
          canonical `reproduce.json` bytes. Omitted when neither
          source is available.
        * `annote` — `OriginTrail DKG UAL: <ual>`. Present only when
          the sim has been anchored on the DKG via
          `POST /api/simulation/{id}/publish-dkg`.

        Citation key shape: `miroshark-<sim_id[:16]>` with
        non-`[A-Za-z0-9_-]` characters stripped (the BibTeX grammar
        allows only those in a citation key). Stable across re-renders
        of the entry, so an author who pinned the key once never sees
        their `\cite{}` references silently rewire on a re-export.

        Same publish gate as every other share surface
        (`is_public=true`). Cached for 5 minutes — the entry
        stabilises once the sim reaches a terminal state.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            BibTeX entry as `text/plain; charset=utf-8` with
            `Content-Disposition: inline; filename="miroshark-<id12>.bib"`
            so `curl -OJ` saves a ready-to-include `.bib` file.
            Cache-Control: `public, max-age=300`.
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Single BibTeX `@misc{…}` entry ending with a
                  trailing newline so concatenation with another
                  entry produces a well-formed `.bib` library.
              example: |
                @misc{miroshark-sim_abc123def4,
                  title        = {What if Aave's reserve factor doubled overnight?},
                  author       = {MiroShark},
                  year         = {2026},
                  month        = may,
                  url          = {https://miroshark.example.com/share/sim_abc123def456},
                  howpublished = {\url{https://miroshark.example.com/api/simulation/sim_abc123def456/reproduce.json}},
                  note         = {Reproducibility SHA-256: 5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8},
                  annote       = {OriginTrail DKG UAL: did:dkg:base:8453/0xabc/12345},
                }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/notebook.ipynb:
    get:
      tags: [Publish & Embed]
      summary: Pre-populated Jupyter notebook for a published simulation.
      description: |
        Returns a ready-to-run `.ipynb` document for the simulation —
        nbformat 4 JSON with the trajectory CSV embedded directly + a
        scaffolded sequence of code cells: imports, CSV load via
        `pd.read_csv(io.StringIO(...))`, belief-evolution line chart
        (bullish / neutral / bearish % over rounds, ±0.2 stance
        threshold consistent with every other surface), final-round
        consensus bar chart, and a quality + participation summary
        DataFrame.

        Pairs with `trajectory.csv` as the **second** institution-
        targeted export. The CSV told analysts *"here is the data"*;
        the notebook tells them *"here is the analysis, ready to run."*
        Institutional observers download this, open it in JupyterLab /
        VS Code / Colab, and have a working analysis without writing the
        usual `pd.read_csv()` + `matplotlib` boilerplate.

        **Standalone-runnable.** The trajectory data lives inside the
        notebook as a Python multi-line string — anyone with the
        `.ipynb` file can hit Run All in an air-gapped kernel; no
        network call back to the MiroShark host is needed. This matters
        for paper-appendix attachments and academic archive
        environments where reviewer kernels are sandboxed.

        Identical exports of the same finished simulation produce
        bytewise-identical notebooks (sort_keys + indent=2 + trailing
        newline). The file hash is therefore a stable citation key,
        same property the `reproduce.json` blob has. Cached for 5
        minutes; the notebook is stable once the sim reaches a terminal
        state.

        Same publish gate as every other share surface — requires the
        simulation to be public (`is_public=true`).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: |
            `application/x-ipynb+json` notebook. Treat as opaque JSON
            shaped by the [Jupyter nbformat 4 spec](https://nbformat.readthedocs.io/).
            `Content-Disposition: attachment; filename="miroshark-<id12>-notebook.ipynb"`.
          content:
            application/x-ipynb+json:
              schema:
                type: object
                description: |
                  nbformat 4 notebook document — see the [nbformat spec](https://nbformat.readthedocs.io/).
                  Top-level keys: `nbformat`, `nbformat_minor`,
                  `metadata` (kernelspec + language_info + a
                  `miroshark` block with `schema_version`,
                  `simulation_id`, `trajectory_sha256`), and `cells`
                  (markdown + code, see endpoint description for order).
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /share/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Public landing page with Open Graph + Twitter card meta tags.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays clean.
        Returns a tiny HTML page that bots scrape for OG tags and that
        browsers immediately bounce off via `<meta refresh>` + JS to the
        SPA. Honors `X-Forwarded-Proto` / `X-Forwarded-Host`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /watch/{simulation_id}:
    get:
      tags: [Publish & Embed]
      summary: Live spectator-watch page — minimal full-viewport broadcast view.
      description: |
        Mounted at the **root** (no `/api` prefix) so the URL stays a
        clean "watch live →" link. The body carries Open Graph +
        Twitter card meta tags so the URL unfurls as a 1200×630 image
        when pasted into Twitter/X, Discord, Slack, LinkedIn, iMessage,
        etc. — same auto-unfurl behaviour as `/share/{simulation_id}`,
        but the surface is purpose-built for *in-progress* simulations
        rather than finished ones.

        The page is fully self-contained server-side HTML — no SPA
        build dependency. A vanilla-JS poller updates the belief bar,
        round counter, and progress bar every 15 s by hitting the
        existing `/api/simulation/{simulation_id}/embed-summary` and
        `/api/simulation/{simulation_id}/run-status` REST endpoints.
        Once the runner reaches a terminal state (`completed` /
        `failed` / `stopped`) polling stops and the "View full
        simulation →" + "Fork this scenario →" CTAs are revealed.

        No auth — but the underlying live endpoints honour
        `is_public`, so a private simulation only renders the bare
        broadcast frame (no scenario, no live numbers). Honors
        `X-Forwarded-Proto` / `X-Forwarded-Host`.

        Seventh thin renderer over the same on-disk `sim_dir/` folder
        alongside the share card (PNG), replay GIF, transcript
        (Markdown + JSON), public-gallery feeds (Atom + RSS), and
        trajectory export (CSV + JSONL).
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/simulation/public:
    get:
      tags: [Publish & Embed]
      summary: Filterable, paginated gallery feed of public simulations.
      description: |
        Discovery layer for the `/explore` and `/verified` views. Returns
        the same gallery card payload that the share card, replay GIF,
        transcript, RSS feed, and trajectory exports all share — same
        ±0.2 stance threshold, same on-disk `sim_dir/` substrate.

        Optional filters compose with logical AND:

        * `q` — case-insensitive substring match against the scenario.
        * `consensus` — `bullish` / `neutral` / `bearish`. Filters by the
          dominant final-round stance using the same ±0.2 threshold the
          share card / replay GIF / transcript / webhook / feed all use.
        * `quality` — `excellent` / `good` / `fair` / `poor`. Compared
          against the first word of the simulation's `quality_health`.
        * `outcome` — `correct` / `incorrect` / `partial`. Implies
          `verified=1`.

        `total` reflects the filtered count (not the full corpus), so the
        client can render an accurate "X remaining" hint and `has_more`
        flag for the active filter set.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: page
          description: |
            1-based page number — alternative to `offset`. Wins over
            `offset` when both are supplied. `page=1` is offset 0.
          schema: { type: integer, minimum: 1 }
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the listing to
            simulations with a recorded outcome annotation — i.e. the
            "Verified Prediction" hall.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring match against the scenario text.
            Trimmed and capped at 200 characters.
          schema: { type: string, maxLength: 200 }
        - in: query
          name: consensus
          description: |
            Filter to cards whose dominant final consensus matches the
            chosen stance (using the same ±0.2 threshold as every other
            surface).
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: |
            Filter to cards whose `quality_health` first word matches the
            requested tier (case-insensitive).
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: |
            Filter to verified simulations whose recorded outcome label
            matches. Implies `verified=1`.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: |
            `date` (default — newest first), `rounds` (highest
            `current_round` first), `agents` (largest population
            first), or `trending` (highest cumulative share-surface
            serve count first — sums every counter the
            `surface-stats` endpoint exposes; ties break on date so
            the most-served-and-most-recent floats above the
            most-served-and-stale).
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
      responses:
        "200":
          description: Gallery cards.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/GalleryCard" }
                      count: { type: integer }
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
                      page: { type: integer }
                      has_more: { type: boolean }
                      verified_only: { type: boolean }
                      q: { type: string }
                      consensus:
                        type: string
                        nullable: true
                        enum: [bullish, neutral, bearish, null]
                      quality:
                        type: string
                        nullable: true
                        enum: [excellent, good, fair, poor, null]
                      outcome:
                        type: string
                        nullable: true
                        enum: [correct, incorrect, partial, null]
                      sort:
                        type: string
                        enum: [date, rounds, agents, trending]

  # ────────────────────────────────────────────────────────────────────
  # Export
  # ────────────────────────────────────────────────────────────────────

  /api/feed.atom:
    get:
      tags: [Publish & Embed]
      summary: Atom 1.0 syndication feed of the public simulation gallery.
      description: |
        Public MiroShark simulations rendered as an Atom 1.0 XML feed so
        researchers and tooling operators can subscribe via Feedly,
        Readwise, Inoreader, Obsidian RSS, NetNewsWire — every newly
        published simulation lands in their reader the same way an AI
        newsletter does.

        Mirrors `GET /api/simulation/public` selection (publish-gated,
        sorted by `created_at` desc, default cap 20 entries) so a
        subscription stays in lockstep with what shows up on `/explore`.
        Pure stdlib XML — zero new dependencies.

        Each entry carries: scenario as title, consensus split + quality
        + outcome label as summary, share-card PNG as `<media:thumbnail>`
        + `<media:content>`, replay GIF as `<media:content>` so River-
        view aggregators surface motion previews automatically.

        Browsers auto-discover this feed via the `<link rel="alternate"
        type="application/atom+xml">` tag in `index.html`.

        **Filtered feeds.** The same filter knobs the gallery API
        exposes are honoured here — `?consensus=bullish&quality=excellent`
        turns the feed into a "bullish + excellent" signal source for
        n8n, Zapier, Make, or any RSS reader. Filters combine with
        logical AND, unknown values fall back to "no filter" for that
        knob, and active filters are echoed in the feed channel title
        + subtitle so subscribers can tell which slice they're on.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation — the same
            curated set the `/verified` page surfaces.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring search over each simulation's
            scenario text. Matches the gallery API's `?q=` knob.
          schema: { type: string }
        - in: query
          name: consensus
          description: |
            Filter to simulations whose dominant belief stance matches
            the value. Uses the same ±0.2 stance threshold the gallery,
            share card, replay GIF, and webhook all share — a
            33.4 / 33.3 / 33.3 split falls out of every bucket.
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: |
            Filter to simulations whose `quality_health` tier matches
            the value. Compared case-insensitively against the
            lowercased first word, so `Good with caveats` slots into
            `quality=good`.
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: |
            Filter to simulations whose operator-marked outcome label
            matches the value. Subset of `verified=1` that further
            narrows on the resolution direction.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: |
            Sort key. `date` is newest-first (default). `trending` ranks
            cards by their cumulative share-surface serves
            (`surface-stats.json` total) so a viral run floats above a
            forgotten one. `rounds` / `agents` mirror the gallery sort
            keys.
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
        - in: query
          name: limit
          description: |
            Maximum entries to include. Clamped to the feed-specific cap
            (50) — smaller than the gallery API's 100 because
            aggressive aggregators re-fetch the feed every few minutes
            and a 100-entry XML doc costs them too much per poll.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: |
            Atom 1.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/atom+xml:
              schema: { type: string }

  /api/feed.rss:
    get:
      tags: [Publish & Embed]
      summary: RSS 2.0 syndication feed of the public simulation gallery.
      description: |
        Same content + selection + filter knobs as `/api/feed.atom`
        rendered as RSS 2.0 for older readers and self-hosted
        aggregators that haven't moved off the legacy format. Published
        runs include their share-card PNG as an `<enclosure>` so
        podcast-style readers handle it natively. Filtered streams
        (`?consensus=` / `?quality=` / `?sort=trending` / `?q=` /
        `?outcome=` / `?verified=` / `?limit=`) are supported so the
        discovery channel doesn't fragment on format.
      parameters:
        - in: query
          name: verified
          description: |
            Truthy values (`1`, `true`, `yes`, `on`) restrict the feed to
            simulations with a recorded outcome annotation.
          schema: { type: string }
        - in: query
          name: q
          description: |
            Case-insensitive substring search over each simulation's
            scenario text.
          schema: { type: string }
        - in: query
          name: consensus
          description: Dominant-stance filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: quality
          description: Quality-tier filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [excellent, good, fair, poor]
        - in: query
          name: outcome
          description: Outcome-label filter, same semantics as `/api/feed.atom`.
          schema:
            type: string
            enum: [correct, incorrect, partial]
        - in: query
          name: sort
          description: Sort key, same options as `/api/feed.atom`.
          schema:
            type: string
            enum: [date, rounds, agents, trending]
            default: date
        - in: query
          name: limit
          description: Maximum entries to include, capped at 50.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: |
            RSS 2.0 XML document with `Cache-Control: public, max-age=300`.
          content:
            application/rss+xml:
              schema: { type: string }

  /sitemap.xml:
    get:
      tags: [Discovery]
      summary: Auto-generated public-simulation sitemap (sitemaps.org 0.9).
      description: |
        Walks the public-simulation corpus (`is_public=true` only) and
        emits one `<url>` block per `/share/<id>` plus one per
        `/watch/<id>`. `<lastmod>` is W3C `YYYY-MM-DD` form derived
        from the simulation's `updated_at` / `created_at` /
        `state.json` mtime fallback chain. `<changefreq>` is `always`
        for in-progress sims (the belief bars genuinely change every
        round) and `weekly` for completed share entries / `daily` for
        completed watch entries.

        Mounted at the root (no `/api` prefix) so crawlers find it
        where the protocol convention places it. `Cache-Control:
        public, max-age=3600` — hourly is fast enough for a freshly
        published sim to appear at the next refresh, slow enough to
        absorb noisy crawler polling. Sims are sorted by
        `simulation_id` ascending so two consecutive renders against
        the same corpus produce byte-identical XML.

        Capped at 50,000 `<url>` entries per the sitemap spec
        ceiling. MiroShark's public corpus is currently three-figure
        small; the cap is defense-in-depth against pathological
        bulk-fork patterns.

        Returns `404` when `ENABLE_SITEMAP=false` so private
        deployments don't even hint that the sitemap surface exists.
        `robots.txt` advertises this URL via the standard `Sitemap:`
        directive — submit once to Google Search Console (or any
        compliant crawler) and every newly published sim becomes
        searchable on the next crawl.
      responses:
        "200":
          description: |
            Sitemap XML document. `Content-Type: application/xml`.
          content:
            application/xml:
              schema: { type: string }
        "404":
          description: |
            `ENABLE_SITEMAP=false` on this deployment.
          content:
            text/plain:
              schema: { type: string }

  /robots.txt:
    get:
      tags: [Discovery]
      summary: Crawler directives for the deployment.
      description: |
        Always served (whether `ENABLE_SITEMAP=true` or not) so
        well-behaved crawlers see the `Disallow: /api/` directive
        that keeps the JSON namespace out of the search index. Carries
        `Allow:` lines for the public-discovery surfaces (`/share/`,
        `/watch/`, `/explore`, `/verified`, `/embed/`).

        When the sitemap is enabled, a trailing
        `Sitemap: <PUBLIC_BASE_URL>/sitemap.xml` line points crawlers
        at it for automatic discovery. When disabled, the line is
        omitted so the URL doesn't leak through robots.txt either.
        `Cache-Control: public, max-age=3600` mirrors the sitemap
        cadence so a single CDN purge refreshes both surfaces.
      responses:
        "200":
          description: |
            Plain-text robots directives.
          content:
            text/plain:
              schema: { type: string }

  /api/config/notifications:
    get:
      tags: [Settings & Push]
      summary: Public notification-channel config probe for the SPA.
      description: |
        Exposes which notification channels are wired up on this
        deployment without revealing the underlying URLs (the
        webhooks usually carry an opaque secret in the path). Three
        independent booleans, one per channel:

          * `webhook_configured`  — generic `WEBHOOK_URL` is set.
          * `discord_configured`  — `DISCORD_WEBHOOK_URL` is set.
          * `slack_configured`    — `SLACK_WEBHOOK_URL` is set.
          * `email_configured`    — `SMTP_HOST` and `SMTP_TO` are
            both set (a host without recipients has nowhere to send,
            so both are required).
          * `dkg_configured`      — all three of `DKG_API_URL`,
            `DKG_AUTH_TOKEN`, `DKG_CONTEXT_GRAPH_ID` are set.
          * `dkg_network`         — `"testnet"` / `"mainnet"` /
            `null` (suppressed when the integration isn't usable).

        Mirrors the existing `GET /api/config/sitemap` posture — a
        small public envelope the `EmbedDialog` consumes on mount to
        render the right status chips beside the share-and-embed
        surfaces. `Cache-Control: no-store` so a Settings-modal save
        is reflected on the next dialog open.
      responses:
        "200":
          description: Notification-channel config envelope.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [webhook_configured, discord_configured, slack_configured, email_configured]
                    properties:
                      webhook_configured:
                        type: boolean
                        description: |
                          `WEBHOOK_URL` is set and non-empty. The generic
                          JSON-blob webhook covers Zapier / Make / n8n /
                          IFTTT / any custom listener.
                      discord_configured:
                        type: boolean
                        description: |
                          `DISCORD_WEBHOOK_URL` is set. When `true`,
                          MiroShark POSTs a Discord-native rich embed
                          (consensus-coloured border, scenario title,
                          belief percentage fields, share-card thumbnail,
                          link) on every terminal-state transition.
                      slack_configured:
                        type: boolean
                        description: |
                          `SLACK_WEBHOOK_URL` is set. When `true`,
                          MiroShark POSTs a Slack Block Kit message
                          (header + context + section fields + actions
                          button) on every terminal-state transition.
                      email_configured:
                        type: boolean
                        description: |
                          Both `SMTP_HOST` and `SMTP_TO` are set
                          (recipients are required — a host with no
                          recipients has nowhere to send, so the
                          channel reads as unconfigured). When `true`,
                          MiroShark sends a `multipart/alternative`
                          email (plain-text + HTML) on every
                          terminal-state transition via the configured
                          relay. `SMTP_USER` / `SMTP_PASSWORD` are
                          optional — unauthenticated relays (e.g.
                          `localhost:25`) are supported. Recipient
                          addresses themselves are never returned.
                      dkg_configured:
                        type: boolean
                        description: |
                          All three of `DKG_API_URL`, `DKG_AUTH_TOKEN`,
                          and `DKG_CONTEXT_GRAPH_ID` are set. When
                          `true`, the EmbedDialog renders the
                          OriginTrail DKG citation card with a publish
                          CTA (or the citation primitives if already
                          anchored). Auth token never leaves the
                          backend.
                      dkg_network:
                        type: [string, "null"]
                        enum: [testnet, mainnet, null]
                        description: |
                          Pure metadata — labels the chain the
                          operator's daemon was configured against so
                          the SPA renders the right network chip and
                          explorer link. `null` when the integration
                          isn't fully configured.

  /api/config/sitemap:
    get:
      tags: [Discovery]
      summary: Public sitemap-config flag for the SPA.
      description: |
        Exposes whether `/sitemap.xml` is enabled on this deployment
        so the EmbedDialog renders the right hint without leaking
        any secret config. Returns `{enabled, sitemap_url}` where
        `sitemap_url` is the absolute public URL when enabled and
        `null` otherwise. Public — the flag is not sensitive and the
        URL is the same one any crawler would discover via
        robots.txt.
      responses:
        "200":
          description: Sitemap config envelope.
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [enabled, sitemap_url]
                    properties:
                      enabled:
                        type: boolean
                        description: Whether `/sitemap.xml` serves content on this deployment.
                      sitemap_url:
                        type: string
                        nullable: true
                        description: |
                          Absolute URL of `/sitemap.xml` when enabled
                          and a base URL is resolvable; `null`
                          otherwise.

  /api/simulation/{simulation_id}/export:
    get:
      tags: [Export]
      summary: Download a full simulation as JSON or CSV.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
        - in: query
          name: format
          schema: { type: string, enum: [json, csv], default: json }
        - in: query
          name: include
          schema: { type: string, default: "actions,posts,timeline,agent_stats,metadata" }
          description: Comma-separated section list.
      responses:
        "200":
          description: File download.
          content:
            application/json:
              schema: { type: object }
            text/csv:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulation/{simulation_id}/article:
    post:
      tags: [Publish & Embed]
      summary: Generate a Substack-style write-up for a finished run.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Article markdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/{simulation_id}/resolve:
    post:
      tags: [Publish & Embed]
      summary: Mark a simulation as resolved against an actual outcome.
      description: |
        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual_outcome]
              properties:
                actual_outcome:
                  type: string
                  enum: [YES, NO, PARTIAL, INDETERMINATE]
      responses:
        "200":
          description: Resolution recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/outcome:
    get:
      tags: [Publish & Embed]
      summary: Read the verified-prediction annotation for a simulation.
      description: |
        Returns the saved outcome (or `data: null` when the simulation has
        none). Distinct from `/resolve`, which is binary (YES/NO) and tied
        to Polymarket consensus. This annotation is open-ended, gallery-
        facing, and the source for the `?verified=1` filter on
        `/api/simulation/public`.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Outcome (may be null when none has been submitted).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/SimulationOutcome"
                          - type: "null"
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Publish & Embed]
      summary: Record a verified-prediction annotation for a public simulation.
      description: |
        Requires `is_public=true` on the simulation (POST `/publish` to
        enable). Submitting again overwrites the previous annotation —
        operators can correct a wrong call without leaving stale records.

        Mutation endpoint — gated on `Authorization: Bearer
        $MIROSHARK_ADMIN_TOKEN`. See the `AdminToken` security scheme.
        `GET /outcome` (above) is **not** gated — the gallery and embed
        widgets read this without a token.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  enum: [correct, incorrect, partial]
                  description: How the agent consensus held up against reality.
                outcome_url:
                  type: string
                  format: uri
                  maxLength: 500
                  description: Optional pointer to the article/tweet/dashboard that confirmed the outcome.
                outcome_summary:
                  type: string
                  maxLength: 280
                  description: Tweet-sized human description of what really happened.
            example:
              label: correct
              outcome_url: https://example.com/aave-incident
              outcome_summary: "Aave's GHO peg broke under the simulated stress scenario on 2026-04-25, matching the agent consensus."
      responses:
        "200":
          description: Outcome saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SimulationOutcome" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not public.
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/webhook-log:
    get:
      tags: [Publish & Embed]
      summary: Recent webhook delivery attempts for a simulation.
      description: |
        Returns the last 10 entries from `<sim_dir>/webhook-log.jsonl`
        newest-first plus the all-time `total_attempts` counter.

        Each line is one attempt by the outbound completion webhook
        (PR #46) — auto-fired at simulation end, or manually replayed
        via `POST /webhook-retry`. Operators use this surface to
        verify the webhook fired, see HTTP status / latency, and decide
        whether to retry. The dispatcher truncates the on-disk log to
        the last 50 attempts; `total_attempts` keeps climbing past
        that bound.

        URLs are masked (`scheme://host/***`) before persisting so the
        Slack / Discord secret in the path never round-trips through
        the read endpoint.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Delivery log slice.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WebhookDeliveryLog" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/webhook-retry:
    post:
      tags: [Publish & Embed]
      summary: Re-fire the completion webhook for a finished simulation.
      description: |
        Manually replays the outbound completion webhook for a sim
        already in a terminal state. Useful when the original delivery
        hit a transient 5xx, the URL was misconfigured at the time, or
        the consuming integration was down.

        The retry payload carries an extra top-level `retry: true` so
        downstream consumers can dedupe / handle replays differently.
        The replay appends a new entry to `webhook-log.jsonl` with
        `trigger: "retry"` so a subsequent log read can tell automatic
        and operator-fired deliveries apart.

        Bypasses the per-process `(sim_id, status)` dedup gate the
        auto-fire path uses — that gate exists only to prevent the
        runner's two terminal code paths from double-firing
        automatically; an explicit retry should always go through.

        Returns 400 when no webhook URL is configured (set
        `WEBHOOK_URL` in Settings or as an env var first), 409 when
        the simulation has not reached a terminal state.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [completed, failed]
                  description: |
                    Optional. Defaults to the simulation's current
                    runner status when omitted; pass explicitly to
                    replay either side of a recent state transition.
            example:
              status: completed
      responses:
        "200":
          description: Retry queued — the delivery happens in a daemon thread.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [queued, sim_id, status]
                        properties:
                          queued: { type: boolean, enum: [true] }
                          attempt_will_be:
                            type: integer
                            description: Optimistic next attempt number — the actual log entry is written after the POST returns.
                          sim_id: { type: string }
                          status: { type: string, enum: [completed, failed] }
                          url_masked: { type: string }
        "400":
          description: No webhook URL configured (or unsupported status passed).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Simulation has not reached a terminal state yet.
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }

  /api/simulation/{simulation_id}/dkg-citation:
    get:
      tags: [Publish & Embed]
      summary: Read the persisted OriginTrail DKG citation for a published sim.
      description: |
        Returns the on-chain citation primitives anchored when an
        operator clicked "Publish to DKG" in the share dialog. Pure
        read of `<sim_dir>/dkg-citation.json` — no daemon call. The
        citation file is the source of truth once a Knowledge Asset
        has been anchored.

        Same publish gate as the `reproduce.json` / thread / lineage
        surfaces: a private sim returns 403 even if a citation file
        happens to be on disk.

        Returns 404 (not 500) when the sim has never been anchored —
        the EmbedDialog uses that as the "render the publish CTA"
        signal.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Citation primitives for the on-chain Knowledge Asset.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [ual, network, context_graph_id, assertion_name, published_at]
                        properties:
                          ual:
                            type: string
                            description: Universal Asset Locator (`urn:dkg:context-graph:…`).
                          merkle_root:
                            type: string
                            description: Hex Merkle root committed on-chain.
                          transaction_hash:
                            type: string
                            description: Hex transaction hash on the anchoring chain.
                          block_number:
                            type: [integer, "null"]
                          finalized: { type: boolean }
                          network:
                            type: string
                            enum: [testnet, mainnet]
                          context_graph_id: { type: string }
                          assertion_name: { type: string }
                          reproduce_config_sha256:
                            type: string
                            description: |
                              `sha256:<hex>` of the canonical
                              `reproduce.json` bytes — the citation
                              key a verifier re-hashes locally.
                          explorer_url:
                            type: string
                            format: uri
                            description: OriginTrail DKG explorer link for the UAL.
                          published_at:
                            type: string
                            format: date-time
                          schema_version: { type: string, enum: ["1"] }
        "403":
          description: Simulation is not published.
        "404":
          description: No DKG citation yet for this simulation.

  /api/simulation/{simulation_id}/publish-dkg:
    post:
      tags: [Publish & Embed]
      summary: Anchor a finished simulation on the OriginTrail DKG.
      description: |
        Walks the OriginTrail DKG v9/v10 WM → SWM → VM publish pipeline
        on the operator's local daemon and returns the resulting UAL
        + Merkle root + transaction hash + block number.

        Idempotent: a successful publish persists
        `<sim_dir>/dkg-citation.json` and subsequent calls return the
        cached citation directly — no double-spend of TRAC or gas. The
        on-disk file is the source of truth.

        Steps the route walks server-side:

          1. `POST /api/assertion/create`          (Working Memory)
          2. `POST /api/assertion/{name}/write`    (append Turtle RDF)
          3. `POST /api/assertion/{name}/promote`  (WM → SWM)
          4. `POST /api/shared-memory/publish`     (SWM → Verified Memory)

        Returns 503 when `DKG_*` env vars are unset, 502 on a daemon
        error (chain failure, insufficient TRAC, name collision), 504
        on connection refused / publish timeout, and 422 when the
        simulation hasn't reached the prepared state. The publish
        action requires the admin token because on-chain anchoring
        costs TRAC + gas.
      security:
        - AdminToken: []
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: |
                    Re-anchor even when a `dkg-citation.json` already
                    exists. The v1 UI does not expose this; it is an
                    escape hatch for operators who explicitly want to
                    burn TRAC + gas on a fresh anchor after correcting
                    upstream data.
            example:
              force: false
      responses:
        "200":
          description: |
            Publish succeeded (or a cached citation was returned for
            an already-anchored sim).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      cached:
                        type: boolean
                        description: |
                          `true` when the citation came from
                          `dkg-citation.json` without contacting the
                          daemon; `false` when freshly anchored.
                      data:
                        $ref: "#/components/schemas/DkgCitation"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Simulation is not published.
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Simulation has not reached the prepared state — nothing to anchor yet.
        "502":
          description: |
            DKG daemon returned an error (chain failure, validation
            error, insufficient TRAC, name collision, etc.).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage:
                    type: string
                    enum: [create, write, promote, publish, unknown]
                  daemon_status_code:
                    type: integer
                    description: The HTTP status the daemon returned.
        "503": { $ref: "#/components/responses/AdminAuthNotConfigured" }
        "504":
          description: DKG daemon unreachable or publish timed out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [false] }
                  error: { type: string }
                  stage:
                    type: string
                    enum: [create, write, promote, publish]

  # ────────────────────────────────────────────────────────────────────
  # Report Agent
  # ────────────────────────────────────────────────────────────────────

  /api/report/generate:
    post:
      tags: [Report Agent]
      summary: Launch the ReACT report agent for a simulation.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SimulationIdBody" }
      responses:
        "200":
          description: Report generation started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/generate/status:
    post:
      tags: [Report Agent]
      summary: Poll a running report-generation job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_id]
              properties:
                report_id: { type: string }
      responses:
        "200":
          description: Status payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}:
    get:
      tags: [Report Agent]
      summary: Full report by id.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/by-simulation/{simulation_id}:
    get:
      tags: [Report Agent]
      summary: Latest report for a given simulation.
      parameters:
        - $ref: "#/components/parameters/SimulationIdPath"
      responses:
        "200":
          description: Report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/download:
    get:
      tags: [Report Agent]
      summary: Download report as PDF.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF binary.
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /api/report/chat:
    post:
      tags: [Report Agent]
      summary: Chat with the report agent — re-queries the underlying graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_id, question]
              properties:
                report_id: { type: string }
                question: { type: string }
      responses:
        "200":
          description: Reply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log:
    get:
      tags: [Report Agent]
      summary: Full ReACT agent trace for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trace records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of ReACT agent steps as they happen.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/report/{report_id}/console-log:
    get:
      tags: [Report Agent]
      summary: Raw LLM call logs for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Console log lines.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/console-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of raw LLM console-log lines.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  # ────────────────────────────────────────────────────────────────────
  # Observability
  # ────────────────────────────────────────────────────────────────────

  /api/observability/events/stream:
    get:
      tags: [Observability]
      summary: Live SSE feed of system events.
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/observability/events:
    get:
      tags: [Observability]
      summary: Paginated event log.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Events.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/observability/stats:
    get:
      tags: [Observability]
      summary: Aggregate observability counters.
      responses:
        "200":
          description: Counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/observability/llm-calls:
    get:
      tags: [Observability]
      summary: LLM call history (latency, model, prompt cost when available).
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Call records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Settings & Push
  # ────────────────────────────────────────────────────────────────────

  /api/settings:
    get:
      tags: [Settings & Push]
      summary: Read the active runtime config (API keys masked).
      responses:
        "200":
          description: Config snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
    post:
      tags: [Settings & Push]
      summary: Update runtime config — no restart required.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsUpdate" }
      responses:
        "200":
          description: Updated snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/settings/test-llm:
    post:
      tags: [Settings & Push]
      summary: Make a minimal test call against the configured LLM.
      responses:
        "200":
          description: Latency + sample response (or error).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/settings/test-webhook:
    post:
      tags: [Integrations]
      summary: Fire a sample completion event at the configured webhook URL.
      description: |
        Synchronous test POST used by the Settings *Send test event* button.
        Always returns HTTP 200 so the frontend can render success / failure
        body uniformly. Pass `url` and optional `public_base_url` to test an
        unsaved value; omit to test the currently saved webhook URL.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
                public_base_url: { type: string, format: uri }
      responses:
        "200":
          description: Delivery outcome with latency and masked URL.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          success: { type: boolean }
                          message: { type: string }
                          latency_ms: { type: integer }
                          url_masked: { type: string }

  /api/simulation/push/vapid-public-key:
    get:
      tags: [Settings & Push]
      summary: Return the VAPID public key for browser Web Push.
      responses:
        "200":
          description: Public key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/push/subscribe:
    post:
      tags: [Settings & Push]
      summary: Register a Web Push subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscription" }
      responses:
        "200":
          description: Subscription stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/push/test:
    post:
      tags: [Settings & Push]
      summary: Fire a test push notification at the registered subscription.
      responses:
        "200":
          description: Test dispatched.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Integrations
  # ────────────────────────────────────────────────────────────────────

  /api/mcp/status:
    get:
      tags: [Integrations]
      summary: MCP server status, tool catalog, per-client config snippets.
      description: |
        Used by the Settings → AI Integration panel to render copy-paste
        config blocks for Claude Desktop, Cursor, Windsurf and Continue —
        plus a Neo4j liveness probe so the operator can see at a glance
        whether the graph store is reachable. The MCP server itself runs
        over stdio and is launched by the user's IDE; this endpoint never
        spawns or talks to it directly.
      responses:
        "200":
          description: Status payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/McpStatus" }

  # ────────────────────────────────────────────────────────────────────
  # Documentation
  # ────────────────────────────────────────────────────────────────────

  /api/docs:
    get:
      tags: [Documentation]
      summary: Swagger UI rendering of this OpenAPI spec.
      responses:
        "200":
          description: Swagger UI HTML.
          content:
            text/html:
              schema: { type: string }

  /api/openapi.yaml:
    get:
      tags: [Documentation]
      summary: This OpenAPI 3.1 spec, in YAML.
      responses:
        "200":
          description: YAML document.
          content:
            application/yaml:
              schema: { type: string }

  /api/openapi.json:
    get:
      tags: [Documentation]
      summary: This OpenAPI 3.1 spec, in JSON.
      responses:
        "200":
          description: JSON document.
          content:
            application/json:
              schema: { type: object }

  /health:
    get:
      tags: [Documentation]
      summary: Liveness probe.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: MiroShark Backend }

components:

  securitySchemes:
    AdminToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Shared operator secret read from `MIROSHARK_ADMIN_TOKEN` in the
        backend process environment. Sent as `Authorization: Bearer
        <token>`. Compared in constant time on the server.

        Required on every mutation endpoint that writes to a
        simulation's on-disk state — `POST /publish`, `POST /resolve`,
        `POST /outcome`. Read endpoints (including `GET /outcome`)
        remain public.

        Fail-closed: when `MIROSHARK_ADMIN_TOKEN` is unset or empty in
        the deployment's environment, the gated endpoints return
        `503 — admin auth not configured` rather than allowing the
        request through. This is intentional — an operator who forgot
        to set the secret would otherwise ship an open mutation
        surface. Configure the token before exposing the backend
        publicly.

  parameters:
    SimulationIdPath:
      in: path
      name: simulation_id
      required: true
      schema: { type: string, pattern: "^sim_[A-Za-z0-9]+$" }
      description: Opaque simulation identifier — `sim_xxxx`.
      example: sim_8a3c2f1e

  responses:
    BadRequest:
      description: Malformed request body or query.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Resource is not public — toggle via `/publish`.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Sliding-window rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: |
        Admin token missing or invalid. The response body is generic
        (`{"success": false, "error": "Unauthorized"}`) — the server
        deliberately does not distinguish "missing" from "wrong" so a
        probe can't tell the difference.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    AdminAuthNotConfigured:
      description: |
        `MIROSHARK_ADMIN_TOKEN` is unset or empty on the backend —
        mutation endpoints fail closed rather than allowing
        unauthenticated writes. Operator must set the env var and
        restart the process.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, enum: [true] }
        data: {}

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error: { type: string }

    SimulationIdBody:
      type: object
      required: [simulation_id]
      properties:
        simulation_id: { type: string }

    DkgCitation:
      type: object
      description: |
        Citation primitives for a simulation anchored on the OriginTrail
        DKG. Persisted as `<sim_dir>/dkg-citation.json` after a
        successful publish and returned by both
        `GET /api/simulation/{simulation_id}/dkg-citation` and the 200
        response of `POST /api/simulation/{simulation_id}/publish-dkg`.
      required: [ual, network, context_graph_id, assertion_name, published_at, schema_version]
      properties:
        ual:
          type: string
          description: Universal Asset Locator (`urn:dkg:context-graph:…`).
        merkle_root:
          type: string
          description: Hex Merkle root of the on-chain assertion.
        transaction_hash:
          type: string
          description: Hex transaction hash on the anchoring chain.
        block_number:
          type: [integer, "null"]
        finalized:
          type: boolean
          description: |
            Daemon's signal that the on-chain transaction has reached
            finality on the anchoring chain.
        network:
          type: string
          enum: [testnet, mainnet]
          description: |
            Pure metadata — labels which chain the operator's daemon
            was configured against so the SPA renders the right
            explorer link. MiroShark does not pick the chain.
        context_graph_id:
          type: string
        assertion_name:
          type: string
          description: |
            DKG assertion name (`miroshark-sim-<simulation_id>`). The
            collision-on-409 behaviour of `POST /api/assertion/create`
            is the backstop to the on-disk idempotency guard.
        reproduce_config_sha256:
          type: string
          description: |
            `sha256:<hex>` of the canonical `reproduce.json` bytes. The
            citation key — a verifier fetches the URL, re-hashes the
            bytes, and compares to this literal (which is also embedded
            in the Turtle RDF committed on-chain).
        explorer_url:
          type: string
          format: uri
          description: OriginTrail DKG explorer link for the UAL.
        published_at:
          type: string
          format: date-time
        schema_version:
          type: string
          enum: ["1"]

    SimulationEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                simulation_id: { type: string }
                project_id: { type: string }
                status:
                  type: string
                  enum: [created, prepared, running, completed, failed, paused]
                profiles_count: { type: integer }
                is_public: { type: boolean }
                parent_simulation_id:
                  oneOf: [{ type: string }, { type: "null" }]
                created_at: { type: string, format: date-time }

    SuggestionsEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                suggestions:
                  type: array
                  items:
                    type: object
                    properties:
                      question: { type: string }
                      label: { type: string, enum: [Bull, Bear, Neutral] }
                      expected_yes_range:
                        type: array
                        items: { type: number }
                        minItems: 2
                        maxItems: 2
                      rationale: { type: string }
                cached: { type: boolean }
                model: { type: string }
                reason:
                  type: string
                  description: Set when `suggestions` is empty (e.g. `rate_limited`, `llm_unavailable`, `preview_too_short`).

    TrendingEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      title: { type: string }
                      url: { type: string, format: uri }
                      source_name: { type: string }
                      published_at: { type: string, format: date-time }
                feeds_used:
                  type: array
                  items: { type: string, format: uri }
                cached: { type: boolean }
                fetched_at: { type: string, format: date-time }
                reason:
                  type: string
                  description: Failure reason when items is empty.

    TaskEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id: { type: string }
                status:
                  type: string
                  enum: [pending, running, completed, failed]
                progress: { type: number }
                result: {}

    DirectorEvent:
      type: object
      required: [headline]
      properties:
        headline: { type: string }
        body: { type: string }
        round: { type: integer, minimum: 0 }
        platform: { type: string, enum: [twitter, reddit, both] }

    FrameMetadataButton:
      type: object
      required: [label, action, target]
      description: |
        Single Farcaster Frame v2 button. We only ever emit a one-button
        link-action that takes the reader to the SPA simulation view,
        but the schema is intentionally generic so post-action and
        mint-action buttons can be added later without a breaking spec
        change.
      properties:
        label:
          type: string
          description: |
            Button caption rendered inside the Frame card. Capped to a
            handful of characters in practice (Warpcast wraps long
            labels onto a second line).
        action:
          type: string
          enum: [link, post, post_redirect, mint, tx]
          description: |
            Frame v2 action verb. `link` opens the `target` URL in
            the reader's browser; `post` POSTs a Frame action to
            `target`; the others are reserved for future flows.
        target:
          type: string
          format: uri
          description: |
            Destination URL for the button action.

    FrameMetadata:
      type: object
      required:
        - sim_id
        - is_publishable
        - has_trajectory
        - frame_version
        - image_url
        - image_aspect_ratio
        - share_url
        - buttons
      description: |
        Farcaster Frame v2 metadata block for a published simulation —
        the schema the share-page renderer transcribes into
        `<meta property="fc:frame:*">` tags. The Frame spec reads the
        tags from the HTML head; this endpoint exists so the EmbedDialog
        can build the Warpcast compose link dynamically and so future
        Frame-action buttons can be added via backend config rather than
        HTML redeployment.
      properties:
        sim_id:
          type: string
          description: Echoed simulation id.
        sim_title:
          type: string
          description: |
            Scenario title truncated to the same 80-char cap the chart
            SVG title uses. Empty string when the sim has no scenario
            recorded yet.
        is_publishable:
          type: boolean
          description: |
            Always `true` on a 200 response — the endpoint 403s for
            unpublished sims so this field is informational.
        has_trajectory:
          type: boolean
          description: |
            `true` when the sim has at least one recorded round, so
            `image_url` points to the chart SVG (2:1). `false` when
            the trajectory is empty, so `image_url` falls back to the
            share-card PNG (1.91:1) — fresh sims still get a
            Farcaster-ready unfurl while the trajectory accumulates.
        frame_version:
          type: string
          enum: [next]
          description: |
            Frame v2 protocol version literal. `next` is the current
            production value across every Frame-aware Farcaster client.
        image_url:
          type: string
          format: uri
          description: |
            URL the `fc:frame:image` meta tag points at. Either the
            chart SVG (`/chart.svg`, 2:1) when trajectory data is
            present, or the share-card PNG (`/share-card.png`,
            1.91:1) for sims that haven't recorded any rounds yet.
        image_aspect_ratio:
          type: string
          enum: ["2:1", "1.91:1"]
          description: |
            Frame image aspect ratio. The spec only renders predictably
            for these two values — anything else letterboxes inside
            the cast feed.
        share_url:
          type: string
          format: uri
          description: |
            The `/share/<id>` URL the operator pastes into a Farcaster
            cast. Same value the EmbedDialog `Copy share URL` button
            copies and the Warpcast compose link encodes.
        buttons:
          type: array
          minItems: 1
          maxItems: 4
          items: { $ref: "#/components/schemas/FrameMetadataButton" }
          description: |
            Frame buttons. We emit a single `View Simulation →`
            link-action today; the schema allows up to 4 (the Frame
            spec ceiling) so future flows can extend without a
            breaking change.

    RunStatus:
      type: object
      properties:
        simulation_id: { type: string }
        runner_status:
          type: string
          enum: [idle, preparing, running, paused, completed, failed]
        current_round: { type: integer }
        total_rounds: { type: integer }
        progress_percent: { type: number }
        simulated_hours: { type: integer }
        total_simulation_hours: { type: integer }
        twitter_running: { type: boolean }
        reddit_running: { type: boolean }
        twitter_actions_count: { type: integer }
        reddit_actions_count: { type: integer }
        total_actions_count: { type: integer }
        started_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BeliefDrift:
      type: object
      properties:
        rounds:
          type: array
          items: { type: integer }
        bullish:
          type: array
          items: { type: number }
        neutral:
          type: array
          items: { type: number }
        bearish:
          type: array
          items: { type: number }
        final:
          type: object
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
        consensus_round:
          oneOf: [{ type: integer }, { type: "null" }]
        consensus_stance:
          oneOf: [{ type: string, enum: [bullish, bearish] }, { type: "null" }]

    EmbedSummary:
      type: object
      properties:
        simulation_id: { type: string }
        scenario: { type: string }
        status: { type: string }
        runner_status: { type: string }
        current_round: { type: integer }
        total_rounds: { type: integer }
        profiles_count: { type: integer }
        created_date: { type: string, format: date }
        parent_simulation_id:
          oneOf: [{ type: string }, { type: "null" }]
        is_public: { type: boolean }
        belief: { $ref: "#/components/schemas/BeliefDrift" }
        quality:
          type: object
          properties:
            health: { type: string }
            participation_rate: { type: number }
        resolution:
          type: object
          properties:
            actual_outcome: { type: string }
            predicted_consensus: { type: string }
            accuracy_score: { type: number }

    GalleryCard:
      type: object
      properties:
        simulation_id: { type: string }
        scenario: { type: string }
        status: { type: string }
        runner_status: { type: string }
        current_round: { type: integer }
        total_rounds: { type: integer }
        agent_count: { type: integer }
        quality_health: { type: string, enum: [Excellent, Good, Fair, Poor, Unknown] }
        final_consensus:
          type: object
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
        resolution_outcome:
          oneOf: [{ type: string }, { type: "null" }]
        outcome:
          oneOf:
            - $ref: "#/components/schemas/SimulationOutcome"
            - type: "null"
        created_at: { type: string, format: date-time }
        parent_simulation_id:
          oneOf: [{ type: string }, { type: "null" }]
        share_card_url: { type: string }
        share_landing_url: { type: string }

    SimulationTranscript:
      type: object
      description: |
        Citable per-round agent transcript. Same payload backs both the
        Markdown (`transcript.md`) and JSON (`transcript.json`) export
        endpoints — assembled from `trajectory.json`, `quality.json`,
        `resolution.json`, `outcome.json`, and the simulation profiles
        with the same ±0.2 stance threshold the gallery and webhook use,
        so a "bullish" agent here matches the same agent's tag on every
        other surface.
      properties:
        sim_id: { type: string }
        scenario: { type: string }
        created_date:
          type: string
          description: Run creation date (YYYY-MM-DD), per the simulation state.
        agent_count: { type: integer }
        total_rounds:
          type: integer
          description: Planned round count (from `time_config`).
        rounds_recorded:
          type: integer
          description: Actual snapshots committed to disk so far.
        consensus:
          type: object
          description: Final-round belief split + threshold-cross round.
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
            label:
              type: string
              enum: [bullish, neutral, bearish]
            round:
              type: integer
              nullable: true
        quality:
          type: object
          properties:
            health: { type: string, nullable: true }
            participation_rate: { type: number, nullable: true }
        resolution:
          type: object
          nullable: true
          description: Polymarket resolution snapshot when present.
          properties:
            actual_outcome: { type: string }
            predicted_consensus: { type: string }
            accuracy_score: { type: number }
        outcome:
          $ref: "#/components/schemas/SimulationOutcome"
          nullable: true
        rounds:
          type: array
          description: One entry per recorded round, in chronological order.
          items:
            type: object
            properties:
              round: { type: integer }
              timestamp: { type: string }
              total_posts: { type: integer }
              total_engagements: { type: integer }
              active_agent_count: { type: integer }
              stance_split:
                type: object
                properties:
                  bullish: { type: number }
                  neutral: { type: number }
                  bearish: { type: number }
              posts:
                type: array
                items:
                  type: object
                  properties:
                    post_id: { type: integer, nullable: true }
                    agent_id: { type: integer }
                    agent_name: { type: string }
                    stance:
                      type: string
                      enum: [bullish, neutral, bearish]
                    stance_value:
                      type: number
                      description: Agent's mean per-topic position for this round (-1..+1).
                    content:
                      type: string
                      description: Post body, excerpted to ~400 chars with an ellipsis.
                    likes: { type: integer }
                    dislikes: { type: integer }

    SimulationOutcome:
      type: object
      description: |
        Verified-prediction annotation written by the operator after a
        public simulation's real-world counterpart resolved. Drives the
        ◎ Verified badge on the gallery and the `/verified` filter view.
      properties:
        label:
          type: string
          enum: [correct, incorrect, partial]
        outcome_url:
          type: string
          format: uri
          description: External link confirming the outcome (may be empty).
        outcome_summary:
          type: string
          description: Tweet-sized human description (≤280 chars).
        submitted_at:
          type: string
          format: date-time

    WebhookDeliveryEntry:
      type: object
      description: |
        One row of the per-simulation webhook delivery log. Written by
        the dispatcher after each POST attempt completes — successful
        or otherwise. Failure rows carry the upstream message in
        `error`; success rows have `error: null`.

        Note on HMAC signing: when `WEBHOOK_SECRET` is configured, the
        dispatcher attaches an `X-MiroShark-Signature: sha256=<hex>`
        header computed from the raw request body. The signature is
        **transport-only** — only `url_masked` is stored here; neither
        the secret nor the signature value is persisted to disk. See
        `docs/WEBHOOKS.md` → "Verifying webhook signatures" for the
        recipient-side verification pattern.
      required: [attempt, timestamp, ok, url_masked, trigger]
      properties:
        attempt:
          type: integer
          description: Monotonically increasing 1-based counter; survives log truncation.
        timestamp:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp of when the dispatch completed.
        url_masked:
          type: string
          description: |
            `scheme://host/***` mask of the configured webhook URL —
            the path of a Slack / Discord webhook URL is the secret
            and is never echoed to disk or to the API consumer.
        event:
          type: string
          description: The `event` field from the dispatched payload (e.g. `simulation.completed`).
        status:
          type: string
          enum: [completed, failed]
          description: Terminal status the simulation reached when this delivery fired.
        status_code:
          oneOf:
            - { type: integer }
            - { type: "null" }
          description: HTTP status returned by the downstream endpoint, or `null` for network errors / timeouts.
        ok:
          type: boolean
          description: True for a 2xx response; false for any other outcome.
        latency_ms:
          type: integer
          description: Wall-clock time of the HTTP call, in milliseconds.
        error:
          oneOf:
            - { type: string }
            - { type: "null" }
          description: Human-readable upstream error string on failure; `null` on success.
        trigger:
          type: string
          enum: [auto, retry]
          description: |
            `auto` for the runner-fired path (simulation completion),
            `retry` for an operator-driven replay via `/webhook-retry`.

    WebhookDeliveryLog:
      type: object
      description: |
        Recent webhook delivery attempts for one simulation. Returned
        from `GET /webhook-log` — newest-first slice plus the all-time
        attempt counter and the on-disk retention bound.
      required: [entries, total_attempts, max_retained]
      properties:
        entries:
          type: array
          description: Last `WEBHOOK_LOG_RETURN_LIMIT` entries, newest first.
          items:
            $ref: "#/components/schemas/WebhookDeliveryEntry"
        total_attempts:
          type: integer
          description: All-time attempt counter — keeps climbing past the on-disk truncation bound.
        max_retained:
          type: integer
          description: Maximum number of entries the dispatcher persists on disk before rolling oldest off.

    SimulationTrajectoryRow:
      type: object
      description: |
        One row of the per-round belief trajectory export. The CSV
        endpoint emits a fixed column order; the JSONL endpoint emits
        the same fields per object, one object per line. The bullish /
        neutral / bearish percentages use the same ±0.2 stance
        threshold as every other surface so the numbers in this row
        match what the gallery + share card report for the same round.
      properties:
        round:
          type: integer
          description: Zero- or one-indexed round number, per the runner.
        round_timestamp:
          type: string
          description: ISO-8601 timestamp the snapshot was committed (may be empty for older runs).
        bullish_pct:
          type: number
          description: Percentage of agents whose mean position > +0.2 this round.
        neutral_pct:
          type: number
          description: Percentage of agents whose mean position is in [-0.2, +0.2].
        bearish_pct:
          type: number
          description: Percentage of agents whose mean position < -0.2 this round.
        participating_agents:
          type: integer
          description: Distinct agents that posted in this round (falls back to active_agent_count on rounds with no viral_posts).
        total_posts:
          type: integer
          description: Posts created during the round.
        total_engagements:
          type: integer
          description: Likes + dislikes + replies recorded during the round.
        quality_health:
          type: string
          description: Overall run health (`excellent` / `good` / `degraded` / `poor`); repeated on every row.
        participation_rate:
          oneOf:
            - { type: number }
            - { type: string }
          description: Overall participation rate ∈ [0,1] from quality.json; empty string when the run has not produced quality.json yet.

    SimulationThread:
      type: object
      description: |
        Structured tweet-thread payload returned by `thread.json`. The
        plain-text form (`thread.txt`) is the same `tweets` array joined
        with `---` separators — consumers that need per-tweet metadata
        (truncation flag, total inflections in the underlying run)
        should consume the JSON form.
      required: [tweets, total, inflections_recorded, truncated]
      properties:
        tweets:
          type: array
          description: |
            Ordered list of tweets, each ≤280 characters. The first
            tweet is the intro (scenario + scale + consensus label),
            the last tweet is the close (final verdict + watch URL +
            share URL); the body in between is one tweet per belief
            inflection point (or, when truncated, the first 3 + a
            single bridge tweet + the last 3).
          items:
            type: string
            maxLength: 280
        total:
          type: integer
          description: Total number of tweets in the thread (intro + body + close).
        inflections_recorded:
          type: integer
          description: |
            Total number of belief inflections detected in the
            underlying run. May exceed the body-tweet count when the
            thread was truncated.
        truncated:
          type: boolean
          description: |
            True when `inflections_recorded` exceeded the per-thread
            body budget and a bridge tweet was inserted between the
            head and tail inflections.

    SimulationSurfaceStats:
      type: object
      description: |
        Envelope returned by `/api/simulation/{id}/surface-stats`. Each
        named counter is the cumulative number of times that share
        surface has served a successful response for the simulation.
        Every key is always present (zero-defaulted), so a frontend
        renders the table without special-casing missing fields.
      required: [success, simulation_id, stats]
      properties:
        success:
          type: boolean
        simulation_id:
          type: string
          description: Echoed simulation id.
        stats:
          type: object
          required:
            - share_card
            - replay_gif
            - transcript_md
            - transcript_json
            - trajectory_csv
            - trajectory_jsonl
            - thread_txt
            - thread_json
            - watch_page
            - feed_atom
            - feed_rss
            - reproduce_json
            - lineage
            - signal_json
            - archive_zip
            - badge_svg
            - cite_bib
            - total
          properties:
            share_card:
              type: integer
              minimum: 0
              description: Successful `share-card.png` serves.
            replay_gif:
              type: integer
              minimum: 0
              description: Successful `replay.gif` serves.
            transcript_md:
              type: integer
              minimum: 0
              description: Successful `transcript.md` serves.
            transcript_json:
              type: integer
              minimum: 0
              description: Successful `transcript.json` serves.
            trajectory_csv:
              type: integer
              minimum: 0
              description: Successful `trajectory.csv` serves.
            trajectory_jsonl:
              type: integer
              minimum: 0
              description: Successful `trajectory.jsonl` serves.
            thread_txt:
              type: integer
              minimum: 0
              description: Successful `thread.txt` serves.
            thread_json:
              type: integer
              minimum: 0
              description: Successful `thread.json` serves.
            watch_page:
              type: integer
              minimum: 0
              description: Successful `/watch/{id}` serves (public sims only).
            feed_atom:
              type: integer
              minimum: 0
              description: |
                Number of times this simulation appeared in a served
                Atom feed render (`/api/feed.atom`). Each feed render
                increments every sim that landed in the rendered card
                set, so this counter is best read as "syndicated to
                Atom subscribers N times".
            feed_rss:
              type: integer
              minimum: 0
              description: |
                Same semantics as `feed_atom` for the RSS 2.0 form.
            reproduce_json:
              type: integer
              minimum: 0
              description: Successful `reproduce.json` serves.
            lineage:
              type: integer
              minimum: 0
              description: Successful `/lineage` serves.
            notebook_ipynb:
              type: integer
              minimum: 0
              description: Successful `notebook.ipynb` serves.
            chart_svg:
              type: integer
              minimum: 0
              description: |
                Successful `chart.svg` serves — the per-round belief
                trajectory rendered as a scalable vector image
                embeddable as an `<img>` tag in Notion / Substack /
                Ghost / GitHub READMEs / LaTeX.
            signal_json:
              type: integer
              minimum: 0
              description: |
                Successful `signal.json` serves — the machine-readable
                trading signal derived from the final belief split +
                quality health (`direction`, `confidence_pct`,
                `risk_tier`). Tracks pickup by quant tools, Zapier /
                Make / n8n automations, and alert pipelines that
                consume the JSON directly.
            archive_zip:
              type: integer
              minimum: 0
              description: |
                Successful `archive.zip` serves — the take-offline
                composite ZIP bundling every published share surface
                (share-card, chart SVG, trajectory CSV / JSONL,
                transcript, thread, reproduce.json, notebook, signal.json)
                plus a `manifest.json` with per-file SHA-256s. Tracks
                pickup by researchers building citation chains or
                running comparison studies across multiple sims.
            badge_svg:
              type: integer
              minimum: 0
              description: |
                Successful `badge.svg` serves — the flat
                Shields.io-compatible 20-pixel status badge embeddable
                in any GitHub README, Notion page, Substack post, or
                personal site as a one-line Markdown image. Tracks
                the passive-distribution surface — every page view of
                an embedding README increments this counter, so a
                popular README produces visibly more serves than the
                interactive surfaces.
            cite_bib:
              type: integer
              minimum: 0
              description: |
                Successful `cite.bib` serves — the BibTeX academic
                citation entry. Tracks pickup by LaTeX paper authors
                pulling the entry into a `\bibliography{}` block and
                by Zotero / Mendeley users importing via "Import from
                URL". A spike here indicates academic adoption — a
                sim being cited in a paper draft typically produces
                a small number of fetches per author (one per import
                + occasional re-fetches when the SHA-256 needs
                re-verification).
            total:
              type: integer
              minimum: 0
              description: Sum of every per-surface counter above.

    TradingSignal:
      type: object
      description: |
        Machine-readable trading-signal payload returned by
        `/api/simulation/{id}/signal.json`. Derives the action primitive
        a quant tool, Zapier workflow, or alert pipeline can consume
        directly from the same final-state belief percentages every
        other surface displays.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - direction
        - confidence_pct
        - risk_tier
        - bullish_pct
        - neutral_pct
        - bearish_pct
        - quality_health
        - signal_generated_at
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        direction:
          type: string
          enum: [Bullish, Neutral, Bearish]
          description: |
            Plurality stance from the final-round belief distribution.
            Tie-break order is documented and stable:
            `bullish > bearish > neutral`.
        confidence_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            How far the leading stance is from a pure three-way split.
            `0` ⇒ split at the noise floor (33.3% each);
            `100` ⇒ unanimous leading stance. Formula:
            `(leading_pct - 33.333) / 66.667 * 100` clamped to
            `[0, 100]` and rounded to one decimal place.
        risk_tier:
          type: string
          enum: [low-risk, medium-risk, high-risk]
          description: |
            Maps the simulation's quality health to a three-tier risk
            label downstream trading systems expect:
            `excellent` → `low-risk`,
            `good` → `medium-risk`,
            everything else (`fair`, `poor`, missing, `"N/A"`) →
            `high-risk`. The default-to-high posture is deliberate —
            an unknown-quality signal is treated cautiously.
        bullish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Final-round bullish share — same ±0.2 stance threshold as
            every other surface. Rounded to one decimal place.
        neutral_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round neutral share. Rounded to one decimal place.
        bearish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bearish share. Rounded to one decimal place.
        quality_health:
          type: string
          description: |
            Simulation quality health string echoed from `quality.json`
            (typically `excellent` / `good` / `fair` / `poor`). Falls
            back to `"N/A"` when the underlying field is missing or
            empty.
        signal_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the signal was computed (ISO-8601 with
            trailing `Z`). Tracks the *signal computation time*, not
            the underlying simulation completion time — bytewise
            determinism is not a property of this surface (unlike
            reproduce.json / notebook.ipynb whose bytes need to be
            citation-hashable).

    PolymarketPrediction:
      type: object
      description: |
        Polymarket-shaped binary-market prediction returned by
        `/api/simulation/{id}/polymarket.json`. Re-envelope of the
        `signal.json` action primitive into the YES / NO probability
        shape a Polymarket trading bot expects between *"simulation
        result"* and *"actionable market signal"*.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - direction
        - yes_probability
        - no_probability
        - confidence_pct
        - confidence_tier
        - risk_tier
        - bullish_pct
        - neutral_pct
        - bearish_pct
        - quality_health
        - suggested_market_title
        - source_sim_id
        - polymarket_generated_at
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id (canonical key across every share surface).
        direction:
          type: string
          enum: [Bullish, Neutral, Bearish]
          description: |
            Plurality stance from the final-round belief distribution.
            Inherited from `signal.json` — same tie-break order
            (`bullish > bearish > neutral`).
        yes_probability:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Direction-aware YES probability. Bullish → `bullish_pct / 100`
            (high YES); Bearish → `1 - bearish_pct / 100` (low YES —
            the residual probability the proposition is true); Neutral
            → `0.5` exactly (coin-flip prior). Rounded to four decimal
            places, matching Polymarket's display rail precision.
        no_probability:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Always `1 - yes_probability`. The pair sums to `1.0` within
            float tolerance, the invariant a Polymarket order-book
            consumer expects.
        confidence_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Continuous confidence value inherited verbatim from
            `signal.json` — `(leading_pct - 33.333) / 66.667 * 100`
            clamped to `[0, 100]` and rounded to one decimal place.
            Exposed alongside `confidence_tier` for callers that
            want the raw value.
        confidence_tier:
          type: string
          enum: [speculative, moderate, confident, high-conviction]
          description: |
            Four-bucket discrete scale on top of `confidence_pct`:
            `<25 → speculative`, `25-50 → moderate`,
            `50-75 → confident`, `≥75 → high-conviction`. Upper
            bounds are exclusive (`25.0` is `moderate`, not
            `speculative`). Bots typically gate position size on this
            tier — different sizing for "speculative" vs.
            "high-conviction" — rather than the raw continuous value.
        risk_tier:
          type: string
          enum: [low-risk, medium-risk, high-risk]
          description: |
            Quality-health risk tier inherited from `signal.json`:
            `excellent` → `low-risk`, `good` → `medium-risk`,
            everything else (`fair`, `poor`, missing, `"N/A"`) →
            `high-risk`. Default-to-high posture — an unknown-quality
            signal is treated cautiously.
        bullish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bullish share. Rounded to one decimal place.
        neutral_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round neutral share. Rounded to one decimal place.
        bearish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bearish share. Rounded to one decimal place.
        quality_health:
          type: string
          description: |
            Simulation quality health string echoed from
            `quality.json` (typically `excellent` / `good` / `fair` /
            `poor`). Falls back to `"N/A"` when the underlying field
            is missing or empty.
        suggested_market_title:
          type: string
          description: |
            Polymarket-shaped market title synthesised from the
            simulation scenario — starts with `"Will "`, ends with a
            single `"?"`. A scenario that already starts with
            `"Will "` is not double-prefixed; trailing punctuation is
            stripped before truncation at 120 characters (with
            `"…?"` when truncated). Missing / empty scenarios fall
            back to `"Will resolve YES?"`. A *suggested* title — the
            bot author is expected to massage the string.
        source_sim_id:
          type: string
          description: |
            Same value as `simulation_id`, exposed under the field
            name a Polymarket bot expects when writing back to its
            own audit log.
        polymarket_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the prediction was computed (ISO-8601
            with trailing `Z`). Re-derived on every request — tracks
            *computation time*, not the underlying simulation
            completion time. Same posture as `signal.json` (bytewise
            determinism is not a property of this surface).

    ArchiveManifestEntry:
      type: object
      description: |
        Single-file entry inside the `manifest.json` document at the
        root of an `archive.zip` bundle. Each entry pairs a contained
        file with its SHA-256 fingerprint, byte size, MIME type, and
        the canonical standalone-surface URL the file mirrors. A
        consumer can verify integrity (`sha256` over the file bytes
        inside the ZIP), refresh a single surface (`source_url`), or
        route by content type (`mime_type`) without re-parsing the
        ZIP.
      required:
        - filename
        - sha256
        - size_bytes
        - source_url
        - mime_type
      properties:
        filename:
          type: string
          description: |
            Filename inside the ZIP (no leading path component) —
            e.g. `share-card.png`, `chart.svg`, `trajectory.csv`,
            `reproduce.json`, `notebook.ipynb`, `signal.json`,
            `transcript.md`, `thread.txt`, `trajectory.jsonl`.
        sha256:
          type: string
          description: |
            Hex-encoded SHA-256 of the file contents inside the ZIP.
            Matches the hash a consumer would compute against the
            corresponding standalone-surface URL — citation chains
            line up across both distribution paths.
        size_bytes:
          type: integer
          minimum: 0
          description: Byte length of the file as it appears inside the ZIP.
        source_url:
          type: string
          description: |
            Fully-qualified canonical URL the file mirrors (e.g.
            `https://miroshark.example.com/api/simulation/sim_abc/share-card.png`).
            Empty string when the archive was built without a known
            base URL.
        mime_type:
          type: string
          description: |
            MIME type the matching standalone-surface route serves —
            e.g. `image/png`, `image/svg+xml`, `text/csv`,
            `application/json`, `application/x-ipynb+json`,
            `text/markdown`, `text/plain`, `application/x-ndjson`.

    ArchiveManifest:
      type: object
      description: |
        Top-level `manifest.json` document at the root of an
        `archive.zip` bundle. Enumerates every contained file along
        with the archive-wide metadata a consumer needs to verify
        integrity and trace each file back to its standalone source.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - archive_generated_at
        - base_url
        - file_count
        - files
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        archive_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the archive was built (ISO-8601 with
            trailing `Z`). The only field on the archive that drifts
            across two builds of the same input set — every contained
            file is bytewise deterministic.
        base_url:
          type: string
          description: |
            Origin (scheme + host) used to compose each entry's
            `source_url`. Empty when the archive was built without a
            host context.
        file_count:
          type: integer
          minimum: 0
          description: |
            Number of entries in `files` — also surfaced via the
            `X-MiroShark-Archive-Files` response header so a HEAD
            request can render a preview without downloading the
            archive body.
        files:
          type: array
          description: |
            One `ArchiveManifestEntry` per file inside the ZIP
            (excluding the `manifest.json` itself). Ordered by the
            canonical surface order (`share-card.png`, `chart.svg`,
            `trajectory.csv`, `trajectory.jsonl`, `transcript.md`,
            `thread.txt`, `reproduce.json`, `notebook.ipynb`,
            `signal.json`); missing surfaces are simply absent rather
            than represented by a placeholder entry.
          items:
            $ref: "#/components/schemas/ArchiveManifestEntry"

    ReproductionConfig:
      type: object
      description: |
        Citation primitive returned by
        `/api/simulation/{id}/reproduce.json`. Every parameter another
        operator would need to re-run the same simulation, in one
        machine-readable document. Pretty-printed, sorted keys, stable
        bytes — identical exports of the same finished simulation
        produce identical files (citation-hash friendly).

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
        v1-aware parsers should reject blobs whose `schema_version`
        does not equal `"1"`.
      required:
        - schema_version
        - exported_at
        - simulation_id
        - scenario
        - agent_count
        - total_rounds
        - platforms
        - time_config
        - lineage
        - director_events
        - config_reasoning
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        exported_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the export was rendered (ISO-8601 with
            trailing `Z`). Same shape as the webhook delivery log's
            `timestamp` field.
        simulation_id:
          type: string
          description: Echoed simulation id.
        scenario:
          type: string
          description: |
            The simulation requirement / scenario text. Falls back to
            the state-level `simulation_requirement` field for older
            sims that wrote it onto state rather than into the
            generated config.
        agent_count:
          type: integer
          minimum: 0
          description: |
            Number of agent profiles generated for the run. Maps to
            `state.profiles_count` and determines how many distinct
            personas reasoned through the scenario.
        total_rounds:
          type: integer
          minimum: 0
          description: |
            Total rounds the simulation ran (or is configured to run).
            Prefers the runner's recorded total; falls back to
            `time_config.total_simulation_hours * 60 /
            time_config.minutes_per_round` when the runner hasn't
            populated the field. May be `0` for sims that never
            reached the prepared state.
        platforms:
          type: object
          description: |
            Platform toggles + the polymarket market-count knob — the
            four boolean / integer parameters that together with the
            scenario decide which channels the agents post to.
          required:
            - twitter
            - reddit
            - polymarket
            - polymarket_market_count
          properties:
            twitter:
              type: boolean
              description: Whether the simulation enabled the Twitter platform.
            reddit:
              type: boolean
              description: Whether the simulation enabled the Reddit platform.
            polymarket:
              type: boolean
              description: Whether the simulation enabled prediction-market trading.
            polymarket_market_count:
              type: integer
              minimum: 1
              description: |
                Number of distinct prediction markets generated when
                `polymarket=true`. Defaults to `1`. Range `[1, 5]` is
                enforced upstream by the prepare endpoint.
        time_config:
          type: object
          description: |
            The four cadence knobs that drive the simulation's
            temporal envelope. May be empty when the sim never reached
            a prepared state. Field set is intentionally narrow: the
            full LLM-generated config includes per-agent posting
            frequency + event schedules + platform tuning, but those
            are derived from the entity graph rather than parameters
            a researcher reproduces by hand.
          properties:
            minutes_per_round:
              type: integer
              minimum: 1
              description: Wall-clock minutes the simulation pretends each round covers.
            total_simulation_hours:
              type: integer
              minimum: 0
              description: Total wall-clock hours the simulation pretends to span.
            peak_hours:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 23
              description: Hours of the day treated as high-activity windows.
            off_peak_hours:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 23
              description: Hours of the day treated as low-activity windows.
        lineage:
          type: object
          description: |
            Description of how this simulation was created. Powers the
            "🪐 Forked from X" / "🔀 Counterfactual branch of X at round
            Y" badge on the EmbedDialog and (forthcoming) share / watch
            pages.
          required:
            - parent_simulation_id
            - kind
            - counterfactual
          properties:
            parent_simulation_id:
              type: string
              nullable: true
              description: |
                Parent simulation id, or `null` for original sims. When
                non-null, the parent's reproduction blob can be fetched
                from the same endpoint to get the un-branched version.
            kind:
              type: string
              enum: [original, fork, counterfactual]
              description: |
                Lineage discriminator. `original` ⇒ created via the
                standard prepare flow. `fork` ⇒ created via
                `POST /api/simulation/fork` (same agent population, new
                sim id). `counterfactual` ⇒ created via
                `POST /api/simulation/branch-counterfactual` (fork plus
                an injection event scheduled at a specific round).
            counterfactual:
              type: object
              nullable: true
              description: |
                Present only when `kind == "counterfactual"`. Carries
                the trigger round + label + 140-char preview of the
                injection text so the badge can render the headline
                without a second fetch.
              properties:
                trigger_round:
                  type: integer
                  minimum: 0
                  description: Round at which the injection fires.
                label:
                  type: string
                  description: Operator-supplied or auto-generated branch label.
                preview:
                  type: string
                  nullable: true
                  description: Up to 140 chars of the injection text.
        director_events:
          type: array
          nullable: true
          description: |
            Operator-injected scenario events (e.g. "Liquidity Crisis"
            at round 15) that shaped the belief curve. `null` when no
            events were injected — the common case. Each event carries
            its `round`, `label`, and optional `description`.
          items:
            type: object
            required: [round, label]
            properties:
              round:
                type: integer
                minimum: 0
                description: Round at which the event fired.
              label:
                type: string
                description: Short headline for the event.
              description:
                type: string
                nullable: true
                description: Longer description, or `null` when none was provided.
        config_reasoning:
          type: string
          description: |
            LLM-generated rationale for the chosen knobs, captured at
            prepare time. Empty string for older sims that didn't
            persist a rationale.

    SimulationLineage:
      type: object
      description: |
        Lineage graph slice returned by
        `/api/simulation/{id}/lineage`. Pairs the parent pointer that
        already lived on disk (PR #75 reproducibility config export)
        with the reverse pointers — the **public** children whose
        `parent_simulation_id` matches the requested simulation —
        making the fork / counterfactual graph navigable both ways.

        `parent` is `null` for original sims; `children` is a possibly
        empty list capped at 50 entries; `total_children` reflects the
        public-only scan total even when the response was capped.

        When the requested simulation is itself a counterfactual
        branch, `counterfactual` carries the trigger round + label so
        the badge can render "🔀 Counterfactual at round 12
        (ceo_resigns)" without a second fetch.
      required:
        - simulation_id
        - lineage_kind
        - parent
        - children
        - total_children
        - counterfactual
      properties:
        simulation_id:
          type: string
          description: Echoed simulation id.
        lineage_kind:
          type: string
          enum: [original, fork, counterfactual]
          description: |
            How the requested simulation was created. `original` ⇒ no
            parent. `fork` ⇒ created via `POST /api/simulation/fork`.
            `counterfactual` ⇒ created via
            `POST /api/simulation/branch-counterfactual` (fork plus an
            injection event scheduled at a specific round). Mirrors
            `lineage.kind` from the reproduce.json export.
        parent:
          type: object
          nullable: true
          description: |
            The parent simulation entry, or `null` for originals. When
            the parent has been unpublished, `is_public` is `false` and
            `scenario_preview` is the empty string — the SPA renders
            the bare placeholder rather than a click-through link.
          required:
            - simulation_id
            - scenario_preview
            - created_at
            - is_public
          properties:
            simulation_id: { type: string }
            scenario_preview:
              type: string
              description: Up to 80 chars of the parent scenario, truncated with an ellipsis.
            created_at:
              type: string
              description: Best-effort UTC timestamp from the parent's state.json.
            is_public:
              type: boolean
              description: |
                Whether the parent is itself published. False parents
                are echoed by id only — no scenario, no click-through.
        children:
          type: array
          description: |
            Public child simulations whose `parent_simulation_id`
            matches the requested sim. Sorted by `created_at`
            ascending (oldest fork first — natural narrative order).
            Capped at 50 entries; `total_children` reflects the
            uncapped count.
          items:
            type: object
            required:
              - simulation_id
              - scenario_preview
              - created_at
              - is_public
              - kind
              - counterfactual
            properties:
              simulation_id: { type: string }
              scenario_preview:
                type: string
                description: Up to 80 chars of the child scenario.
              created_at:
                type: string
                description: Best-effort UTC timestamp from the child's state.json.
              is_public:
                type: boolean
                enum: [true]
                description: Always true — private children are filtered out server-side.
              kind:
                type: string
                enum: [fork, counterfactual]
                description: |
                  How the child was created. `fork` ⇒ same agent
                  population, fresh sim id, no scheduled injection.
                  `counterfactual` ⇒ fork plus an injection event
                  scheduled at a specific round.
              counterfactual:
                type: object
                nullable: true
                description: |
                  Present only when `kind == "counterfactual"`. Carries
                  the trigger round + label so the badge can render
                  "🔀 Counterfactual at round 12 (ceo_resigns)" inline.
                required: [trigger_round, label]
                properties:
                  trigger_round:
                    type: integer
                    minimum: 0
                    description: Round at which the child's injection fires.
                  label:
                    type: string
                    description: Operator-supplied or auto-generated branch label.
        total_children:
          type: integer
          minimum: 0
          description: |
            Public-only child count discovered on disk. Equal to
            `len(children)` unless the cap truncated the response.
        counterfactual:
          type: object
          nullable: true
          description: |
            When the requested simulation is itself a counterfactual
            branch, the trigger round + label travel along so the
            badge can render the headline without a second fetch.
            `null` for originals + plain forks.
          required: [trigger_round, label]
          properties:
            trigger_round:
              type: integer
              minimum: 0
            label:
              type: string

