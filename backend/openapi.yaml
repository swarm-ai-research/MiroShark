    get:
      tags: [Settings & Push]
      summary: Return the VAPID public key for browser Web Push.
      responses:
        "200":
          description: Public key.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/push/subscribe:
    post:
      tags: [Settings & Push]
      summary: Register a Web Push subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscription" }
      responses:
        "200":
          description: Subscription stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/simulation/push/test:
    post:
      tags: [Settings & Push]
      summary: Fire a test push notification at the registered subscription.
      responses:
        "200":
          description: Test dispatched.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  # ────────────────────────────────────────────────────────────────────
  # Integrations
  # ────────────────────────────────────────────────────────────────────

  /api/mcp/status:
    get:
      tags: [Integrations]
      summary: MCP server status, tool catalog, per-client config snippets.
      description: |
        Used by the Settings → AI Integration panel to render copy-paste
        config blocks for Claude Desktop, Cursor, Windsurf and Continue —
        plus a Neo4j liveness probe so the operator can see at a glance
        whether the graph store is reachable. The MCP server itself runs
        over stdio and is launched by the user's IDE; this endpoint never
        spawns or talks to it directly.
      responses:
        "200":
          description: Status payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/McpStatus" }

  # ────────────────────────────────────────────────────────────────────
  # Documentation
  # ────────────────────────────────────────────────────────────────────

  /api/docs:
    get:
      tags: [Documentation]
      summary: Swagger UI rendering of this OpenAPI spec.
      responses:
        "200":
          description: Swagger UI HTML.
          content:
            text/html:
              schema: { type: string }

  /api/openapi.yaml:
    get:
      tags: [Documentation]
      summary: This OpenAPI 3.1 spec, in YAML.
      responses:
        "200":
          description: YAML document.
          content:
            application/yaml:
              schema: { type: string }

  /api/openapi.json:
    get:
      tags: [Documentation]
      summary: This OpenAPI 3.1 spec, in JSON.
      responses:
        "200":
          description: JSON document.
          content:
            application/json:
              schema: { type: object }

  /health:
    get:
      tags: [Documentation]
      summary: Liveness probe.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: MiroShark Backend }

components:

  securitySchemes:
    AdminToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Shared operator secret read from `MIROSHARK_ADMIN_TOKEN` in the
        backend process environment. Sent as `Authorization: Bearer
        <token>`. Compared in constant time on the server.

        Required on every mutation endpoint that writes to a
        simulation's on-disk state — `POST /publish`, `POST /resolve`,
        `POST /outcome`. Read endpoints (including `GET /outcome`)
        remain public.

        Fail-closed: when `MIROSHARK_ADMIN_TOKEN` is unset or empty in
        the deployment's environment, the gated endpoints return
        `503 — admin auth not configured` rather than allowing the
        request through. This is intentional — an operator who forgot
        to set the secret would otherwise ship an open mutation
        surface. Configure the token before exposing the backend
        publicly.

  parameters:
    SimulationIdPath:
      in: path
      name: simulation_id
      required: true
      schema: { type: string, pattern: "^sim_[A-Za-z0-9]+$" }
      description: Opaque simulation identifier — `sim_xxxx`.
      example: sim_8a3c2f1e

  responses:
    BadRequest:
      description: Malformed request body or query.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Resource is not public — toggle via `/publish`.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Sliding-window rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: |
        Admin token missing or invalid. The response body is generic
        (`{"success": false, "error": "Unauthorized"}`) — the server
        deliberately does not distinguish "missing" from "wrong" so a
        probe can't tell the difference.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    AdminAuthNotConfigured:
      description: |
        `MIROSHARK_ADMIN_TOKEN` is unset or empty on the backend —
        mutation endpoints fail closed rather than allowing
        unauthenticated writes. Operator must set the env var and
        restart the process.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:

    OEmbedResponse:
      type: object
      description: |
        oEmbed 1.0 `rich`-type payload returned by `GET /oembed`. A
        consumer renders the `html` iframe inline and the `thumbnail_url`
        as the preview image. JSON shape shown here; the `?format=xml`
        variant carries the same fields as a flat `<oembed>` element.
      required: [version, type, provider_name, title, html]
      properties:
        version: { type: string, enum: ["1.0"] }
        type: { type: string, enum: [rich] }
        provider_name: { type: string, example: MiroShark }
        provider_url: { type: string, format: uri }
        title:
          type: string
          description: Scenario prompt, truncated to 100 chars with an ellipsis.
        thumbnail_url:
          type: string
          format: uri
          description: Absolute URL of the 1200×630 share-card PNG.
        thumbnail_width: { type: integer, example: 1200 }
        thumbnail_height: { type: integer, example: 630 }
        width: { type: integer, example: 800 }
        height: { type: integer, example: 500 }
        html:
          type: string
          description: An 800×500 iframe over the `/embed/<id>` SPA route.
          example: '<iframe src="https://your-host/embed/sim_abc" width="800" height="500" frameborder="0" allowfullscreen></iframe>'
        cache_age:
          type: integer
          description: Seconds a consumer may cache the embed.
          example: 300

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, enum: [true] }
        data: {}

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error: { type: string }

    SimulationIdBody:
      type: object
      required: [simulation_id]
      properties:
        simulation_id: { type: string }

    DkgCitation:
      type: object
      description: |
        Citation primitives for a simulation anchored on the OriginTrail
        DKG. Persisted as `<sim_dir>/dkg-citation.json` after a
        successful publish and returned by both
        `GET /api/simulation/{simulation_id}/dkg-citation` and the 200
        response of `POST /api/simulation/{simulation_id}/publish-dkg`.
      required: [ual, network, context_graph_id, assertion_name, published_at, schema_version]
      properties:
        ual:
          type: string
          description: Universal Asset Locator (`urn:dkg:context-graph:…`).
        merkle_root:
          type: string
          description: Hex Merkle root of the on-chain assertion.
        transaction_hash:
          type: string
          description: Hex transaction hash on the anchoring chain.
        block_number:
          type: [integer, "null"]
        finalized:
          type: boolean
          description: |
            Daemon's signal that the on-chain transaction has reached
            finality on the anchoring chain.
        network:
          type: string
          enum: [testnet, mainnet]
          description: |
            Pure metadata — labels which chain the operator's daemon
            was configured against so the SPA renders the right
            explorer link. MiroShark does not pick the chain.
        context_graph_id:
          type: string
        assertion_name:
          type: string
          description: |
            DKG assertion name (`miroshark-sim-<simulation_id>`). The
            collision-on-409 behaviour of `POST /api/assertion/create`
            is the backstop to the on-disk idempotency guard.
        reproduce_config_sha256:
          type: string
          description: |
            `sha256:<hex>` of the canonical `reproduce.json` bytes. The
            citation key — a verifier fetches the URL, re-hashes the
            bytes, and compares to this literal (which is also embedded
            in the Turtle RDF committed on-chain).
        explorer_url:
          type: string
          format: uri
          description: OriginTrail DKG explorer link for the UAL.
        published_at:
          type: string
          format: date-time
        schema_version:
          type: string
          enum: ["1"]

    WaybackClawRecord:
      type: object
      description: |
        Snapshot record returned by the WaybackClaw AI Agent Archive
        when a simulation is submitted. Persisted as
        `<sim_dir>/waybackclaw-record.json` after a successful submit
        and returned by both
        `GET /api/simulation/{simulation_id}/waybackclaw-record` and
        the 200 response of
        `POST /api/simulation/{simulation_id}/publish-waybackclaw`.

        Sibling of the OriginTrail DKG citation: DKG anchors on-chain
        provenance, WaybackClaw provides content-addressed IPFS
        storage + Nostr broadcast. The
        `reproduce_config_sha256` field is shared between the two so
        a verifier can cross-check the bytes.
      required: [id, schema_version, submitted_at]
      properties:
        id:
          type: string
          description: WaybackClaw snapshot id — the archive's primary key.
        agent_id:
          type: string
          description: WaybackClaw agent identity that owns the snapshot.
        agent_name:
          type: string
          description: Human-readable agent display name from WaybackClaw.
        version:
          type: string
          description: |
            Snapshot version label (defaults to the simulation id when
            the API does not echo one back).
        category:
          type: string
          description: |
            WaybackClaw archive category (defaults to `prediction` —
            MiroShark sims are prediction-market-style runs).
        captured_at:
          type: string
          description: |
            ISO-8601 timestamp the WaybackClaw API recorded for the
            snapshot capture (may be empty if the API did not return one).
        ipfs_cid:
          type: string
          description: |
            Content-addressed IPFS CID for the snapshot bytes. Empty
            when the API has not yet pinned the snapshot.
        nostr_event_id:
          type: string
          description: |
            Nostr event id broadcast by WaybackClaw for the snapshot.
            Empty when the API did not return one.
        access_level:
          type: string
          description: |
            WaybackClaw access-level label (e.g. `public`). Pure
            metadata echoed from the API response.
        reproduce_config_sha256:
          type: string
          description: |
            `sha256:<hex>` of the canonical `reproduce.json` bytes —
            same key embedded in the DKG citation. A verifier fetches
            the snapshot from IPFS, re-hashes the bytes, and compares.
        archive_url:
          type: string
          format: uri
          description: |
            WaybackClaw retrieve URL for the agent's archive
            (`{api_url}/api/archive/retrieve?agentId=<agent_id>`).
        ipfs_gateway_url:
          type: string
          description: |
            Pinata gateway URL for the snapshot's IPFS CID
            (`https://gateway.pinata.cloud/ipfs/<cid>`). Empty when
            `ipfs_cid` is empty.
        submitted_at:
          type: string
          format: date-time
          description: When the MiroShark backend recorded the submit.
        schema_version:
          type: string
          enum: ["1"]

    SimulationEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                simulation_id: { type: string }
                project_id: { type: string }
                status:
                  type: string
                  enum: [created, prepared, running, completed, failed, paused]
                profiles_count: { type: integer }
                is_public: { type: boolean }
                parent_simulation_id:
                  oneOf: [{ type: string }, { type: "null" }]
                created_at: { type: string, format: date-time }

    SuggestionsEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                suggestions:
                  type: array
                  items:
                    type: object
                    properties:
                      question: { type: string }
                      label: { type: string, enum: [Bull, Bear, Neutral] }
                      expected_yes_range:
                        type: array
                        items: { type: number }
                        minItems: 2
                        maxItems: 2
                      rationale: { type: string }
                cached: { type: boolean }
                model: { type: string }
                reason:
                  type: string
                  description: Set when `suggestions` is empty (e.g. `rate_limited`, `llm_unavailable`, `preview_too_short`).

    TrendingEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      title: { type: string }
                      url: { type: string, format: uri }
                      source_name: { type: string }
                      published_at: { type: string, format: date-time }
                feeds_used:
                  type: array
                  items: { type: string, format: uri }
                cached: { type: boolean }
                fetched_at: { type: string, format: date-time }
                reason:
                  type: string
                  description: Failure reason when items is empty.

    TaskEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id: { type: string }
                status:
                  type: string
                  enum: [pending, running, completed, failed]
                progress: { type: number }
                result: {}

    DirectorEvent:
      type: object
      required: [headline]
      properties:
        headline: { type: string }
        body: { type: string }
        round: { type: integer, minimum: 0 }
        platform: { type: string, enum: [twitter, reddit, both] }

    FrameMetadataButton:
      type: object
      required: [label, action, target]
      description: |
        Single Farcaster Frame v2 button. We only ever emit a one-button
        link-action that takes the reader to the SPA simulation view,
        but the schema is intentionally generic so post-action and
        mint-action buttons can be added later without a breaking spec
        change.
      properties:
        label:
          type: string
          description: |
            Button caption rendered inside the Frame card. Capped to a
            handful of characters in practice (Warpcast wraps long
            labels onto a second line).
        action:
          type: string
          enum: [link, post, post_redirect, mint, tx]
          description: |
            Frame v2 action verb. `link` opens the `target` URL in
            the reader's browser; `post` POSTs a Frame action to
            `target`; the others are reserved for future flows.
        target:
          type: string
          format: uri
          description: |
            Destination URL for the button action.

    FrameMetadata:
      type: object
      required:
        - sim_id
        - is_publishable
        - has_trajectory
        - frame_version
        - image_url
        - image_aspect_ratio
        - share_url
        - buttons
      description: |
        Farcaster Frame v2 metadata block for a published simulation —
        the schema the share-page renderer transcribes into
        `<meta property="fc:frame:*">` tags. The Frame spec reads the
        tags from the HTML head; this endpoint exists so the EmbedDialog
        can build the Warpcast compose link dynamically and so future
        Frame-action buttons can be added via backend config rather than
        HTML redeployment.
      properties:
        sim_id:
          type: string
          description: Echoed simulation id.
        sim_title:
          type: string
          description: |
            Scenario title truncated to the same 80-char cap the chart
            SVG title uses. Empty string when the sim has no scenario
            recorded yet.
        is_publishable:
          type: boolean
          description: |
            Always `true` on a 200 response — the endpoint 403s for
            unpublished sims so this field is informational.
        has_trajectory:
          type: boolean
          description: |
            `true` when the sim has at least one recorded round, so
            `image_url` points to the chart SVG (2:1). `false` when
            the trajectory is empty, so `image_url` falls back to the
            share-card PNG (1.91:1) — fresh sims still get a
            Farcaster-ready unfurl while the trajectory accumulates.
        frame_version:
          type: string
          enum: [next]
          description: |
            Frame v2 protocol version literal. `next` is the current
            production value across every Frame-aware Farcaster client.
        image_url:
          type: string
          format: uri
          description: |
            URL the `fc:frame:image` meta tag points at. Either the
            chart SVG (`/chart.svg`, 2:1) when trajectory data is
            present, or the share-card PNG (`/share-card.png`,
            1.91:1) for sims that haven't recorded any rounds yet.
        image_aspect_ratio:
          type: string
          enum: ["2:1", "1.91:1"]
          description: |
            Frame image aspect ratio. The spec only renders predictably
            for these two values — anything else letterboxes inside
            the cast feed.
        share_url:
          type: string
          format: uri
          description: |
            The `/share/<id>` URL the operator pastes into a Farcaster
            cast. Same value the EmbedDialog `Copy share URL` button
            copies and the Warpcast compose link encodes.
        buttons:
          type: array
          minItems: 1
          maxItems: 4
          items: { $ref: "#/components/schemas/FrameMetadataButton" }
          description: |
            Frame buttons. We emit a single `View Simulation →`
            link-action today; the schema allows up to 4 (the Frame
            spec ceiling) so future flows can extend without a
            breaking change.

    RunStatus:
      type: object
      properties:
        simulation_id: { type: string }
        runner_status:
          type: string
          enum: [idle, preparing, running, paused, completed, failed]
        current_round: { type: integer }
        total_rounds: { type: integer }
        progress_percent: { type: number }
        simulated_hours: { type: integer }
        total_simulation_hours: { type: integer }
        twitter_running: { type: boolean }
        reddit_running: { type: boolean }
        twitter_actions_count: { type: integer }
        reddit_actions_count: { type: integer }
        total_actions_count: { type: integer }
        started_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BeliefDrift:
      type: object
      properties:
        rounds:
          type: array
          items: { type: integer }
        bullish:
          type: array
          items: { type: number }
        neutral:
          type: array
          items: { type: number }
        bearish:
          type: array
          items: { type: number }
        final:
          type: object
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
        consensus_round:
          oneOf: [{ type: integer }, { type: "null" }]
        consensus_stance:
          oneOf: [{ type: string, enum: [bullish, bearish] }, { type: "null" }]

    EmbedSummary:
      type: object
      properties:
        simulation_id: { type: string }
        scenario: { type: string }
        status: { type: string }
        runner_status: { type: string }
        current_round: { type: integer }
        total_rounds: { type: integer }
        profiles_count: { type: integer }
        created_date: { type: string, format: date }
        parent_simulation_id:
          oneOf: [{ type: string }, { type: "null" }]
        is_public: { type: boolean }
        belief: { $ref: "#/components/schemas/BeliefDrift" }
        quality:
          type: object
          properties:
            health: { type: string }
            participation_rate: { type: number }
        resolution:
          type: object
          properties:
            actual_outcome: { type: string }
            predicted_consensus: { type: string }
            accuracy_score: { type: number }

    ShareLinkRecord:
      type: object
      required:
        - token
        - sim_id
        - preview_url
        - share_url
        - expires_at_epoch
        - expires_at_iso
      properties:
        token:
          type: string
          description: 32-character URL-safe base64 token (`secrets.token_urlsafe(24)`).
          minLength: 32
          maxLength: 128
          pattern: "^[A-Za-z0-9_-]+$"
        sim_id:
          type: string
        preview_url:
          type: string
          format: uri
          description: Absolute `/preview/<token>` URL the operator hands to the recipient.
        share_url:
          type: string
          format: uri
          description: Alias of `preview_url` for forward-compatibility with the original spec.
        created_at_epoch:
          type: integer
        created_at_iso:
          type: string
          format: date-time
        expires_at_epoch:
          type: integer
        expires_at_iso:
          type: string
          format: date-time
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 365
          description: Lifetime in whole days (clamped). Only present on mint responses.
        expires_in_days_remaining:
          type: integer
          minimum: 0
        expires_in_seconds_remaining:
          type: integer
          minimum: 0

    GalleryCard:
      type: object
      properties:
        simulation_id: { type: string }
        scenario: { type: string }
        status: { type: string }
        runner_status: { type: string }
        current_round: { type: integer }
        total_rounds: { type: integer }
        agent_count: { type: integer }
        quality_health: { type: string, enum: [Excellent, Good, Fair, Poor, Unknown] }
        final_consensus:
          type: object
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
        resolution_outcome:
          oneOf: [{ type: string }, { type: "null" }]
        outcome:
          oneOf:
            - $ref: "#/components/schemas/SimulationOutcome"
            - type: "null"
        created_at: { type: string, format: date-time }
        parent_simulation_id:
          oneOf: [{ type: string }, { type: "null" }]
        share_card_url: { type: string }
        share_landing_url: { type: string }

    SimulationTranscript:
      type: object
      description: |
        Citable per-round agent transcript. Same payload backs both the
        Markdown (`transcript.md`) and JSON (`transcript.json`) export
        endpoints — assembled from `trajectory.json`, `quality.json`,
        `resolution.json`, `outcome.json`, and the simulation profiles
        with the same ±0.2 stance threshold the gallery and webhook use,
        so a "bullish" agent here matches the same agent's tag on every
        other surface.
      properties:
        sim_id: { type: string }
        scenario: { type: string }
        created_date:
          type: string
          description: Run creation date (YYYY-MM-DD), per the simulation state.
        agent_count: { type: integer }
        total_rounds:
          type: integer
          description: Planned round count (from `time_config`).
        rounds_recorded:
          type: integer
          description: Actual snapshots committed to disk so far.
        consensus:
          type: object
          description: Final-round belief split + threshold-cross round.
          properties:
            bullish: { type: number }
            neutral: { type: number }
            bearish: { type: number }
            label:
              type: string
              enum: [bullish, neutral, bearish]
            round:
              type: integer
              nullable: true
        quality:
          type: object
          properties:
            health: { type: string, nullable: true }
            participation_rate: { type: number, nullable: true }
        resolution:
          type: object
          nullable: true
          description: Polymarket resolution snapshot when present.
          properties:
            actual_outcome: { type: string }
            predicted_consensus: { type: string }
            accuracy_score: { type: number }
        outcome:
          $ref: "#/components/schemas/SimulationOutcome"
          nullable: true
        rounds:
          type: array
          description: One entry per recorded round, in chronological order.
          items:
            type: object
            properties:
              round: { type: integer }
              timestamp: { type: string }
              total_posts: { type: integer }
              total_engagements: { type: integer }
              active_agent_count: { type: integer }
              stance_split:
                type: object
                properties:
                  bullish: { type: number }
                  neutral: { type: number }
                  bearish: { type: number }
              posts:
                type: array
                items:
                  type: object
                  properties:
                    post_id: { type: integer, nullable: true }
                    agent_id: { type: integer }
                    agent_name: { type: string }
                    stance:
                      type: string
                      enum: [bullish, neutral, bearish]
                    stance_value:
                      type: number
                      description: Agent's mean per-topic position for this round (-1..+1).
                    content:
                      type: string
                      description: Post body, excerpted to ~400 chars with an ellipsis.
                    likes: { type: integer }
                    dislikes: { type: integer }

    SimulationOutcome:
      type: object
      description: |
        Verified-prediction annotation written by the operator after a
        public simulation's real-world counterpart resolved. Drives the
        ◎ Verified badge on the gallery and the `/verified` filter view.
      properties:
        label:
          type: string
          enum: [correct, incorrect, partial]
        outcome_url:
          type: string
          format: uri
          description: External link confirming the outcome (may be empty).
        outcome_summary:
          type: string
          description: Tweet-sized human description (≤280 chars).
        submitted_at:
          type: string
          format: date-time

    WebhookDeliveryEntry:
      type: object
      description: |
        One row of the per-simulation webhook delivery log. Written by
        the dispatcher after each POST attempt completes — successful
        or otherwise. Failure rows carry the upstream message in
        `error`; success rows have `error: null`.

        Note on HMAC signing: when `WEBHOOK_SECRET` is configured, the
        dispatcher attaches an `X-MiroShark-Signature: sha256=<hex>`
        header computed from the raw request body. The signature is
        **transport-only** — only `url_masked` is stored here; neither
        the secret nor the signature value is persisted to disk. See
        `docs/WEBHOOKS.md` → "Verifying webhook signatures" for the
        recipient-side verification pattern.
      required: [attempt, timestamp, ok, url_masked, trigger]
      properties:
        attempt:
          type: integer
          description: Monotonically increasing 1-based counter; survives log truncation.
        timestamp:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp of when the dispatch completed.
        url_masked:
          type: string
          description: |
            `scheme://host/***` mask of the configured webhook URL —
            the path of a Slack / Discord webhook URL is the secret
            and is never echoed to disk or to the API consumer.
        event:
          type: string
          description: The `event` field from the dispatched payload (e.g. `simulation.completed`).
        status:
          type: string
          enum: [completed, failed]
          description: Terminal status the simulation reached when this delivery fired.
        status_code:
          oneOf:
            - { type: integer }
            - { type: "null" }
          description: HTTP status returned by the downstream endpoint, or `null` for network errors / timeouts.
        ok:
          type: boolean
          description: True for a 2xx response; false for any other outcome.
        latency_ms:
          type: integer
          description: Wall-clock time of the HTTP call, in milliseconds.
        error:
          oneOf:
            - { type: string }
            - { type: "null" }
          description: Human-readable upstream error string on failure; `null` on success.
        trigger:
          type: string
          enum: [auto, retry]
          description: |
            `auto` for the runner-fired path (simulation completion),
            `retry` for an operator-driven replay via `/webhook-retry`.

    WebhookDeliveryLog:
      type: object
      description: |
        Recent webhook delivery attempts for one simulation. Returned
        from `GET /webhook-log` — newest-first slice plus the all-time
        attempt counter and the on-disk retention bound.
      required: [entries, total_attempts, max_retained]
      properties:
        entries:
          type: array
          description: Last `WEBHOOK_LOG_RETURN_LIMIT` entries, newest first.
          items:
            $ref: "#/components/schemas/WebhookDeliveryEntry"
        total_attempts:
          type: integer
          description: All-time attempt counter — keeps climbing past the on-disk truncation bound.
        max_retained:
          type: integer
          description: Maximum number of entries the dispatcher persists on disk before rolling oldest off.

    SimulationTrajectoryRow:
      type: object
      description: |
        One row of the per-round belief trajectory export. The CSV
        endpoint emits a fixed column order; the JSONL endpoint emits
        the same fields per object, one object per line. The bullish /
        neutral / bearish percentages use the same ±0.2 stance
        threshold as every other surface so the numbers in this row
        match what the gallery + share card report for the same round.
      properties:
        round:
          type: integer
          description: Zero- or one-indexed round number, per the runner.
        round_timestamp:
          type: string
          description: ISO-8601 timestamp the snapshot was committed (may be empty for older runs).
        bullish_pct:
          type: number
          description: Percentage of agents whose mean position > +0.2 this round.
        neutral_pct:
          type: number
          description: Percentage of agents whose mean position is in [-0.2, +0.2].
        bearish_pct:
          type: number
          description: Percentage of agents whose mean position < -0.2 this round.
        participating_agents:
          type: integer
          description: Distinct agents that posted in this round (falls back to active_agent_count on rounds with no viral_posts).
        total_posts:
          type: integer
          description: Posts created during the round.
        total_engagements:
          type: integer
          description: Likes + dislikes + replies recorded during the round.
        quality_health:
          type: string
          description: Overall run health (`excellent` / `good` / `degraded` / `poor`); repeated on every row.
        participation_rate:
          oneOf:
            - { type: number }
            - { type: string }
          description: Overall participation rate ∈ [0,1] from quality.json; empty string when the run has not produced quality.json yet.

    SimulationThread:
      type: object
      description: |
        Structured tweet-thread payload returned by `thread.json`. The
        plain-text form (`thread.txt`) is the same `tweets` array joined
        with `---` separators — consumers that need per-tweet metadata
        (truncation flag, total inflections in the underlying run)
        should consume the JSON form.
      required: [tweets, total, inflections_recorded, truncated]
      properties:
        tweets:
          type: array
          description: |
            Ordered list of tweets, each ≤280 characters. The first
            tweet is the intro (scenario + scale + consensus label),
            the last tweet is the close (final verdict + watch URL +
            share URL); the body in between is one tweet per belief
            inflection point (or, when truncated, the first 3 + a
            single bridge tweet + the last 3).
          items:
            type: string
            maxLength: 280
        total:
          type: integer
          description: Total number of tweets in the thread (intro + body + close).
        inflections_recorded:
          type: integer
          description: |
            Total number of belief inflections detected in the
            underlying run. May exceed the body-tweet count when the
            thread was truncated.
        truncated:
          type: boolean
          description: |
            True when `inflections_recorded` exceeded the per-thread
            body budget and a bridge tweet was inserted between the
            head and tail inflections.

    SimulationSurfaceStats:
      type: object
      description: |
        Envelope returned by `/api/simulation/{id}/surface-stats`. Each
        named counter is the cumulative number of times that share
        surface has served a successful response for the simulation.
        Every key is always present (zero-defaulted), so a frontend
        renders the table without special-casing missing fields.
      required: [success, simulation_id, stats]
      properties:
        success:
          type: boolean
        simulation_id:
          type: string
          description: Echoed simulation id.
        stats:
          type: object
          required:
            - share_card
            - replay_gif
            - transcript_md
            - transcript_json
            - trajectory_csv
            - trajectory_jsonl
            - thread_txt
            - thread_json
            - watch_page
            - feed_atom
            - feed_rss
            - reproduce_json
            - lineage
            - signal_json
            - archive_zip
            - badge_svg
            - cite_bib
            - total
          properties:
            share_card:
              type: integer
              minimum: 0
              description: Successful `share-card.png` serves.
            replay_gif:
              type: integer
              minimum: 0
              description: Successful `replay.gif` serves.
            transcript_md:
              type: integer
              minimum: 0
              description: Successful `transcript.md` serves.
            transcript_json:
              type: integer
              minimum: 0
              description: Successful `transcript.json` serves.
            trajectory_csv:
              type: integer
              minimum: 0
              description: Successful `trajectory.csv` serves.
            trajectory_jsonl:
              type: integer
              minimum: 0
              description: Successful `trajectory.jsonl` serves.
            thread_txt:
              type: integer
              minimum: 0
              description: Successful `thread.txt` serves.
            thread_json:
              type: integer
              minimum: 0
              description: Successful `thread.json` serves.
            watch_page:
              type: integer
              minimum: 0
              description: Successful `/watch/{id}` serves (public sims only).
            feed_atom:
              type: integer
              minimum: 0
              description: |
                Number of times this simulation appeared in a served
                Atom feed render (`/api/feed.atom`). Each feed render
                increments every sim that landed in the rendered card
                set, so this counter is best read as "syndicated to
                Atom subscribers N times".
            feed_rss:
              type: integer
              minimum: 0
              description: |
                Same semantics as `feed_atom` for the RSS 2.0 form.
            reproduce_json:
              type: integer
              minimum: 0
              description: Successful `reproduce.json` serves.
            lineage:
              type: integer
              minimum: 0
              description: Successful `/lineage` serves.
            notebook_ipynb:
              type: integer
              minimum: 0
              description: Successful `notebook.ipynb` serves.
            chart_svg:
              type: integer
              minimum: 0
              description: |
                Successful `chart.svg` serves — the per-round belief
                trajectory rendered as a scalable vector image
                embeddable as an `<img>` tag in Notion / Substack /
                Ghost / GitHub READMEs / LaTeX.
            signal_json:
              type: integer
              minimum: 0
              description: |
                Successful `signal.json` serves — the machine-readable
                trading signal derived from the final belief split +
                quality health (`direction`, `confidence_pct`,
                `risk_tier`). Tracks pickup by quant tools, Zapier /
                Make / n8n automations, and alert pipelines that
                consume the JSON directly.
            archive_zip:
              type: integer
              minimum: 0
              description: |
                Successful `archive.zip` serves — the take-offline
                composite ZIP bundling every published share surface
                (share-card, chart SVG, trajectory CSV / JSONL,
                transcript, thread, reproduce.json, notebook, signal.json)
                plus a `manifest.json` with per-file SHA-256s. Tracks
                pickup by researchers building citation chains or
                running comparison studies across multiple sims.
            badge_svg:
              type: integer
              minimum: 0
              description: |
                Successful `badge.svg` serves — the flat
                Shields.io-compatible 20-pixel status badge embeddable
                in any GitHub README, Notion page, Substack post, or
                personal site as a one-line Markdown image. Tracks
                the passive-distribution surface — every page view of
                an embedding README increments this counter, so a
                popular README produces visibly more serves than the
                interactive surfaces.
            cite_bib:
              type: integer
              minimum: 0
              description: |
                Successful `cite.bib` serves — the BibTeX academic
                citation entry. Tracks pickup by LaTeX paper authors
                pulling the entry into a `\bibliography{}` block and
                by Zotero / Mendeley users importing via "Import from
                URL". A spike here indicates academic adoption — a
                sim being cited in a paper draft typically produces
                a small number of fetches per author (one per import
                + occasional re-fetches when the SHA-256 needs
                re-verification).
            total:
              type: integer
              minimum: 0
              description: Sum of every per-surface counter above.

    TradingSignal:
      type: object
      description: |
        Machine-readable trading-signal payload returned by
        `/api/simulation/{id}/signal.json`. Derives the action primitive
        a quant tool, Zapier workflow, or alert pipeline can consume
        directly from the same final-state belief percentages every
        other surface displays.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - direction
        - confidence_pct
        - risk_tier
        - bullish_pct
        - neutral_pct
        - bearish_pct
        - quality_health
        - signal_generated_at
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        direction:
          type: string
          enum: [Bullish, Neutral, Bearish]
          description: |
            Plurality stance from the final-round belief distribution.
            Tie-break order is documented and stable:
            `bullish > bearish > neutral`.
        confidence_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            How far the leading stance is from a pure three-way split.
            `0` ⇒ split at the noise floor (33.3% each);
            `100` ⇒ unanimous leading stance. Formula:
            `(leading_pct - 33.333) / 66.667 * 100` clamped to
            `[0, 100]` and rounded to one decimal place.
        risk_tier:
          type: string
          enum: [low-risk, medium-risk, high-risk]
          description: |
            Maps the simulation's quality health to a three-tier risk
            label downstream trading systems expect:
            `excellent` → `low-risk`,
            `good` → `medium-risk`,
            everything else (`fair`, `poor`, missing, `"N/A"`) →
            `high-risk`. The default-to-high posture is deliberate —
            an unknown-quality signal is treated cautiously.
        bullish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Final-round bullish share — same ±0.2 stance threshold as
            every other surface. Rounded to one decimal place.
        neutral_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round neutral share. Rounded to one decimal place.
        bearish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bearish share. Rounded to one decimal place.
        quality_health:
          type: string
          description: |
            Simulation quality health string echoed from `quality.json`
            (typically `excellent` / `good` / `fair` / `poor`). Falls
            back to `"N/A"` when the underlying field is missing or
            empty.
        signal_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the signal was computed (ISO-8601 with
            trailing `Z`). Tracks the *signal computation time*, not
            the underlying simulation completion time — bytewise
            determinism is not a property of this surface (unlike
            reproduce.json / notebook.ipynb whose bytes need to be
            citation-hashable).

    StancePeak:
      type: object
      description: |
        The round at which one stance (bullish / neutral / bearish)
        reached its maximum share, and that maximum percentage. Ties
        resolve to the earliest round.
      required:
        - round
        - pct
      properties:
        round:
          type: integer
          description: Round number at which this stance peaked.
        pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Peak share for this stance, rounded to two decimal places.

    PeakRoundResponse:
      type: object
      description: |
        Machine-readable peak-round analytics returned by
        `/api/simulation/{id}/peak-round`. A single O(n) summary of the
        belief trajectory's inflection points, derived from the same
        per-round stance split (`±0.2` threshold) `trajectory.csv` uses.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - bullish
        - neutral
        - bearish
        - most_volatile_round
        - max_swing_pct
        - total_rounds
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        bullish:
          $ref: "#/components/schemas/StancePeak"
        neutral:
          $ref: "#/components/schemas/StancePeak"
        bearish:
          $ref: "#/components/schemas/StancePeak"
        most_volatile_round:
          type: integer
          description: |
            The round carrying the largest summed absolute
            round-over-round belief swing
            (`|Δbullish| + |Δneutral| + |Δbearish|`). The first round
            has no predecessor so its swing is zero; ties resolve to
            the earliest round.
        max_swing_pct:
          type: number
          format: float
          minimum: 0
          description: |
            The swing value at `most_volatile_round`, rounded to two
            decimal places. `0.0` for a single-round or fully flat
            trajectory.
        total_rounds:
          type: integer
          minimum: 1
          description: Number of usable rounds in the trajectory.

    VolatilityResponse:
      type: object
      description: |
        Machine-readable belief-volatility analytics returned by
        `/api/simulation/{id}/volatility`. Describes the distribution
        of round-over-round belief swings — the turbulence
        counterpart to `peak-round`'s single-max view. Derived from
        the same `|Δbullish| + |Δneutral| + |Δbearish|` swing
        definition `peak-round` uses, so `max_delta_round` here
        equals `most_volatile_round` there on identical input.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - mean_delta_pct
        - std_dev_delta_pct
        - max_delta_pct
        - max_delta_round
        - volatility_index
        - trend
        - total_rounds
        - delta_count
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        mean_delta_pct:
          type: number
          format: float
          minimum: 0
          description: |
            Mean of the round-over-round summed-absolute belief
            swings, rounded to two decimal places. Expressed in
            percentage points.
        std_dev_delta_pct:
          type: number
          format: float
          minimum: 0
          description: |
            Population standard deviation of the round-over-round
            swings, rounded to two decimal places. Drives the
            `volatility_index` and the `trend` classifier.
        max_delta_pct:
          type: number
          format: float
          minimum: 0
          description: |
            The largest single round-over-round swing in the
            trajectory, rounded to two decimal places. Equals
            `max_swing_pct` from `peak-round` on the same input.
        max_delta_round:
          type: integer
          description: |
            The round carrying `max_delta_pct`. Equals
            `most_volatile_round` from `peak-round` on the same
            input by construction; ties resolve to the earliest
            round.
        volatility_index:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Normalized turbulence score on `[0, 100]`. Computed as
            `min(std_dev_delta_pct * 5, 100)` — a std dev of 20 pp
            maps to 100. `0.0` for a fully flat trajectory.
        trend:
          type: string
          enum: [stable, converging, contested]
          description: |
            Bucketed trajectory shape. `stable` when
            `std_dev_delta_pct < 3`; `converging` when the
            second-half delta std dev is strictly lower than the
            first-half std dev (≥4 deltas required); `contested`
            otherwise.
        total_rounds:
          type: integer
          minimum: 2
          description: |
            Number of usable rounds in the trajectory. The endpoint
            returns 404 when fewer than 2 rounds exist.
        delta_count:
          type: integer
          minimum: 1
          description: |
            Number of round-over-round deltas — always
            `total_rounds - 1`.

    ClonePayloadBody:
      type: object
      description: |
        Wire-compatible body for `POST /api/simulation/create`. Same
        field set and same defaults the create handler accepts. A
        caller can re-run the sim by POSTing this dict verbatim.
      required:
        - project_id
        - graph_id
        - enable_twitter
        - enable_reddit
        - enable_polymarket
        - polymarket_market_count
        - country
        - demographic_filters
      properties:
        project_id:
          type: string
          description: |
            The project this sim was created under. Required by
            `/api/simulation/create`.
        graph_id:
          type: string
          description: |
            The knowledge graph the sim drew its agents from. Required
            by `/api/simulation/create` when the project hasn't
            recorded a default graph yet.
        enable_twitter:
          type: boolean
          description: Whether the sim ran the Twitter platform leg.
        enable_reddit:
          type: boolean
          description: Whether the sim ran the Reddit platform leg.
        enable_polymarket:
          type: boolean
          description: Whether the sim ran the Polymarket platform leg.
        polymarket_market_count:
          type: integer
          minimum: 1
          maximum: 5
          description: |
            Number of Polymarket markets generated when
            `enable_polymarket=true`. Clamped to `[1, 5]` by the
            create handler.
        country:
          type: string
          nullable: true
          description: |
            Demographic country code (e.g. `"sg"`, `"us"`) when the
            persona generator anchored agents in a Nemotron row.
            `null` when no demographic anchoring was used.
        demographic_filters:
          type: object
          nullable: true
          description: |
            Optional sampler filters (`geography_values`, `min_age`,
            `max_age`, `occupations`, ...). `null` when the full
            sample was used. Pass-through to the create handler — the
            sampler silently ignores unknown keys.

    CloneResponse:
      type: object
      description: |
        Clone-payload envelope returned by
        `/api/simulation/{id}/clone.json`. The first surface that
        returns *inputs* rather than outputs.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - project_id
        - graph_id
        - simulation_requirement
        - scenario_preview
        - clone_payload
        - example_curl
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        project_id:
          type: string
          description: |
            Echoed at the envelope level (duplicates the
            `clone_payload.project_id` value) so a caller can route on
            project id without unpacking the body.
        graph_id:
          type: string
          description: |
            Echoed at the envelope level (duplicates the
            `clone_payload.graph_id` value) for the same routing
            reason as `project_id`.
        simulation_requirement:
          type: string
          description: |
            The scenario text — what the agents debate. Lives at the
            project level (not on the create body) so it is echoed
            separately. A fork that needs a different scenario
            updates the project before POSTing the `clone_payload`.
        scenario_preview:
          type: string
          maxLength: 200
          description: |
            `simulation_requirement` truncated to 200 chars with a
            trailing ellipsis. Suitable for log lines and one-line
            status dashboards.
        clone_payload:
          $ref: "#/components/schemas/ClonePayloadBody"
        example_curl:
          type: string
          description: |
            One-line `curl` invocation re-creating the sim. Uses the
            literal placeholder `https://your-host` so a copy-paste
            never accidentally hits an internal URL.

    SparklinePoint:
      type: object
      description: One point on an agent's belief sparkline.
      required:
        - round
        - position
      properties:
        round:
          type: integer
          description: Round number this position was recorded in.
        position:
          type: number
          format: float
          minimum: -1
          maximum: 1
          description: |
            The agent's scalar belief position for the round — the mean
            of its per-topic `belief_positions`, in roughly `[-1, 1]`,
            rounded to three decimal places. `> +0.2` is bullish,
            `< -0.2` is bearish, between is neutral.

    AgentSparkline:
      type: object
      description: One agent's belief trajectory + final-stance metadata.
      required:
        - agent_id
        - name
        - final_stance
        - final_position
        - color
        - trajectory
      properties:
        agent_id:
          type: integer
          description: The agent's integer user id.
        name:
          type: string
          description: |
            Display name from `reddit_profiles.json`
            (then `polymarket_profiles.json`); `"Agent <id>"` when no
            profile row exists.
        final_stance:
          type: string
          enum: [bullish, neutral, bearish]
          description: Stance bucket of the agent's last-round position (±0.2).
        final_position:
          type: number
          format: float
          minimum: -1
          maximum: 1
          description: The agent's position in the final round, rounded to 3 dp.
        color:
          type: string
          description: |
            Hex stance color matching every other surface — `#22c55e`
            (bullish), `#6b7280` (neutral), `#ef4444` (bearish).
        trajectory:
          type: array
          description: Per-round belief positions, sorted ascending by round.
          items:
            $ref: "#/components/schemas/SparklinePoint"

    AgentExportEntry:
      type: object
      description: |
        One agent's roster entry — identity (name, username, bio,
        persona preview), demographics (age / gender / mbti / country /
        profession / interested_topics), karma, plus the belief layer
        derived from `trajectory.json` (final_stance / final_position /
        rounds_participated). Profile-only agents (no entry in any
        snapshot's `belief_positions`) appear with `final_stance="neutral"`,
        `final_position=null`, `rounds_participated=0`.
      required:
        - agent_id
        - username
        - name
        - bio
        - persona_preview
        - age
        - gender
        - mbti
        - country
        - profession
        - interested_topics
        - karma
        - created_at
        - final_stance
        - final_position
        - rounds_participated
      properties:
        agent_id:
          type: integer
          description: The agent's integer user id (matches the sparklines surface).
        username:
          type: string
          description: |
            Reddit-style handle from `reddit_profiles.json` (then
            `polymarket_profiles.json`); empty string when no profile
            row carries one.
        name:
          type: string
          description: |
            Display name from the same profile lookup; falls back to
            `"Agent <id>"` when neither name nor username is set so a
            roster row is never anonymous.
        bio:
          type: string
          maxLength: 280
          description: Profile bio, truncated to 280 chars with a trailing ellipsis.
        persona_preview:
          type: string
          maxLength: 280
          description: |
            Persona prose truncated to 280 chars with a trailing
            ellipsis. The full text remains in `transcript.md` for
            callers who need it.
        age:
          type: integer
          nullable: true
          description: Optional numeric age; `null` when the profile generator did not populate it.
        gender:
          type: string
          nullable: true
          description: Optional gender label; `null` when blank.
        mbti:
          type: string
          nullable: true
          description: Optional MBTI archetype; `null` when blank.
        country:
          type: string
          nullable: true
          description: Optional country label; `null` when blank.
        profession:
          type: string
          nullable: true
          description: Optional profession label; `null` when blank.
        interested_topics:
          type: array
          items:
            type: string
          description: |
            Deduplicated, order-preserving list of interest tags from
            the profile. Empty list when the profile has none or the
            field was a non-list value.
        karma:
          type: integer
          description: Reddit-style karma counter; defaults to `0` when absent from the profile.
        created_at:
          type: string
          description: ISO-style date the profile was generated; empty string when absent.
        final_stance:
          type: string
          enum: [bullish, neutral, bearish]
          description: |
            Stance bucket of the agent's last-round position under the
            ±0.2 threshold every other surface uses. `"neutral"` for
            profile-only agents.
        final_position:
          type: number
          format: float
          nullable: true
          minimum: -1
          maximum: 1
          description: |
            The agent's scalar belief position in the final round,
            rounded to three decimals. `null` for profile-only agents.
        rounds_participated:
          type: integer
          minimum: 0
          description: |
            Number of distinct rounds where this agent held a usable
            belief position. `0` for profile-only agents.

    AgentsExportResponse:
      type: object
      description: |
        Agent roster envelope returned by
        `/api/simulation/{id}/agents.json`. The participants surface —
        per-agent identity + demographics + final stance, sibling of
        `/agents/sparklines` (which exposes per-round trajectories).

        Agents are ordered most-bullish-first by `final_position`
        (ties broken by `agent_id` ascending); profile-only agents
        (no belief data) sort to the bottom. Schema is versioned via
        `schema_version`; v1 is the only published version.
      required:
        - schema_version
        - simulation_id
        - scenario_preview
        - agent_count
        - has_trajectory_data
        - agents
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        scenario_preview:
          type: string
          maxLength: 200
          description: |
            `simulation_requirement` truncated to 200 chars with a
            trailing ellipsis. Empty string when the config is missing.
        agent_count:
          type: integer
          minimum: 1
          description: Number of agents the roster lists.
        has_trajectory_data:
          type: boolean
          description: |
            `true` when any agent has a non-null `final_position`;
            `false` when every agent is profile-only (mid-prepare sim
            with profiles but no rounds yet).
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentExportEntry"

    AgentSparklinesResponse:
      type: object
      description: |
        Per-agent belief sparklines returned by
        `/api/simulation/{id}/agents/sparklines`. The agent-level layer
        under the aggregate `chart.svg` curve — one belief trajectory per
        agent, derived from the same per-topic `belief_positions` and the
        same `±0.2` stance threshold every other surface uses.

        Agents are ordered most-bullish-first by `final_position` (ties
        broken by `agent_id`). Schema is versioned via `schema_version`;
        v1 is the only published version.
      required:
        - schema_version
        - simulation_id
        - agent_count
        - round_count
        - has_per_agent_data
        - agents
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        agent_count:
          type: integer
          minimum: 1
          description: Number of agents with at least one usable belief position.
        round_count:
          type: integer
          minimum: 1
          description: Number of distinct rounds carrying per-agent data.
        has_per_agent_data:
          type: boolean
          description: |
            `true` only when at least one agent has a 2-point trajectory
            (enough to draw a line). A single-round simulation returns
            the agents as single dots with this flag `false`.
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentSparkline"

    PolymarketPrediction:
      type: object
      description: |
        Polymarket-shaped binary-market prediction returned by
        `/api/simulation/{id}/polymarket.json`. Re-envelope of the
        `signal.json` action primitive into the YES / NO probability
        shape a Polymarket trading bot expects between *"simulation
        result"* and *"actionable market signal"*.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - direction
        - yes_probability
        - no_probability
        - confidence_pct
        - confidence_tier
        - risk_tier
        - bullish_pct
        - neutral_pct
        - bearish_pct
        - quality_health
        - suggested_market_title
        - source_sim_id
        - polymarket_generated_at
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id (canonical key across every share surface).
        direction:
          type: string
          enum: [Bullish, Neutral, Bearish]
          description: |
            Plurality stance from the final-round belief distribution.
            Inherited from `signal.json` — same tie-break order
            (`bullish > bearish > neutral`).
        yes_probability:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Direction-aware YES probability. Bullish → `bullish_pct / 100`
            (high YES); Bearish → `1 - bearish_pct / 100` (low YES —
            the residual probability the proposition is true); Neutral
            → `0.5` exactly (coin-flip prior). Rounded to four decimal
            places, matching Polymarket's display rail precision.
        no_probability:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Always `1 - yes_probability`. The pair sums to `1.0` within
            float tolerance, the invariant a Polymarket order-book
            consumer expects.
        confidence_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Continuous confidence value inherited verbatim from
            `signal.json` — `(leading_pct - 33.333) / 66.667 * 100`
            clamped to `[0, 100]` and rounded to one decimal place.
            Exposed alongside `confidence_tier` for callers that
            want the raw value.
        confidence_tier:
          type: string
          enum: [speculative, moderate, confident, high-conviction]
          description: |
            Four-bucket discrete scale on top of `confidence_pct`:
            `<25 → speculative`, `25-50 → moderate`,
            `50-75 → confident`, `≥75 → high-conviction`. Upper
            bounds are exclusive (`25.0` is `moderate`, not
            `speculative`). Bots typically gate position size on this
            tier — different sizing for "speculative" vs.
            "high-conviction" — rather than the raw continuous value.
        risk_tier:
          type: string
          enum: [low-risk, medium-risk, high-risk]
          description: |
            Quality-health risk tier inherited from `signal.json`:
            `excellent` → `low-risk`, `good` → `medium-risk`,
            everything else (`fair`, `poor`, missing, `"N/A"`) →
            `high-risk`. Default-to-high posture — an unknown-quality
            signal is treated cautiously.
        bullish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bullish share. Rounded to one decimal place.
        neutral_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round neutral share. Rounded to one decimal place.
        bearish_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Final-round bearish share. Rounded to one decimal place.
        quality_health:
          type: string
          description: |
            Simulation quality health string echoed from
            `quality.json` (typically `excellent` / `good` / `fair` /
            `poor`). Falls back to `"N/A"` when the underlying field
            is missing or empty.
        suggested_market_title:
          type: string
          description: |
            Polymarket-shaped market title synthesised from the
            simulation scenario — starts with `"Will "`, ends with a
            single `"?"`. A scenario that already starts with
            `"Will "` is not double-prefixed; trailing punctuation is
            stripped before truncation at 120 characters (with
            `"…?"` when truncated). Missing / empty scenarios fall
            back to `"Will resolve YES?"`. A *suggested* title — the
            bot author is expected to massage the string.
        source_sim_id:
          type: string
          description: |
            Same value as `simulation_id`, exposed under the field
            name a Polymarket bot expects when writing back to its
            own audit log.
        polymarket_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the prediction was computed (ISO-8601
            with trailing `Z`). Re-derived on every request — tracks
            *computation time*, not the underlying simulation
            completion time. Same posture as `signal.json` (bytewise
            determinism is not a property of this surface).

    PlatformStats:
      type: object
      description: |
        Platform-level aggregate envelope returned by `/api/stats`.
        Collapses every simulation under
        `WONDERWALL_SIMULATION_DATA_DIR` that satisfies
        `is_public == true` AND `status == "completed"` into a single
        snapshot. Same scan feeds the `/api/stats/badge.svg` count.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal
        and the badge / dashboard consumers gate on the value.
      required:
        - schema_version
        - total_sims
        - consensus_distribution
        - avg_confidence_pct
        - total_surface_views
        - unique_projects
        - newest_sim_id
        - newest_sim_created_at
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        total_sims:
          type: integer
          minimum: 0
          description: |
            Count of simulations satisfying `is_public == true` AND
            `status == "completed"`. The same count the
            `/api/stats/badge.svg` pill renders.
        consensus_distribution:
          type: object
          description: |
            Per-stance counts + percentages across every counted
            simulation. The same plurality + tie-break rules
            (`bullish > bearish > neutral`) the per-sim `signal.json`
            uses produce these buckets — a sim labelled Bullish on
            its signal.json lands in the `bullish` count here.
          required:
            - bullish
            - neutral
            - bearish
            - bullish_pct
            - neutral_pct
            - bearish_pct
          properties:
            bullish:
              type: integer
              minimum: 0
              description: Number of sims whose plurality stance is Bullish.
            neutral:
              type: integer
              minimum: 0
              description: Number of sims whose plurality stance is Neutral.
            bearish:
              type: integer
              minimum: 0
              description: Number of sims whose plurality stance is Bearish.
            bullish_pct:
              type: number
              format: float
              minimum: 0
              maximum: 100
              description: |
                `bullish / total_sims * 100` rounded to one decimal.
                `0.0` when `total_sims == 0`.
            neutral_pct:
              type: number
              format: float
              minimum: 0
              maximum: 100
              description: |
                `neutral / total_sims * 100` rounded to one decimal.
            bearish_pct:
              type: number
              format: float
              minimum: 0
              maximum: 100
              description: |
                `bearish / total_sims * 100` rounded to one decimal.
        avg_confidence_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: |
            Mean of every contributing sim's per-sim `confidence_pct`
            (same continuous value the per-sim `signal.json`
            surfaces), rounded to one decimal. `0.0` when no sim
            contributes a derivable signal (empty deployment or every
            sim missing its trajectory).
        total_surface_views:
          type: integer
          minimum: 0
          description: |
            Sum of every recognised counter across every contributing
            sim's `surface-stats.json`. Unknown keys are ignored
            (the same `SURFACE_KEYS` whitelist the per-sim surface-
            stats reader uses). A coarse but live indicator of
            platform-wide audience activity.
        unique_projects:
          type: integer
          minimum: 0
          description: |
            Distinct non-empty `project_id` values across every
            contributing sim. A proxy for the operator count —
            `SimulationState` carries no operator field, so
            `project_id` is the closest stable identifier. A future
            model migration can add a dedicated `operator` field and
            a sibling `unique_operators` aggregate without breaking
            this surface.
        newest_sim_id:
          type: [string, "null"]
          description: |
            Identifier of the simulation with the lexicographically
            largest `created_at` ISO timestamp among contributing
            sims, or `null` on an empty deployment.
        newest_sim_created_at:
          type: [string, "null"]
          format: date-time
          description: |
            The `created_at` timestamp paired with `newest_sim_id`,
            or `null` on an empty deployment. ISO-8601 — emitted
            verbatim from the underlying sim's `state.json`.

    SurfaceCatalogEntry:
      type: object
      description: |
        Single entry in the surface catalog returned by
        `GET /api/surfaces.json`. Describes one share or platform
        surface this deployment exposes — endpoint path, HTTP method,
        category, and a copy-pasteable `curl` example.

        A consumer iterating the catalog can build a typed client by
        following the `endpoint` + `method` pair, can scope its work
        to a category by filtering on `type`, and can probe a single
        surface in one shell-line via `example_curl`.
      required:
        - key
        - endpoint
        - method
        - type
        - description
        - added_in_pr
        - example_curl
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9_]+$"
          description: |
            Stable snake_case identifier for the surface. For
            publish-gated per-simulation surfaces this matches the
            corresponding `surface_stats.SURFACE_KEYS` member, so a
            consumer correlating catalog entries with the
            per-sim `/surface-stats` counters can join on this field.
            Platform-level entries (`platform_stats`,
            `platform_stats_badge`, `surfaces_catalog`) have keys with
            no `SURFACE_KEYS` counterpart — those surfaces don't
            increment per-sim counters.
        endpoint:
          type: string
          description: |
            HTTP path. Per-simulation surfaces carry the literal
            `<simulation_id>` placeholder so a consumer can substitute
            an id without parsing a regex. Always starts with `/`.
        method:
          type: string
          enum: [GET, POST]
          description: HTTP method the surface responds to.
        type:
          type: string
          enum: [analytics, visualization, export, embed, integration, platform, discovery]
          description: |
            Category bucket the surface falls into.
            `analytics` — derived numeric / structured payload
            (`signal.json`, `peak-round`, `volatility`,
            `agents/sparklines`, `lineage`).
            `visualization` — pre-rendered image / vector chart
            (`share-card.png`, `replay.gif`, `chart.svg`, `badge.svg`).
            `export` — full-fidelity download intended for offline
            analysis (`transcript.*`, `trajectory.*`, `archive.zip`,
            `notebook.ipynb`, `reproduce.json`, `cite.bib`, `thread.*`).
            `embed` — surfaces designed to be rendered in another
            page (`/watch/<id>`, `/oembed`).
            `integration` — outputs shaped for a specific external
            consumer (`polymarket.json`).
            `platform` — describes the deployment itself, not one
            simulation (`/api/stats`, `/api/stats/badge.svg`,
            `/api/surfaces.json`).
            `discovery` — syndication / index surfaces auto-consumed
            by aggregators (`/api/feed.atom`, `/api/feed.rss`).
        description:
          type: string
          maxLength: 120
          description: One-line summary (≤120 chars) of what the surface returns.
        added_in_pr:
          type: [integer, "null"]
          minimum: 1
          description: |
            PR number on `aaronjmars/MiroShark` that introduced the
            surface, or `null` for surfaces that predate per-PR
            instrumentation. Nullable so a consumer can sort or filter
            by "shipped after PR N" without special-casing absence.
        example_curl:
          type: string
          description: |
            Single-line `curl` invocation. Uses `https://your-host` as
            the deployment placeholder and `<simulation_id>` as the
            sim id placeholder — never contains a real host or admin
            token. References the entry's `endpoint` verbatim (drift-
            guarded by the unit test suite).

    SurfaceCatalog:
      type: object
      description: |
        Envelope returned by `GET /api/surfaces.json`. Wraps the full
        catalog of share + platform surfaces with a schema version and
        a count so a consumer can probe the catalog size before
        iterating.
      required:
        - schema_version
        - count
        - surfaces
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        count:
          type: integer
          minimum: 0
          description: |
            Number of surfaces the catalog currently carries. Equals
            `len(surfaces)`.
        surfaces:
          type: array
          description: |
            Roughly chronological list of every share / platform
            surface this deployment exposes. Order is part of the
            published contract — appending is a non-breaking change;
            reordering existing entries is breaking.
          items:
            $ref: "#/components/schemas/SurfaceCatalogEntry"

    ArchiveManifestEntry:
      type: object
      description: |
        Single-file entry inside the `manifest.json` document at the
        root of an `archive.zip` bundle. Each entry pairs a contained
        file with its SHA-256 fingerprint, byte size, MIME type, and
        the canonical standalone-surface URL the file mirrors. A
        consumer can verify integrity (`sha256` over the file bytes
        inside the ZIP), refresh a single surface (`source_url`), or
        route by content type (`mime_type`) without re-parsing the
        ZIP.
      required:
        - filename
        - sha256
        - size_bytes
        - source_url
        - mime_type
      properties:
        filename:
          type: string
          description: |
            Filename inside the ZIP (no leading path component) —
            e.g. `share-card.png`, `chart.svg`, `trajectory.csv`,
            `reproduce.json`, `notebook.ipynb`, `signal.json`,
            `transcript.md`, `thread.txt`, `trajectory.jsonl`.
        sha256:
          type: string
          description: |
            Hex-encoded SHA-256 of the file contents inside the ZIP.
            Matches the hash a consumer would compute against the
            corresponding standalone-surface URL — citation chains
            line up across both distribution paths.
        size_bytes:
          type: integer
          minimum: 0
          description: Byte length of the file as it appears inside the ZIP.
        source_url:
          type: string
          description: |
            Fully-qualified canonical URL the file mirrors (e.g.
            `https://miroshark.example.com/api/simulation/sim_abc/share-card.png`).
            Empty string when the archive was built without a known
            base URL.
        mime_type:
          type: string
          description: |
            MIME type the matching standalone-surface route serves —
            e.g. `image/png`, `image/svg+xml`, `text/csv`,
            `application/json`, `application/x-ipynb+json`,
            `text/markdown`, `text/plain`, `application/x-ndjson`.

    ArchiveManifest:
      type: object
      description: |
        Top-level `manifest.json` document at the root of an
        `archive.zip` bundle. Enumerates every contained file along
        with the archive-wide metadata a consumer needs to verify
        integrity and trace each file back to its standalone source.

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
      required:
        - schema_version
        - simulation_id
        - archive_generated_at
        - base_url
        - file_count
        - files
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        simulation_id:
          type: string
          description: Echoed simulation id.
        archive_generated_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the archive was built (ISO-8601 with
            trailing `Z`). The only field on the archive that drifts
            across two builds of the same input set — every contained
            file is bytewise deterministic.
        base_url:
          type: string
          description: |
            Origin (scheme + host) used to compose each entry's
            `source_url`. Empty when the archive was built without a
            host context.
        file_count:
          type: integer
          minimum: 0
          description: |
            Number of entries in `files` — also surfaced via the
            `X-MiroShark-Archive-Files` response header so a HEAD
            request can render a preview without downloading the
            archive body.
        files:
          type: array
          description: |
            One `ArchiveManifestEntry` per file inside the ZIP
            (excluding the `manifest.json` itself). Ordered by the
            canonical surface order (`share-card.png`, `chart.svg`,
            `trajectory.csv`, `trajectory.jsonl`, `transcript.md`,
            `thread.txt`, `reproduce.json`, `notebook.ipynb`,
            `signal.json`); missing surfaces are simply absent rather
            than represented by a placeholder entry.
          items:
            $ref: "#/components/schemas/ArchiveManifestEntry"

    ReproductionConfig:
      type: object
      description: |
        Citation primitive returned by
        `/api/simulation/{id}/reproduce.json`. Every parameter another
        operator would need to re-run the same simulation, in one
        machine-readable document. Pretty-printed, sorted keys, stable
        bytes — identical exports of the same finished simulation
        produce identical files (citation-hash friendly).

        Schema is versioned via `schema_version`. v1 is the only
        published version; future breaking changes bump the literal.
        v1-aware parsers should reject blobs whose `schema_version`
        does not equal `"1"`.
      required:
        - schema_version
        - exported_at
        - simulation_id
        - scenario
        - agent_count
        - total_rounds
        - platforms
        - time_config
        - lineage
        - director_events
        - config_reasoning
      properties:
        schema_version:
          type: string
          enum: ["1"]
          description: Schema version literal — bumped on breaking changes.
        exported_at:
          type: string
          format: date-time
          description: |
            UTC timestamp when the export was rendered (ISO-8601 with
            trailing `Z`). Same shape as the webhook delivery log's
            `timestamp` field.
        simulation_id:
          type: string
          description: Echoed simulation id.
        scenario:
          type: string
          description: |
            The simulation requirement / scenario text. Falls back to
            the state-level `simulation_requirement` field for older
            sims that wrote it onto state rather than into the
            generated config.
        agent_count:
          type: integer
          minimum: 0
          description: |
            Number of agent profiles generated for the run. Maps to
            `state.profiles_count` and determines how many distinct
            personas reasoned through the scenario.
        total_rounds:
          type: integer
          minimum: 0
          description: |
            Total rounds the simulation ran (or is configured to run).
            Prefers the runner's recorded total; falls back to
            `time_config.total_simulation_hours * 60 /
            time_config.minutes_per_round` when the runner hasn't
            populated the field. May be `0` for sims that never
            reached the prepared state.
        platforms:
          type: object
          description: |
            Platform toggles + the polymarket market-count knob — the
            four boolean / integer parameters that together with the
            scenario decide which channels the agents post to.
          required:
            - twitter
            - reddit
            - polymarket
            - polymarket_market_count
          properties:
            twitter:
              type: boolean
              description: Whether the simulation enabled the Twitter platform.
            reddit:
              type: boolean
              description: Whether the simulation enabled the Reddit platform.
            polymarket:
              type: boolean
              description: Whether the simulation enabled prediction-market trading.
            polymarket_market_count:
              type: integer
              minimum: 1
              description: |
                Number of distinct prediction markets generated when
                `polymarket=true`. Defaults to `1`. Range `[1, 5]` is
                enforced upstream by the prepare endpoint.
        time_config:
          type: object
          description: |
            The four cadence knobs that drive the simulation's
            temporal envelope. May be empty when the sim never reached
            a prepared state. Field set is intentionally narrow: the
            full LLM-generated config includes per-agent posting
            frequency + event schedules + platform tuning, but those
            are derived from the entity graph rather than parameters
            a researcher reproduces by hand.
          properties:
            minutes_per_round:
              type: integer
              minimum: 1
              description: Wall-clock minutes the simulation pretends each round covers.
            total_simulation_hours:
              type: integer
              minimum: 0
              description: Total wall-clock hours the simulation pretends to span.
            peak_hours:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 23
              description: Hours of the day treated as high-activity windows.
            off_peak_hours:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 23
              description: Hours of the day treated as low-activity windows.
        lineage:
          type: object
          description: |
            Description of how this simulation was created. Powers the
            "🪐 Forked from X" / "🔀 Counterfactual branch of X at round
            Y" badge on the EmbedDialog and (forthcoming) share / watch
            pages.
          required:
            - parent_simulation_id
            - kind
            - counterfactual
          properties:
            parent_simulation_id:
              type: string
              nullable: true
              description: |
                Parent simulation id, or `null` for original sims. When
                non-null, the parent's reproduction blob can be fetched
                from the same endpoint to get the un-branched version.
            kind:
              type: string
              enum: [original, fork, counterfactual]
              description: |
                Lineage discriminator. `original` ⇒ created via the
                standard prepare flow. `fork` ⇒ created via
                `POST /api/simulation/fork` (same agent population, new
                sim id). `counterfactual` ⇒ created via
                `POST /api/simulation/branch-counterfactual` (fork plus
                an injection event scheduled at a specific round).
            counterfactual:
              type: object
              nullable: true
              description: |
                Present only when `kind == "counterfactual"`. Carries
                the trigger round + label + 140-char preview of the
                injection text so the badge can render the headline
                without a second fetch.
              properties:
                trigger_round:
                  type: integer
                  minimum: 0
                  description: Round at which the injection fires.
                label:
                  type: string
                  description: Operator-supplied or auto-generated branch label.
                preview:
                  type: string
                  nullable: true
                  description: Up to 140 chars of the injection text.
        director_events:
          type: array
          nullable: true
          description: |
            Operator-injected scenario events (e.g. "Liquidity Crisis"
            at round 15) that shaped the belief curve. `null` when no
            events were injected — the common case. Each event carries
            its `round`, `label`, and optional `description`.
          items:
            type: object
            required: [round, label]
            properties:
              round:
                type: integer
                minimum: 0
                description: Round at which the event fired.
              label:
                type: string
                description: Short headline for the event.
              description:
                type: string
                nullable: true
                description: Longer description, or `null` when none was provided.
        config_reasoning:
          type: string
          description: |
            LLM-generated rationale for the chosen knobs, captured at
            prepare time. Empty string for older sims that didn't
            persist a rationale.

    SimulationLineage:
      type: object
      description: |
        Lineage graph slice returned by
        `/api/simulation/{id}/lineage`. Pairs the parent pointer that
        already lived on disk (PR #75 reproducibility config export)
        with the reverse pointers — the **public** children whose
        `parent_simulation_id` matches the requested simulation —
        making the fork / counterfactual graph navigable both ways.

        `parent` is `null` for original sims; `children` is a possibly
        empty list capped at 50 entries; `total_children` reflects the
        public-only scan total even when the response was capped.

        When the requested simulation is itself a counterfactual
        branch, `counterfactual` carries the trigger round + label so
        the badge can render "🔀 Counterfactual at round 12
        (ceo_resigns)" without a second fetch.
      required:
        - simulation_id
        - lineage_kind
        - parent
        - children
        - total_children
        - counterfactual
      properties:
        simulation_id:
          type: string
          description: Echoed simulation id.
        lineage_kind:
          type: string
          enum: [original, fork, counterfactual]
          description: |
            How the requested simulation was created. `original` ⇒ no
            parent. `fork` ⇒ created via `POST /api/simulation/fork`.
            `counterfactual` ⇒ created via
            `POST /api/simulation/branch-counterfactual` (fork plus an
            injection event scheduled at a specific round). Mirrors
            `lineage.kind` from the reproduce.json export.
        parent:
          type: object
          nullable: true
          description: |
            The parent simulation entry, or `null` for originals. When
            the parent has been unpublished, `is_public` is `false` and
            `scenario_preview` is the empty string — the SPA renders
            the bare placeholder rather than a click-through link.
          required:
            - simulation_id
            - scenario_preview
            - created_at
            - is_public
          properties:
            simulation_id: { type: string }
            scenario_preview:
              type: string
              description: Up to 80 chars of the parent scenario, truncated with an ellipsis.
            created_at:
              type: string
              description: Best-effort UTC timestamp from the parent's state.json.
            is_public:
              type: boolean
              description: |
                Whether the parent is itself published. False parents
                are echoed by id only — no scenario, no click-through.
        children:
          type: array
          description: |
            Public child simulations whose `parent_simulation_id`
            matches the requested sim. Sorted by `created_at`
            ascending (oldest fork first — natural narrative order).
            Capped at 50 entries; `total_children` reflects the
            uncapped count.
          items:
            type: object
            required:
              - simulation_id
              - scenario_preview
              - created_at
              - is_public
              - kind
              - counterfactual
            properties:
              simulation_id: { type: string }
              scenario_preview:
                type: string
                description: Up to 80 chars of the child scenario.
              created_at:
                type: string
                description: Best-effort UTC timestamp from the child's state.json.
              is_public:
                type: boolean
                enum: [true]
                description: Always true — private children are filtered out server-side.
              kind:
                type: string
                enum: [fork, counterfactual]
                description: |
                  How the child was created. `fork` ⇒ same agent
                  population, fresh sim id, no scheduled injection.
                  `counterfactual` ⇒ fork plus an injection event
                  scheduled at a specific round.
              counterfactual:
                type: object
                nullable: true
                description: |
                  Present only when `kind == "counterfactual"`. Carries
                  the trigger round + label so the badge can render
                  "🔀 Counterfactual at round 12 (ceo_resigns)" inline.
                required: [trigger_round, label]
                properties:
                  trigger_round:
                    type: integer
                    minimum: 0
                    description: Round at which the child's injection fires.
                  label:
                    type: string
                    description: Operator-supplied or auto-generated branch label.
        total_children:
          type: integer
          minimum: 0
          description: |
            Public-only child count discovered on disk. Equal to
            `len(children)` unless the cap truncated the response.
        counterfactual:
          type: object
          nullable: true
          description: |
            When the requested simulation is itself a counterfactual
            branch, the trigger round + label travel along so the
            badge can render the headline without a second fetch.
            `null` for originals + plain forks.
          required: [trigger_round, label]
          properties:
            trigger_round:
              type: integer
              minimum: 0
            label:
              type: string

    SettingsUpdate:
      type: object
      properties:
        preset:
          type: string
