            provider: { type: string }
            base_url: { type: string }
            model_name: { type: string }
            api_key: { type: string }
        smart:
          type: object
          properties:
            provider: { type: string }
            base_url: { type: string }
            model_name: { type: string }
            api_key: { type: string }
        ner:
          type: object
          properties:
            base_url: { type: string }
            model_name: { type: string }
            api_key: { type: string }
        wonderwall:
          type: object
          properties:
            model_name: { type: string }
        embedding:
          type: object
          properties:
            provider: { type: string }
            base_url: { type: string }
            model_name: { type: string }
            api_key: { type: string }
            dimensions: { type: integer }
        web_search_model: { type: string }
        neo4j:
          type: object
          properties:
            uri: { type: string }
            user: { type: string }
            password: { type: string }

    PushSubscription:
      type: object
