  /api/report/chat:
    post:
      tags: [Report Agent]
      summary: Chat with the report agent — re-queries the underlying graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report_id, question]
              properties:
                report_id: { type: string }
                question: { type: string }
      responses:
        "200":
          description: Reply.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log:
    get:
      tags: [Report Agent]
      summary: Full ReACT agent trace for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trace records.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/agent-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of ReACT agent steps as they happen.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/report/{report_id}/console-log:
    get:
      tags: [Report Agent]
      summary: Raw LLM call logs for a report.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Console log lines.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /api/report/{report_id}/console-log/stream:
    get:
      tags: [Report Agent]
      summary: SSE stream of raw LLM console-log lines.
      parameters:
        - in: path
          name: report_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  # ────────────────────────────────────────────────────────────────────
  # Observability
  # ────────────────────────────────────────────────────────────────────

  /api/observability/events/stream:
    get:
      tags: [Observability]
      summary: Live SSE feed of system events.
      responses:
        "200":
          description: Server-Sent Events stream.
          content:
            text/event-stream:
              schema: { type: string }

  /api/observability/events:
    get:
      tags: [Observability]
      summary: Paginated event log.
      parameters:
        - in: query
