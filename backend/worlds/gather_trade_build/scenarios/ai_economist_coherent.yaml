# AI Economist scenario with the Phase 1 coherent ledger enabled.
# Same world as ai_economist_full.yaml, but:
#   - ledger_mode: coin     — income == net coin flow (gathering yields
#     resources only; selling earns, buying is an expense)
#   - redistribution: lump_sum — taxes/fines return equally to workers
#     each epoch instead of being burned
#   - debt_enabled: true    — unpaid tax/fines carry as debt instead of
#     silently evaporating
# House income stays minted (house_income_mode: mint): like the AI
# Economist's build reward, it is the one exogenous coin source. Switch
# to `treasury` for fully fiscally-closed experiments.
#
# Run:  python -m worlds.gather_trade_build.sweep \
#           worlds/gather_trade_build/scenarios/ai_economist_coherent.yaml --seeds 30

scenario_id: ai_economist_coherent
description: >
  GTB economy with coherent coin ledger, lump-sum redistribution of tax
  revenue, and tax-debt carryforward.
motif: ai_economist

domain:
  type: gather_trade_build
  ledger_mode: coin

  map:
    height: 15
    width: 15
    wood_density: 0.20
    stone_density: 0.15
    resource_regen_rate: 0.1
    resource_max_amount: 5.0

  market:
    enabled: true
    transaction_fee_rate: 0.02
    price_floor: 0.1
    price_ceiling: 100.0

  build:
    wood_cost: 3.0
    stone_cost: 3.0
    income_per_house_per_step: 1.0
    max_houses_per_agent: 10
    house_income_mode: mint

  energy_per_step: 10.0
  energy_cost_move: 1.0
  energy_cost_gather: 1.0
  energy_cost_trade: 0.5
  energy_cost_build: 2.0

  taxation:
    schedule_family: piecewise
    brackets:
      - threshold: 0.0
        rate: 0.10
      - threshold: 10.0
        rate: 0.20
      - threshold: 25.0
        rate: 0.35
      - threshold: 50.0
        rate: 0.45
    smoothing: 0.0
    damping: 0.3
    update_interval_epochs: 1
    allow_non_monotone: false
    redistribution: lump_sum
    debt_enabled: true

  planner:
    planner_type: heuristic
    objective: welfare
    prod_weight: 1.0
    ineq_weight: 0.5
    learning_rate: 0.01
    exploration_rate: 0.1
    update_interval_epochs: 1

  gaming:
    income_shifting_enabled: true
    max_shift_fraction_per_epoch: 0.3
    gaming_cost_fraction: 0.05
    bunching_detection_enabled: true
    bunching_bin_width: 1.0

  misreporting:
    enabled: true
    max_underreport_fraction: 0.5
    audit_probability: 0.2
    risk_based_audit_multiplier: 1.5
    fine_multiplier: 2.0
    reputation_penalty_per_catch: 0.1
    freeze_on_repeat: true
    freeze_after_n_catches: 3
    freeze_duration_epochs: 2

  collusion:
    enabled: true
    max_coalition_size: 4
    min_coalition_size: 2
    detection_window_steps: 20
    similarity_threshold: 0.7
    suspicion_score_threshold: 0.6
    response_audit_multiplier: 2.0
    response_stake_increase: 1.5
    response_trade_restriction_epochs: 1

agents:
  - policy: honest
    count: 5
    skill_gather: 1.0
    skill_build: 1.0
  - policy: honest
    count: 2
    skill_gather: 1.5
    skill_build: 1.2
  - policy: gaming
    count: 2
    shift_fraction: 0.25
    skill_gather: 1.0
  - policy: evasive
    count: 2
    underreport_fraction: 0.3
    skill_gather: 1.0
  - policy: collusive
    count: 3
    coalition_id: cartel_alpha
    skill_gather: 1.0

simulation:
  n_epochs: 20
  steps_per_epoch: 15
  seed: 42
